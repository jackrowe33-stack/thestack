<style id="boot-style">
#bootscreen{position:fixed;inset:0;z-index:10000;background:var(--bg,#121418);display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;transition:opacity .35s ease;}
#bootscreen.hide{opacity:0;pointer-events:none;}
#bootscreen .bs-wrap{text-align:center;}
#bootscreen .bs-glyph{width:40px;height:40px;margin:0 auto 14px;display:block;animation:bs-pulse 1.8s ease-in-out infinite;}
#bootscreen .bs-word{font-family:'Fraunces',serif;font-size:24px;font-weight:400;color:var(--ink,#edeae6);letter-spacing:-.01em;margin-bottom:22px;}
#bootscreen .bs-word em{font-style:italic;color:var(--cu,#b87040);}
#bootscreen .bs-spin{width:26px;height:26px;margin:0 auto;border:2.5px solid var(--card-edge,#2c303a);border-top-color:var(--cu,#b87040);border-radius:50%;animation:agspin .8s linear infinite;}
@keyframes bs-pulse{0%,100%{opacity:1}50%{opacity:.55}}
</style>
<style id="ag-style">
#authgate{position:fixed;inset:0;z-index:9999;background:var(--bg,#121418);display:none;overflow-y:auto;-webkit-font-smoothing:antialiased}
#authgate.show{display:block}
#authgate .ag-wrap{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px;position:relative}
#authgate::before{content:'';position:fixed;top:-90px;left:50%;transform:translateX(-50%);width:140%;max-width:600px;height:430px;background:radial-gradient(ellipse at 50% 0%,rgba(var(--cu-rgb,184,112,64),.05),transparent 68%);pointer-events:none}
#authgate .ag-brand{text-align:center;margin-bottom:34px;position:relative}
#authgate .ag-glyph{width:44px;height:44px;margin:0 auto 16px;display:block}
#authgate .ag-word{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--ink,#edeae6);letter-spacing:-.01em}
#authgate .ag-word em{font-style:italic;color:var(--cu,#b87040)}
#authgate .ag-tag{font-size:12px;color:var(--ink-mid,#8a8a96);margin-top:6px}
#authgate .ag-hd{font-family:'Fraunces',serif;font-size:23px;font-weight:400;color:var(--ink,#edeae6);margin:0 0 4px}
#authgate .ag-sub{font-size:13px;color:var(--ink-mid,#8a8a96);margin:0 0 24px;line-height:1.5}
#authgate .ag-field{margin-bottom:12px}
#authgate .ag-field label{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft,#52525e);margin:0 2px 6px}
#authgate input{font:inherit;font-family:'Inter',system-ui,sans-serif;font-size:15px;color:var(--ink,#edeae6);background:var(--bg-raise,#191c22);border:1px solid var(--card-edge,#2c303a);border-radius:10px;padding:12px 13px;width:100%;outline:none}
#authgate input:focus{border-color:var(--cu,#b87040)}
#authgate .ag-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--cu-btn,#7a4828);color:#f5f0e0;font:inherit;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:13px;border:none;border-radius:100px;margin-top:6px;cursor:pointer}
#authgate .ag-primary:disabled{opacity:.5;cursor:default}
#authgate .ag-div{display:flex;align-items:center;gap:12px;margin:22px 2px;color:var(--ink-soft,#52525e);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
#authgate .ag-div::before,#authgate .ag-div::after{content:'';flex:1;height:1px;background:var(--hairline,#28282e)}
#authgate .ag-oauth{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--card,#1e2128);border:1px solid var(--card-edge,#2c303a);color:var(--ink,#edeae6);font:inherit;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:12px;border-radius:100px;margin-bottom:10px;cursor:pointer}
#authgate .ag-oauth svg{width:18px;height:18px;flex-shrink:0}
#authgate .ag-oauth.ag-soon{opacity:.45;cursor:default}
#authgate .ag-oauth .ag-soonlbl{font-size:10px;color:var(--ink-soft,#52525e)}
#authgate .ag-foot{text-align:center;font-size:13px;color:var(--ink-mid,#8a8a96);margin-top:22px}
#authgate .ag-foot button{color:var(--cu,#b87040);font:inherit;font-family:'Inter',sans-serif;font-weight:500;background:none;border:none;cursor:pointer}
#authgate .ag-reset{text-align:center;margin-top:12px}
#authgate .ag-reset button{color:var(--ink-mid,#8a8a96);font:inherit;font-family:'Inter',sans-serif;font-size:12px;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
#authgate .ag-legal{text-align:center;font-size:11px;color:var(--ink-soft,#52525e);margin-top:26px;line-height:1.5;padding:0 8px}
#authgate .ag-msg{font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:14px;line-height:1.45;display:none}
#authgate .ag-msg.on{display:block;background:rgba(201,123,110,.12);color:var(--danger,#c97b6e);border:1px solid rgba(201,123,110,.25)}
#authgate .ag-msg.ok{display:block;background:rgba(127,174,127,.12);color:#7fae7f;border:1px solid rgba(127,174,127,.28)}
#authgate .ag-spin{width:34px;height:34px;margin:0 auto 22px;border:2.5px solid var(--card-edge,#2c303a);border-top-color:var(--cu,#b87040);border-radius:50%;animation:agspin .8s linear infinite}
@keyframes agspin{to{transform:rotate(360deg)}}
</style>
<script type="module" src="firebase-init.js"></script>
</head>

<script>
/* Boot screen: hidden by bootApp() (logged in) or showGate() (needs login),
   whichever fires first. Hard failsafe below in case neither ever fires. */
function hideBootScreen(){
  var el=document.getElementById('bootscreen');
  if(!el)return;
  el.classList.add('hide');
  setTimeout(function(){ if(el&&el.parentNode)el.parentNode.removeChild(el); },400);
}
setTimeout(hideBootScreen,6000); // failsafe: never leave the user staring at this forever

/* Re-shown right after a sign-in (from the auth gate) while the new
   account's Firestore data hydrates, so the user never sees a flash of
   whichever data happened to be sitting in local cache first. Uses the
   same markup as the initial boot screen — it's the one standard loading
   screen for the whole app, not a second one. */
function showBootScreen(){
  var el=document.getElementById('bootscreen');
  if(!el){
    el=document.createElement('div');
    el.id='bootscreen';
    el.innerHTML='<div class="bs-wrap"><svg class="bs-glyph" viewBox="0 0 32 32" fill="none"><path d="M16 3C13 9 9 13 3 16c6 3 10 7 13 13 3-6 7-10 13-13-6-3-10-7-13-13Z" stroke="var(--cu,#b87040)" stroke-width="1.6" stroke-linejoin="round"/></svg><div class="bs-word">The <em>Stack</em></div><div class="bs-spin"></div></div>';
    document.body.insertBefore(el,document.body.firstChild);
  }
  el.classList.remove('hide');
  clearTimeout(window.__bootFailsafe);
  window.__bootFailsafe=setTimeout(hideBootScreen,6000); // same failsafe: never trap the user if hydration stalls
}
window.showBootScreen=showBootScreen;
window.hideBootScreen=hideBootScreen;
</script>
