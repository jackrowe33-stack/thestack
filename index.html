<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#121418;--bg-raise:#191c22;--card:#1e2128;--card-edge:#2c303a;
  --ink:#edeae6;--ink-mid:#8a8a96;--ink-soft:#52525e;
  --cu:#b87040;--cu-deep:#8c5430;--cu-btn:#7a4828;
  --danger:#c97b6e;
  --hairline:#28282e;
  --glass:rgba(14,16,20,0.72);--glass-hi:rgba(237,234,230,0.07);--glass-edge:rgba(237,234,230,0.11);
}
@media(prefers-color-scheme:light){:root{
  --bg:#f2f0ee;--bg-raise:#e8e5e0;--card:#f8f6f2;--card-edge:#d8d4ce;
  --ink:#1e1a14;--ink-mid:#6a6460;--ink-soft:#a09890;
  --cu:#8c5430;--cu-deep:#6e3e20;--cu-btn:#7a4828;
  --danger:#b3604f;
  --hairline:#ddd9d2;
  --glass:rgba(240,238,234,0.72);--glass-hi:rgba(255,255,255,0.6);--glass-edge:rgba(30,26,20,0.1);
}}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
#app{padding-bottom:132px;min-height:100vh}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;text-align:left}
input,textarea,select{font:inherit;color:var(--ink);background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:10px;padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--cu)}
textarea{resize:vertical;min-height:70px}
::placeholder{color:var(--ink-soft)}
a{color:inherit}
.top{padding:calc(env(safe-area-inset-top,0px) + 12px) 22px 8px;display:flex;justify-content:space-between;align-items:flex-end}
.wordmark{font-family:'Fraunces',serif;font-size:20px;font-weight:400;color:var(--ink)}
.wordmark em{font-style:italic;color:var(--cu)}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;padding:52px 22px 4px;color:var(--ink)}
.page-sub{font-size:13px;color:var(--ink-mid);padding:0 22px 14px}
.date{font-size:11px;color:var(--ink-soft);text-align:right;line-height:1.5}
.date strong{display:block;color:var(--ink-mid);font-weight:500;font-size:12px}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:22px 22px 10px}
.card{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 10px;overflow:hidden}
.pad{padding:16px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--cu-btn);color:#f5f0e0;font-size:13px;font-weight:500;padding:11px 18px;border-radius:100px}
.btn.ghost{background:var(--bg-raise);color:var(--ink-mid);border:1px solid var(--card-edge)}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn.warn{background:transparent;color:var(--cu);border:1px solid var(--cu)}
.btn.sm{padding:7px 13px;font-size:12px}
.btn.full{width:100%;justify-content:center}
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;white-space:nowrap}
.c-cu{background:rgba(184,112,64,.12);color:var(--cu)}
.c-mute{background:var(--bg-raise);color:var(--ink-soft);border:1px solid var(--card-edge)}
.c-danger{background:rgba(201,123,110,.12);color:var(--danger)}
.c-done{background:rgba(184,112,64,.15);color:var(--cu)}
/* streak */
.streak-card{margin:10px 22px;background:var(--card);border:1px solid var(--card-edge);border-radius:18px;padding:22px 20px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.streak-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(184,112,64,.1) 0%,transparent 70%);pointer-events:none}
.streak-num{font-family:'Fraunces',serif;font-size:48px;font-weight:400;color:var(--cu);line-height:1}
.streak-body{flex:1}
.streak-eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
.streak-sub{font-size:11px;color:var(--ink-mid);margin-top:3px}
.streak-dots{display:flex;gap:5px;margin-top:8px}
.sdot{width:9px;height:9px;border-radius:50%;transition:all .2s}
.sdot.on{background:var(--cu)}
.sdot.today{background:var(--cu);box-shadow:0 0 8px rgba(184,112,64,.5)}
.sdot.off{background:var(--hairline)}
@keyframes sdot-p{0%,100%{opacity:1}50%{opacity:.3}}
.sdot.pulse{animation:sdot-p 1.8s ease-in-out infinite}
@keyframes clist-out{to{max-height:0;opacity:0;padding:0}}
.prog-row{display:flex;gap:6px;margin:6px 22px 0}
.prog-item{flex:1;background:var(--card);border:1px solid var(--card-edge);border-radius:10px;padding:10px 10px 8px}
.prog-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:3px}
.prog-val{font-size:13px;font-weight:500;color:var(--ink)}
.prog-bar{height:3px;background:var(--hairline);border-radius:2px;margin-top:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--cu);transition:width .4s ease}
/* hero */
.hero{margin:10px 22px 0;background:linear-gradient(145deg,var(--card) 0%,var(--bg-raise) 100%);border:1px solid var(--card-edge);border-radius:20px;padding:20px 20px 18px;position:relative;overflow:hidden;display:block;width:calc(100% - 44px)}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(184,112,64,.08) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--cu);margin-bottom:7px}
.hero h2{font-family:'Fraunces',serif;font-weight:400;font-size:24px;line-height:1.18;margin-bottom:3px;color:var(--ink)}
.hero .sub{font-size:12px;color:var(--ink-mid);margin-bottom:16px}
/* rows */
.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px 15px;margin:0 22px 8px;width:calc(100% - 44px)}
.row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ri-skin{background:rgba(184,112,64,.1)}.ri-hair{background:rgba(160,139,192,.1)}.ri-scent{background:rgba(45,200,180,.07)}.ri-refresh{background:rgba(184,112,64,.08)}
.row-body{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:500;color:var(--ink)}
.row-sub{font-size:12px;color:var(--ink-mid);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert{margin:6px 22px 8px;display:flex;gap:11px;align-items:flex-start;background:rgba(184,112,64,.07);border:1px solid rgba(184,112,64,.2);border-radius:14px;padding:12px 14px;font-size:12.5px;color:var(--ink-mid);width:calc(100% - 44px)}
.alert b{color:var(--cu);font-weight:600}
.warn-banner{margin:0 22px 10px;display:flex;gap:11px;align-items:flex-start;background:rgba(201,123,110,.07);border:1px solid rgba(201,123,110,.2);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--ink-mid);width:calc(100% - 44px)}
/* stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:0 22px 10px}
.stat-item{background:var(--card);border:1px solid var(--card-edge);border-radius:12px;padding:12px 10px}
.stat-num{font-family:'Fraunces',serif;font-size:26px;font-weight:400;color:var(--cu);line-height:1}
.stat-label{font-size:10px;color:var(--ink-soft);margin-top:3px;font-weight:500}
/* today / checklist */
.today-page{position:fixed;inset:0;background:var(--bg);z-index:55;overflow-y:auto;padding-bottom:calc(110px + env(safe-area-inset-bottom));max-width:430px;margin:0 auto}
.today-sticky{position:sticky;top:0;z-index:10;background:var(--bg);padding-bottom:2px}
.today-sticky::after{content:'';display:block;height:1px;background:linear-gradient(to bottom,var(--card-edge),transparent);margin:0 0 0 0}

/* ══ HELPERS ══ */
function save(){DB.updatedAt=Date.now();localStorage.setItem('stack_v1',JSON.stringify(DB));schedSync();}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dayName(i){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][i];}
function dayShort(i){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i];}
function fmtWait(s){if(!s)return null;return s>=60?(s/60)+' min':s+' sec';}
function daysLeft(p){if(!p.durationDays)return null;return Math.round(p.durationDays-(Date.now()-p.restockedAt)/86400000);}
function lowStock(){return Object.entries(DB.products).filter(([id,p])=>{if(!p.active)return false;const d=daysLeft(p);return d!==null&&d<=14;});}
function pName(id){const p=DB.products[id];return p?p.name:'?';}
function routineById(id){return DB.routines.find(r=>r.id===id);}
function routineForDay(day,type,cat){return DB.routines.find(r=>r.cat===cat&&r.type===type&&r.days.includes(day))||null;}
function routinesOf(cat,type){return DB.routines.filter(r=>r.cat===cat&&r.type===type);}
function queuedIds(){return new Set(Object.values(DB.products).filter(p=>p.next&&p.next.productId).map(p=>p.next.productId));}
function activeSteps(steps){const q=queuedIds();return(steps||[]).filter(s=>{const p=DB.products[s.p];return p&&p.active&&!q.has(s.p);});}
function scents(){return Object.entries(DB.products).filter(([id,p])=>p.cat==='scent'&&p.active).map(([id,p])=>({id,...p}));}
function manageBtn(){return`<div class="manage-link"><button class="btn ghost sm" onclick="UI.tab='setup';UI.setupPage=null;render()">Manage in Setup →</button></div>`;}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function suggestScent(goingOut){
  const day=new Date().getDay(),h=new Date().getHours(),sc=scents();
  const tags=goingOut?['occasion','evening']:h>=17?['evening']:(day===0||day===6)?['weekend','casual']:['weekday','office','daily'];
  for(const t of tags){const m=sc.find(s=>s.tags.includes(t));if(m)return m;}
  return sc[0]||null;
}
function suggestScentForDay(dow){
  const sc=scents();
  const tags=(dow===0||dow===6)?['weekend','casual']:['weekday','office','daily'];
  for(const t of tags){const m=sc.find(s=>s.tags.includes(t));if(m)return m;}
  return sc[0]||null;
}

/* ══ GAMIFICATION ══ */
function compKey(rid,date){return rid+'_'+(date||todayStr());}
function getComp(rid,date){return DB.completions[compKey(rid,date)]||null;}
function isRoutineComplete(rid,date){const c=getComp(rid,date);return!!(c&&c.completedAt);}
function scheduledForDay(day){
  const scope=DB.settings?.streakScope||{skin:true};
  const slots=[];
  if(scope.skin!==false){slots.push(['morning','skin'],['evening','skin']);}
  if(scope.hair){slots.push(['morning','hair'],['evening','hair']);}
  return slots.map(([type,cat])=>routineForDay(day,type,cat)).filter(Boolean);
}
function dayComplete(day,ds){const rs=scheduledForDay(day);return rs.length>0&&rs.every(r=>isRoutineComplete(r.id,ds));}
function calcStreak(){
  const now=new Date();let streak=0;
  for(let i=1;i<=365;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(dayComplete(d.getDay(),ds))streak++;else break;
  }
  return streak;
}
function todayDoneCount(){return scheduledForDay(new Date().getDay()).filter(r=>isRoutineComplete(r.id,todayStr())).length;}
function todayTotalCount(){return scheduledForDay(new Date().getDay()).length;}
function weekStats(){
  const now=new Date();let done=0,total=0;
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const rs=scheduledForDay(d.getDay());total+=rs.length;rs.forEach(r=>{if(isRoutineComplete(r.id,ds))done++;});
  }
  return{done,total};
}
function bestStreak(){
  const now=new Date();let best=0,cur=0;
  for(let i=0;i<90;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(dayComplete(d.getDay(),ds)){cur++;best=Math.max(best,cur);}else cur=0;
  }
  return best;
}
function checklistState(rid,date){
  const r=routineById(rid);if(!r)return[];
  const steps=activeSteps(r.steps);
  const c=getComp(rid,date);
  const si={};
  (c&&c.steps||[]).forEach(s=>{si[s.p]={done:s.done,state:s.state||(s.done?'done':null),appliedAt:s.appliedAt||null};});
  return steps.map(s=>({...s,...(si[s.p]||{done:false,state:null,appliedAt:null})}));
}
function tickStep(rid,productId,dateStr){
  const date=dateStr||UI.todayDate||todayStr();
  const r=routineById(rid);if(!r)return;
  const steps=activeSteps(r.steps);
  const c=getComp(rid,date)||{completedAt:null,steps:[]};
  const wasComplete=!!c.completedAt;
  const rStep=steps.find(s=>s.p===productId);
  const hasWait=rStep&&(rStep.wait||0)>0;
  const sm={};
  (c.steps||[]).forEach(s=>{sm[s.p]={state:s.state||(s.done?'done':null),appliedAt:s.appliedAt||null};});
  const cur=(sm[productId]||{}).state||null;
  if(cur===null){
    sm[productId]={state:hasWait?'applied':'done',appliedAt:hasWait?Date.now():null};
    const idx=steps.findIndex(s=>s.p===productId);
    steps.slice(0,idx).forEach(s=>{if((sm[s.p]||{}).state==='applied')sm[s.p]={state:'done',appliedAt:(sm[s.p]||{}).appliedAt||null};});
  } else {
    sm[productId]={state:null,appliedAt:null};
  }
  c.steps=steps.map(s=>{const st=sm[s.p]||{state:null,appliedAt:null};return{p:s.p,done:st.state==='applied'||st.state==='done',state:st.state,appliedAt:st.appliedAt};});
  const allDone=steps.every(s=>{const st=(sm[s.p]||{}).state;return st==='applied'||st==='done';});
  if(allDone&&!wasComplete)c.completedAt=Date.now();
  if(!allDone)c.completedAt=null;
  DB.completions[compKey(rid,date)]=c;
  save();UI.todayScrollTo=null;
  if(allDone&&!wasComplete){
    const el=document.getElementById('clist-'+rid);
    if(el){
      const h=el.offsetHeight;el.style.overflow='hidden';el.style.maxHeight=h+'px';el.style.transition='max-height 250ms ease-out,opacity 250ms ease-out';
      if(!UI.todayExpanded)UI.todayExpanded={};delete UI.todayExpanded[rid];
      requestAnimationFrame(()=>{el.style.maxHeight='0';el.style.opacity='0';});
      setTimeout(()=>renderTodayPage(),270);return;
    }
  }
  renderTodayPage();
}
function completeAll(rid){completeAllDate(rid,todayStr());}
function uncompleteRoutine(rid){uncompleteRoutineDate(rid,todayStr());}
function completeAllDate(rid,dateStr){
  const r=routineById(rid);if(!r)return;
  DB.completions[compKey(rid,dateStr)]={completedAt:Date.now(),steps:activeSteps(r.steps).map(s=>({p:s.p,done:true,state:'done',appliedAt:null}))};
  UI.todayScrollTo=null;save();renderTodayPage();
}
function uncompleteRoutineDate(rid,dateStr){
  delete DB.completions[compKey(rid,dateStr)];
  UI.todayScrollTo=null;save();renderTodayPage();
}

/* ══ SYNC ══ */
let syncTimer=null;
function schedSync(){if(!DB.settings.syncUrl)return;clearTimeout(syncTimer);syncTimer=setTimeout(syncPushSilent,2500);}
async function syncPushSilent(){if(!DB.settings.syncUrl)return;try{await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});}catch(e){}}
async function syncPush(){if(!DB.settings.syncUrl)return false;try{const r=await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});return r.ok?true:'HTTP '+r.status;}catch(e){return 'network error';}}
async function syncPull(force=false){
  if(!DB.settings.syncUrl){alert('Set a sync URL in Setup first.');return;}
  let r;try{r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin},cache:'no-store'});}catch(e){alert('Pull failed — network error: '+(e.message||e));return;}
  if(!r.ok){alert('Pull failed — HTTP '+r.status+(r.status===401?' (PIN mismatch)':''));return;}
  let remote;try{remote=await r.json();}catch(e){alert('Pull failed — bad JSON');return;}
  if(!remote){alert('Nothing on server yet.');return;}
  if(force||remote.updatedAt>=(DB.updatedAt||0)){DB=migrate(remote);localStorage.setItem('stack_v1',JSON.stringify(DB));render();}
}
async function autoPull(){
  if(!DB.settings.syncUrl)return;
  try{const r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin},cache:'no-store'});if(!r.ok)return;const remote=await r.json();if(remote&&remote.updatedAt>=(DB.updatedAt||0)&&!UI.modal&&!UI.todayOpen){DB=migrate(remote);localStorage.setItem('stack_v1',JSON.stringify(DB));render();}}catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){autoPull();}
  else{clearTimeout(syncTimer);syncTimer=null;if(DB.settings.syncUrl){try{fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB),keepalive:true});}catch(e){}}}
});

/* ══ RENDER ══ */
function render(){
  // Save current scroll before re-rendering
  if(!UI._scrollPositions)UI._scrollPositions={};
  const curKey=UI.tab+(UI.setupPage||'');
  if(!UI._scrollRestoring)UI._scrollPositions[curKey]=window.scrollY;
  const app=document.getElementById('app');
  if(UI.tab==='home')app.innerHTML=vHome();
  else if(UI.tab==='routines')app.innerHTML=vRoutines();
  else if(UI.tab==='setup')app.innerHTML=vSetupRouter();
  else if(UI.tab==='scent')app.innerHTML=vScent();
  else app.innerHTML=vHome();
  renderTabs();renderModal();
  if(!UI.todayOpen){let ex=document.getElementById('today-overlay');if(ex)ex.remove();let fabEl=document.getElementById('fab-today');if(fabEl)fabEl.remove();}
  // Restore scroll for this tab/page if we have a saved position, else scroll to top
  const scrollKey=UI.tab+(UI.setupPage||'');
  if(UI._scrollPositions&&UI._scrollPositions[scrollKey]!==undefined&&UI._scrollRestoring){
    requestAnimationFrame(()=>window.scrollTo(0,UI._scrollPositions[scrollKey]));
    UI._scrollRestoring=false;
  } else if(!UI._scrollRestoring){
    window.scrollTo(0,0);
  }
}
function renderTabs(){
  const ts=[['home','⌂','Home'],['today','◉','Today'],['routines','≡','Routines']];
  document.getElementById('tabs').innerHTML=ts.map(([k,ic,l])=>{
    const active=k==='today'?UI.todayOpen:((UI.tab===k||(k==='home'&&UI.tab==='scent'))&&!UI.todayOpen);
    return`<button class="tab ${active?'active':''}" onclick="navTab('${k}')"><span class="ic">${ic}</span>${l}</button>`;
  }).join('');
}
function saveScroll(){if(!UI._scrollPositions)UI._scrollPositions={};UI._scrollPositions[UI.tab+(UI.setupPage||'')]=window.scrollY;}
function navTab(k){saveScroll();if(k==='today'){openToday();return;}UI.todayOpen=false;UI.tab=k;UI.setupPage=null;UI._scrollRestoring=true;render();}

/* ══ TODAY PAGE (overlay) ══ */
let _wakeLock=null;
async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock=await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
function releaseWakeLock(){
  if(_wakeLock){_wakeLock.release().catch(()=>{});_wakeLock=null;}
}
// Re-acquire if tab becomes visible again while Today is open
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&UI.todayOpen)acquireWakeLock();
});
function openToday(dateStr,routineId){
  UI.todayOpen=true;
  UI.todayDate=dateStr||todayStr();
  UI.todayRoutineId=routineId||null;
  if(!routineId){const h=new Date().getHours();UI.todayScrollTo=(UI.todayDate===todayStr()&&h>=12)?'evening':'morning';}
  else{UI.todayScrollTo=null;}
  acquireWakeLock();
  renderTodayPage();
  renderTabs();
}
function closeToday(){
  UI.todayOpen=false;UI.todayDate=null;UI.todayScrollTo=null;UI.todayLook=null;UI.todayRoutineId=null;releaseWakeLock();
  // Remove Today start button but keep timer running if active
  const tf=document.getElementById('fab-today');if(tf)tf.remove();
  let ex=document.getElementById('today-overlay');if(ex)ex.remove();
  let fab=document.getElementById('fab-today');if(fab)fab.remove();
  renderTabs();render();
}
function renderTodayPage(){
  // Save scroll position before recreating
  const prevOverlay=document.getElementById('today-overlay');
  const savedScroll=prevOverlay?prevOverlay.scrollTop:0;
  if(prevOverlay)prevOverlay.remove();
  // Remove only the Today start button (not the global FAB)
  const prevFab=document.getElementById('fab-today');if(prevFab)prevFab.remove();

  const dateStr=UI.todayDate||todayStr();
  const now=new Date();
  const todayDate=todayStr();
  const isToday=dateStr===todayDate;

  // Parse the selected date to get day-of-week
  const parts=dateStr.split('-');
  const selDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const day=selDate.getDay();
  const h=isToday?now.getHours():0;

  // Date nav helpers
  function offsetDate(ds,delta){
    const p=ds.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    d.setDate(d.getDate()+delta);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function fmtDate(ds){
    const p=ds.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    if(ds===todayDate)return'Today';
    const yesterday=offsetDate(todayDate,-1);
    if(ds===yesterday)return'Yesterday';
    return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  }
  const isFuture=dateStr>todayDate;
  const prevDate=offsetDate(dateStr,-1);
  const nextDate=offsetDate(dateStr,1);
  const canGoForward=nextDate<=todayDate; // don't allow future dates beyond today

  const skinMR=routineForDay(day,'morning','skin');
  const hairMR=routineForDay(day,'morning','hair');
  const skinER=routineForDay(day,'evening','skin');
  const hairER=routineForDay(day,'evening','hair');
  const scent=suggestScent();

  const done=scheduledForDay(day).filter(r=>isRoutineComplete(r.id,dateStr)).length;
  const total=scheduledForDay(day).length;

  function routineSection(r,label,sectionId){
    if(!r)return'';
    const isDone=isRoutineComplete(r.id,dateStr);
    const isExpanded=!isDone||(UI.todayExpanded&&UI.todayExpanded[r.id]);
    if(isDone&&!isExpanded){
      return`<button class="day-section today-section" style="width:calc(100% - 44px);background:none;border:none;cursor:pointer;padding:0;text-align:left" onclick="if(!UI.todayExpanded)UI.todayExpanded={};UI.todayExpanded['${r.id}']=true;renderTodayPage()">
        <span class="today-section-label">${label}</span>
        <div class="day-section-line"></div>
        <span style="font-size:11px;font-weight:600;color:var(--cu);white-space:nowrap;flex-shrink:0">✓</span>
        <div style="min-width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:18px;flex-shrink:0;margin-right:-10px">⌄</div>
      </button>`;
    }
    return`<div class="day-section today-section" id="${sectionId}">
      <span class="today-section-label">${label}</span>
      <div class="day-section-line"></div>
      ${isDone?`<span style="font-size:11px;font-weight:600;color:var(--cu);white-space:nowrap;flex-shrink:0">✓ Done</span>
      <button style="min-width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:18px;flex-shrink:0;background:none;border:none;cursor:pointer;padding:0;margin-right:-10px" onclick="if(!UI.todayExpanded)UI.todayExpanded={};UI.todayExpanded['${r.id}']=false;renderTodayPage()">⌃</button>`:''}
    </div>
    ${checklistHTML(r.id,dateStr)}
    <div class="complete-btns">
      ${!isDone
        ?`<button class="btn full sm" onclick="completeAllDate('${r.id}','${dateStr}')">Mark all done</button>`
        :`<button class="btn ghost full sm" onclick="uncompleteRoutineDate('${r.id}','${dateStr}')">✓ Done — undo</button>`
      }
    </div>`;
  }

  // Single-routine mode (e.g. Refresh & Go runner)
  if(UI.todayRoutineId){
    const rSingle=routineById(UI.todayRoutineId);
    if(rSingle){
      const isDoneSingle=isRoutineComplete(rSingle.id,dateStr);
      let rOut=`<div class="today-sticky">
        <div class="today-header" style="justify-content:flex-end">
          <div style="text-align:right">
            <div class="wordmark">The <em>Stack</em></div>
            <div style="font-size:11px;color:var(--ink-soft);margin-top:2px">${esc(rSingle.name)}</div>
          </div>
        </div>
      </div>
      <div class="day-section today-section">
        <span class="today-section-label">${esc(rSingle.name)}</span>
        <div class="day-section-line"></div>
        ${isDoneSingle?'<span style="font-size:11px;font-weight:600;color:var(--cu)">✓ Done</span>':''}
      </div>
      ${checklistHTML(rSingle.id,dateStr)}
      <div class="complete-btns">
        ${!isDoneSingle
          ?`<button class="btn full sm" onclick="completeAllDate('${rSingle.id}','${dateStr}')">Mark all done</button>`
          :`<button class="btn ghost full sm" onclick="uncompleteRoutineDate('${rSingle.id}','${dateStr}')">✓ Done — undo</button>`
        }
      </div>
      <div style="height:100px"></div>`;
      const ovSingle=document.createElement('div');
      ovSingle.id='today-overlay';ovSingle.className='today-page';ovSingle.innerHTML=rOut;
      document.body.appendChild(ovSingle);
      if(savedScroll>0)requestAnimationFrame(()=>{ovSingle.scrollTop=savedScroll;});
      updateWaitDisplay();return;
    }
  }

  let out=`
  <div class="today-sticky">
    <div class="today-header" style="justify-content:flex-end">
      <div style="text-align:right">
        <div class="wordmark">The <em>Stack</em></div>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:2px">${done}/${total} routines complete</div>
      </div>
    </div>
    <div class="date-nav">
      <button class="date-nav-btn" onclick="openToday('${prevDate}')">‹</button>
      <span class="date-nav-label">${fmtDate(dateStr)}</span>
      <button class="date-nav-btn ${canGoForward?'':'disabled'}" onclick="${canGoForward?`openToday('${nextDate}')`:''}">›</button>
    </div>
  </div>
  <div id="section-morning">`;

  out+=routineSection(skinMR,`Skin — ${skinMR?skinMR.name:'No routine'}  · Morning`,'');
  out+=routineSection(hairMR,`Hair — ${hairMR?hairMR.name:'No routine'} · Morning`,'');

  // Hair look selector (§10)
  if(hairMR){
    const looks=DB.hairLooks||[];
    if(looks.length){
      const defLook=(day===0||day===6)?(DB.lookByContext&&DB.lookByContext.weekend):(DB.lookByContext&&DB.lookByContext.weekday);
      const selLook=UI.todayLook||defLook||looks[0]?.id;
      const lookR=routineById(selLook);
      out+=`<div style="margin:0 22px 10px;display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)">Look</span>
        <div class="seg" style="flex:1;margin:0">${looks.map(l=>`<button class="${selLook===l.id?'on':''}" onclick="UI.todayLook='${l.id}';renderTodayPage()">${esc(l.name.split('—')[0].trim())}</button>`).join('')}</div>
      </div>`;
      if(lookR&&activeSteps(lookR.steps).length)out+=checklistHTML(lookR.id,dateStr);
    }
  }

  if(!skinMR&&!hairMR){
    out+=`<div class="empty" style="margin:20px 22px;font-size:13px;color:var(--ink-soft)">Nothing scheduled this morning</div>`;
  }

  out+=`</div><div id="section-evening" style="padding-top:4px">`;

  out+=routineSection(skinER,`Skin — ${skinER?skinER.name:'No routine'} · Evening`,'');
  out+=routineSection(hairER,`Hair — ${hairER?hairER.name:'No routine'} · Evening`,'');

  if(!skinER&&!hairER){
    out+=`<div class="empty" style="margin:20px 22px;font-size:13px;color:var(--ink-soft)">Nothing scheduled this evening</div>`;
  }

  out+=`</div>`;

  // Supplements (§11)
  const suppRoutines=DB.routines.filter(r=>r.cat==='supplements'&&r.days.includes(day));
  if(suppRoutines.length){
    out+=`<div class="day-section today-section"><span class="today-section-label">Supplements</span><div class="day-section-line"></div></div>`;
    suppRoutines.forEach(r=>{
      out+=checklistHTML(r.id,dateStr);
      out+=`<div class="complete-btns">${!isRoutineComplete(r.id,dateStr)
        ?`<button class="btn full sm" onclick="completeAllDate('${r.id}','${dateStr}')">Mark all done</button>`
        :`<button class="btn ghost full sm" onclick="uncompleteRoutineDate('${r.id}','${dateStr}')">✓ Done — undo</button>`
      }</div>`;
    });
  } else if(Object.values(DB.products).some(p=>p.cat==='supplements'&&p.active)){
    out+=`<div class="day-section today-section"><span class="today-section-label">Supplements</span><div class="day-section-line"></div></div>`;
    out+=`<div style="padding:12px 22px;font-size:13px;color:var(--ink-soft)">No supplements scheduled for today</div>`;
  }

  // Scent lives on Home screen only

  out+=`<div style="height:100px"></div>`;

  const overlay=document.createElement('div');
  overlay.id='today-overlay';
  overlay.className='today-page';
  overlay.innerHTML=out;
  document.body.appendChild(overlay);

  // Restore scroll or pre-scroll to section
  if(UI.todayScrollTo==='evening'){
    requestAnimationFrame(()=>{
      const el=overlay.querySelector('#section-evening');
      if(el){
        // Offset by sticky header height so section label isn't hidden behind it
        const stickyEl=overlay.querySelector('.today-sticky');
        const stickyH=stickyEl?stickyEl.offsetHeight:120;
        const elTop=el.getBoundingClientRect().top - overlay.getBoundingClientRect().top + overlay.scrollTop;
        overlay.scrollTo({top:Math.max(0,elTop-stickyH-8),behavior:'smooth'});
      }
      UI.todayScrollTo=null;
    });
  } else if(savedScroll>0){
    // Restore previous scroll position (e.g. after ticking a step)
    requestAnimationFrame(()=>{ overlay.scrollTop=savedScroll; });
  }

  updateWaitDisplay();
}
function checklistHTML(rid,dateStr){

/* ══ TIMER — wait countdown ══ */
function fmtCountdown(ms){const s=Math.max(0,Math.ceil(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
let _waitInt=null;
function startWaitInterval(){if(_waitInt)return;_waitInt=setInterval(updateWaitDisplay,1000);}
function updateWaitDisplay(){
  const date=UI.todayDate||todayStr();
  const parts=date.split('-');const dow=new Date(+parts[0],+parts[1]-1,+parts[2]).getDay();
  let minRem=Infinity,anyActive=false;
  scheduledForDay(dow).forEach(r=>{
    const c=getComp(r.id,date);if(!c||!c.steps)return;
    c.steps.forEach(step=>{
      if(step.state==='applied'&&step.appliedAt&&step.wait){
        const rem=step.wait*1000-(Date.now()-step.appliedAt);
        if(rem>0){anyActive=true;minRem=Math.min(minRem,rem);}
      }
    });
  });
  const gfab=document.getElementById('fab-global');
  if(gfab){if(anyActive){gfab.style.display='flex';const t=gfab.querySelector('.fab-global-t');if(t)t.textContent=fmtCountdown(minRem);}else gfab.style.display='none';}
  document.querySelectorAll('[data-wait-chip]').forEach(el=>{
    const rem=parseInt(el.dataset.wait)*1000-(Date.now()-parseInt(el.dataset.at));
    el.textContent=rem>0?fmtCountdown(rem)+' ⏱':'ready ✓';
  });
}

  let h='<div class="steps">';
  act.forEach((s,i)=>{
    const p=DB.products[s.p],dl=daysLeft(p);
    const np=p.next&&p.next.productId?DB.products[p.next.productId]:null;
    const nName=np?np.brand+' '+np.name:(p.next?p.next.name:'');
    h+=`<button class="step" onclick="openProduct('${s.p}')">
      <span class="step-num">${i+1}</span>
      <div class="step-body">

        <div class="step-note">${esc(p.role)}</div>
        ${nName?`<span class="swap-pill">→ ${esc(nName)} queued</span>`:''}
        ${p.flags.includes('removeWhenDone')?`<div class="note-flag">Remove when finished</div>`:''}
        ${dl!==null&&dl<=14?`<div class="note-flag" style="color:var(--cu)">~${Math.max(0,dl)} days left</div>`:''}

    if(s.wait&&i<act.length-1)h+=`<div class="wait"><span>wait ${fmtWait(s.wait)}</span></div>`;

  return h+'</div>';
}

function assignDay(day,type,cat,newId){
  const warnings=[];
  DB.routines.forEach(r=>{if(r.cat===cat&&r.type===type&&r.id!==newId&&r.days.includes(day)){warnings.push(r.name);r.days=r.days.filter(d=>d!==day);}});
  if(newId){const r=routineById(newId);if(r&&!r.days.includes(day))r.days.push(day);}
  save();
  if(warnings.length){UI._schedWarning=`${dayName(day)} removed from: ${warnings.join(', ')}`;render();setTimeout(()=>{UI._schedWarning=null;render();},4000);}else render();
}

function toggleRoutineDay(id,day){
  const r=routineById(id);if(!r)return;
  if(r.days.includes(day)){r.days=r.days.filter(d=>d!==day);save();render();}
  else{
    const clash=DB.routines.find(rt=>rt.id!==id&&rt.cat===r.cat&&rt.type===r.type&&rt.days.includes(day));
    if(clash){UI._schedWarning=`${dayName(day)} removed from "${clash.name}"`;clash.days=clash.days.filter(d=>d!==day);}
    r.days.push(day);save();render();
    if(clash)setTimeout(()=>{UI._schedWarning=null;render();},4000);
  }
}
function moveRStep(id,i,d){const st=routineById(id).steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}

function renderModal(){
  let ex=document.getElementById('ov');if(ex)ex.remove();
  if(!UI.modal)return;
  const ov=document.createElement('div');ov.className='overlay';ov.id='ov';
  ov.onclick=e=>{if(e.target===ov){UI.modal=null;render();}};
  const m=UI.modal;let inner='';
  if(m.type==='product')inner=productView(m.id);
  else if(m.type==='product-detail')inner=productDetailSheet(m.id);
  else if(m.type==='edit')inner=productEdit(m.id);
  else if(m.type==='routine-view')inner=routineViewSheet(m.id);
  else if(m.type==='addstep')inner=addStepSheet(m.routineId);
  else if(m.type==='look')inner=lookSheet(m.idx);
  else if(m.type==='lookpick')inner=lookPickSheet();
  else if(m.type==='new-routine')inner=newRoutineSheet();
  ov.innerHTML=`<div class="sheet" onclick="event.stopPropagation()">${inner}</div>`;
  document.body.appendChild(ov);
}

  <div class="field"><label>Name</label><input value="${esc(p.name)}" onchange="upd('${id}','name',this.value)"></div>
  <div class="field"><label>Brand</label><input value="${esc(p.brand)}" onchange="upd('${id}','brand',this.value)"></div>
  <div class="field"><label>Category</label><select onchange="upd('${id}','cat',this.value)">${['skin','hair','scent','supplements'].map(c=>`<option value="${c}" ${p.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
  <div class="field"><label>Role (short)</label><input value="${esc(p.role)}" onchange="upd('${id}','role',this.value)"></div>
  <div class="field"><label>Why it matters</label><textarea onchange="upd('${id}','why',this.value)">${esc(p.why)}</textarea></div>
  <div class="field"><label>Notes</label><textarea onchange="upd('${id}','notes',this.value)">${esc(p.notes)}</textarea></div>
  <div class="sec-label" style="margin-left:0">Application steps</div>
  <div class="card" style="margin:0 0 8px">${(p.steps&&p.steps.length)?p.steps.map((s,i)=>`<div class="edit-step">
    <input value="${esc(s.text)}" placeholder="Step ${i+1}" onchange="updateProductStep('${id}',${i},this.value)">
    <button class="mini" onclick="moveProductStep('${id}',${i},-1)">↑</button>
    <button class="mini" onclick="moveProductStep('${id}',${i},1)">↓</button>
    <button class="mini" style="color:var(--danger)" onclick="removeProductStep('${id}',${i})">✕</button>
  </div>`).join(''):'<div class="empty" style="padding:12px 16px;font-size:13px">No steps — add one to guide application</div>'}</div>
  <div style="padding:0 0 14px"><button class="btn ghost sm" onclick="addProductStep('${id}')">+ Add step</button></div>
  <div class="field"><label>Reorder link</label><input value="${esc(p.link)}" placeholder="https://…" onchange="upd('${id}','link',this.value)"></div>
  <div class="field"><label>Lasts about (days)</label><input type="number" value="${p.durationDays||''}" onchange="upd('${id}','durationDays',parseInt(this.value)||0)"></div>
  ${p.cat==='scent'?`<div class="field"><label>Tags</label><div class="tags">${allTags.map(t=>`<button class="chip ${p.tags.includes(t)?'c-cu':'c-mute'}" onclick="toggleTag('${id}','${t}')">${t}</button>`).join('')}</div></div>`:''}
  <div class="sec-label" style="margin-left:0">Replacement</div>
  ${p.next?(()=>{const np=p.next.productId?DB.products[p.next.productId]:null;const nName=np?np.brand+' '+np.name:(p.next.name||'Unnamed');
    return`<div class="desc-block" style="border-color:rgba(184,112,64,.3);margin-bottom:10px"><b style="color:var(--cu)">${esc(nName)}</b>${np?`<div style="font-size:12px;color:var(--ink-soft);margin-top:2px">In inventory · hidden until swapped</div>`:''}</div>
    <div class="field"><label>Why the swap</label><textarea onchange="updNext('${id}','why',this.value)">${esc(p.next.why||'')}</textarea></div>
    <div class="field"><label>Order link</label><input value="${esc(p.next.link||'')}" placeholder="https://…" onchange="updNext('${id}','link',this.value)"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">${np?`<button class="btn ghost sm" onclick="openProduct('${p.next.productId}')">View →</button>`:''}<button class="btn warn sm" onclick="upd('${id}','next',null);save();render()">Remove replacement</button></div>`;
  })():`<div class="field"><label>Queue from inventory</label><select onchange="setNextFromInventory('${id}',this.value)"><option value="">— select —</option>${candidates.map(([oid,op])=>`<option value="${oid}">${esc(op.brand)} ${esc(op.name)}</option>`).join('')}</select></div>
  <div style="margin-bottom:14px"><button class="btn ghost sm" onclick="createAndQueueReplacement('${id}')">+ Create new product as replacement</button></div>`}
  <div class="sec-label" style="margin-left:0">Status</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    ${p.active?`<button class="btn warn sm" onclick="deactivate('${id}')">Deactivate</button>`:`<button class="btn sm" onclick="upd('${id}','active',true);render()">Reactivate</button>`}
    <button class="btn danger sm" onclick="deleteProduct('${id}')">Delete permanently</button>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn full" onclick="UI._afterNewProduct=null;UI.modal={type:'product',id:'${id}'};render()">Save & view</button>
    <button class="btn ghost full" onclick="closeEdit()">Close</button>
  </div>`;
}
function upd(id,k,v){DB.products[id][k]=v;save();}
function toggleStreakScope(cat){if(!DB.settings.streakScope)DB.settings.streakScope={skin:true,hair:false,scent:false,supplements:false};DB.settings.streakScope[cat]=!DB.settings.streakScope[cat];save();render();}
function updNext(id,k,v){if(!DB.products[id].next)DB.products[id].next={};DB.products[id].next[k]=v;save();}
function toggleTag(id,t){const p=DB.products[id];const i=p.tags.indexOf(t);if(i>=0)p.tags.splice(i,1);else p.tags.push(t);save();render();}
function addProductStep(id){
  if(!DB.products[id].steps)DB.products[id].steps=[];
  DB.products[id].steps.push({text:''});
  save();
  const sh=document.querySelector('#ov .sheet');const prevScroll=sh?sh.scrollTop:0;
  renderModal();
  requestAnimationFrame(()=>{
    const sh2=document.querySelector('#ov .sheet');if(sh2)sh2.scrollTop=prevScroll;
    const ins=document.querySelectorAll('#ov .edit-step input');if(ins.length)ins[ins.length-1].focus();
  });
}
function removeProductStep(id,i){DB.products[id].steps.splice(i,1);save();renderModal();}
function moveProductStep(id,i,d){const st=DB.products[id].steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();renderModal();}
function updateProductStep(id,i,v){if(DB.products[id].steps)DB.products[id].steps[i].text=v;save();}
function deactivate(id){DB.products[id].active=false;UI.modal=null;save();render();}
function deleteProduct(id){if(!confirm('Delete permanently?'))return;DB.routines.forEach(r=>{r.steps=r.steps.filter(s=>s.p!==id);});delete DB.products[id];UI.modal=null;save();render();}
function swapProduct(id){
  const p=DB.products[id];if(!p.next)return;
  const np=p.next.productId?DB.products[p.next.productId]:null;
  const nName=np?np.brand+' '+np.name:(p.next.name||'the new product');
  if(!confirm('Swap to '+nName+'?\n\n· Deactivate current\n· Replace in all routines\n· Clear notes'))return;
  if(np){DB.routines.forEach(r=>{r.steps.forEach(s=>{if(s.p===id)s.p=p.next.productId;});});p.active=false;p.next=null;np.active=true;}
  else{Object.assign(p,{name:p.next.name||p.name,brand:p.next.brand||p.brand,role:p.next.role||p.role,why:p.next.why||p.why,link:p.next.link||'',notes:'',restockedAt:Date.now(),next:null});}
  save();UI.modal=null;render();
}
function setNextFromInventory(id,nextId){if(!nextId){DB.products[id].next=null;save();render();return;}DB.products[id].next={productId:nextId,why:'',link:''};save();render();}
function createAndQueueReplacement(id){const p=DB.products[id];const newId='p'+Date.now();DB.products[newId]=P(p.cat,'','','','');DB.products[id].next={productId:newId,why:'',link:''};save();UI._afterNewProduct={returnToEdit:id};openEdit(newId);}
function newProduct(cat){const id='p'+Date.now();DB.products[id]=P(cat||'skin','','','','');save();openEdit(id);}

function addStepSheet(routineId){
  return`<div class="sheet-handle"></div><h3>Add step</h3><div class="brand">Pick a product</div>
  <div class="card" style="margin:0 0 12px;max-height:320px;overflow-y:auto">
    ${Object.entries(DB.products).filter(([id,p])=>p.active).map(([id,p])=>`<button class="step" onclick="routineById('${routineId}').steps.push({p:'${id}',wait:0});save();UI.modal={type:'addstep',routineId:'${routineId}'};render()">
    <div class="step-body"><div class="step-name">${esc(p.brand)} ${esc(p.name)}</div><div class="step-note">${p.cat}</div></div></button>`).join('')}
  </div>
  <button class="btn ghost full" onclick="UI.modal=null;render()">Done</button>`;
}
function newRoutineSheet(){
  const m=UI._newR||{cat:'skin',type:'evening',name:'',copyFrom:''};UI._newR=m;
  const copyOpts=DB.routines.filter(r=>r.cat===m.cat&&r.type===m.type);
  return`<div class="sheet-handle"></div><h3>New Routine</h3>
  <div class="field"><label>Name</label><input value="${esc(m.name)}" placeholder="e.g. Evening A — Recovery" oninput="UI._newR.name=this.value"></div>
  <div class="field"><label>Category</label><select onchange="UI._newR.cat=this.value;UI._newR.copyFrom='';UI.modal={type:'new-routine'};render()"><option value="skin" ${m.cat==='skin'?'selected':''}>Skin</option><option value="hair" ${m.cat==='hair'?'selected':''}>Hair</option><option value="scent" ${m.cat==='scent'?'selected':''}>Scent</option><option value="supplements" ${m.cat==='supplements'?'selected':''}>Supplements</option></select></div>
  <div class="field"><label>Type</label><select onchange="UI._newR.type=this.value;UI._newR.copyFrom='';UI.modal={type:'new-routine'};render()"><option value="morning" ${m.type==='morning'?'selected':''}>Morning</option><option value="evening" ${m.type==='evening'?'selected':''}>Evening</option></select></div>
  <div class="field"><label>Copy steps from (optional)</label><select onchange="UI._newR.copyFrom=this.value"><option value="">— start empty —</option>${copyOpts.map(r=>`<option value="${r.id}" ${m.copyFrom===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select></div>
  <div style="display:flex;gap:8px;margin-top:4px"><button class="btn full" onclick="createRoutine()">Create</button><button class="btn ghost full" onclick="UI.modal=null;UI._newR=null;render()">Cancel</button></div>`;
}
function createRoutine(){
  const m=UI._newR||{};const name=(m.name||'').trim();if(!name){alert('Enter a name.');return;}
  const id='r'+Date.now();const src=m.copyFrom?routineById(m.copyFrom):null;
  const steps=src?JSON.parse(JSON.stringify(src.steps)):[];
  DB.routines.push(R(id,m.cat||'skin',m.type||'evening',name,[],steps));
  save();UI.modal=null;UI._newR=null;UI.setupPage='routine-edit';UI.editRoutineId=id;render();
}
function lookSheet(idx){
  const l=(DB.hairLooks||[])[idx];if(!l)return'';const r=routineById(l.id)||{steps:[]};
  return`<div class="sheet-handle"></div><h3>Edit look</h3>
  <div class="field"><label>Name</label><input value="${esc(l.name)}" onchange="DB.hairLooks[${idx}].name=this.value;save()"></div>
  <div class="field"><label>Description</label><input value="${esc(l.desc)}" onchange="DB.hairLooks[${idx}].desc=this.value;save()"></div>
  <div class="sec-label" style="margin-left:0">Steps</div>
  <div class="card" style="margin:0 0 12px">${r.steps.map((s,i)=>`<div class="edit-step"><span class="nm">${i+1}. ${esc(pName(s.p))}</span>
  <button class="mini" onclick="lkMove(${idx},${i},-1)">↑</button><button class="mini" onclick="lkMove(${idx},${i},1)">↓</button>
  <button class="mini" style="color:var(--danger)" onclick="routineById(DB.hairLooks[${idx}].id).steps.splice(${i},1);save();render()">✕</button></div>`).join('')||'<div class="empty">No steps</div>'}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn sm" onclick="lkAdd(${idx})">+ Add product</button>
    <button class="btn danger sm" onclick="deleteLook(${idx})">Delete look</button>
    <button class="btn ghost sm" onclick="UI.modal=null;render()">Done</button></div>`;
}
function lkMove(idx,i,d){const r=routineById((DB.hairLooks||[])[idx]?.id);if(!r)return;const st=r.steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}
function lkAdd(idx){const l=(DB.hairLooks||[])[idx];if(!l)return;const hairP=Object.entries(DB.products).filter(([id,p])=>p.cat==='hair'&&p.active);const opts=hairP.map(([id,p],n)=>`${n+1}: ${p.brand} ${p.name}`).join('\n');const pick=prompt('Add which product?\n'+opts);const n=parseInt(pick)-1;if(n>=0&&n<hairP.length){let r=routineById(l.id);if(!r){r=R(l.id,'hair','morning',l.name,[],[]);DB.routines.push(r);}r.steps.push({p:hairP[n][0],wait:0});save();render();}}
function deleteLook(idx){if(!confirm('Delete this look?'))return;const l=DB.hairLooks[idx];DB.routines=DB.routines.filter(r=>r.id!==l.id);DB.hairLooks.splice(idx,1);UI.modal=null;save();render();}
function newLook(){const id='look-'+Date.now();DB.hairLooks.push({id,name:'New look',desc:''});DB.routines.push(R(id,'hair','morning','New look',[],[]));save();UI.modal={type:'look',idx:DB.hairLooks.length-1};render();}
function lookPickSheet(){return`<div class="sheet-handle"></div><h3>Pick a look</h3>${(DB.hairLooks||[]).map(l=>`<button class="step" style="border-bottom:1px solid var(--hairline)" onclick="UI.hairLook='${l.id}';UI.modal=null;render()"><div class="step-body"><div class="step-name">${esc(l.name)}</div><div class="step-note">${esc(l.desc)}</div></div></button>`).join('')}`;}

/* ══ PROMPTS ══ */
function claudePrompt(){
  const lines=['MY PERSONAL CARE CONTEXT — '+new Date().toLocaleDateString('en-AU'),'','SKIN PROFILE: Dry/sensitive, antihistamines, anti-ageing, no chemical smells. Melbourne AU.',''];
  DB.routines.filter(r=>r.cat==='skin').forEach(r=>{lines.push('SKIN — '+r.name+' ('+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'unassigned')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];let l=(i+1)+'. '+p.brand+' '+p.name;const np=p.next&&p.next.productId?DB.products[p.next.productId]:null;if(np)l+=' [next: '+np.brand+' '+np.name+']';else if(p.next&&p.next.name)l+=' [next: '+p.next.name+']';if(p.flags.includes('removeWhenDone'))l+=' [phasing out]';lines.push(l);});lines.push('');});
  DB.routines.filter(r=>r.cat==='hair'&&!r.id.startsWith('hair-look')).forEach(r=>{lines.push('HAIR — '+r.name+' ('+r.type+', '+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'unassigned')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push((i+1)+'. '+p.brand+' '+p.name);});lines.push('');});
  (DB.hairLooks||[]).forEach(l=>{const r=routineById(l.id);lines.push('HAIR LOOK — '+l.name+': '+(r?activeSteps(r.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name;}).join(' → '):''));});
  lines.push('');lines.push('SCENTS: '+scents().map(s=>s.brand+' '+s.name+' ('+s.tags.join('/')+')').join('; '));
  const suppProds=Object.values(DB.products).filter(p=>p.cat==='supplements'&&p.active);if(suppProds.length){lines.push('');lines.push('SUPPLEMENTS: '+suppProds.map(p=>p.brand+' '+p.name).join(', '));}
  const inactive=Object.values(DB.products).filter(p=>!p.active);if(inactive.length){lines.push('');lines.push('RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));}
  const low=lowStock();if(low.length){lines.push('');lines.push('LOW STOCK: '+low.map(([id,p])=>p.name+' (~'+Math.max(0,daysLeft(p))+'d)').join(', '));}
  return lines.join('\n');
}
function claudePromptSkin(){
  const lines=['MY SKIN ROUTINE & PRODUCTS — '+new Date().toLocaleDateString('en-AU'),'','PROFILE: Dry/sensitive, antihistamines, anti-ageing, no chemical smells. Melbourne AU.','','── PRODUCTS ──'];
  Object.values(DB.products).filter(p=>p.cat==='skin'&&p.active).forEach(p=>{lines.push('');lines.push(p.brand+' '+p.name);lines.push('Role: '+p.role);if(p.why)lines.push('Why: '+p.why);if(p.notes)lines.push('Notes: '+p.notes);const np=p.next&&p.next.productId?DB.products[p.next.productId]:null;if(np)lines.push('Replacing with: '+np.brand+' '+np.name+(p.next.why?' — '+p.next.why:''));else if(p.next&&p.next.name)lines.push('Replacing with: '+p.next.name+(p.next.why?' — '+p.next.why:''));if(p.flags.includes('removeWhenDone'))lines.push('Status: Phasing out');const dl=daysLeft(p);if(dl!==null&&dl<=30)lines.push('Stock: ~'+Math.max(0,dl)+' days left');});
  lines.push('','── ROUTINES ──');
  DB.routines.filter(r=>r.cat==='skin').forEach(r=>{lines.push('');lines.push(r.name+' ('+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'no days')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push('  '+(i+1)+'. '+p.brand+' '+p.name+(s.wait?' [wait '+fmtWait(s.wait)+']':''));});});
  const inactive=Object.values(DB.products).filter(p=>p.cat==='skin'&&!p.active);if(inactive.length){lines.push('','RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));}
  return lines.join('\n');
}
function claudePromptHair(){
  const lines=['MY HAIR ROUTINE & PRODUCTS — '+new Date().toLocaleDateString('en-AU'),'','── PRODUCTS ──'];
  Object.values(DB.products).filter(p=>p.cat==='hair'&&p.active).forEach(p=>{lines.push('');lines.push(p.brand+' '+p.name);lines.push('Role: '+p.role);if(p.why)lines.push('Why: '+p.why);if(p.notes)lines.push('Notes: '+p.notes);});
  lines.push('','── ROUTINES ──');
  DB.routines.filter(r=>r.cat==='hair'&&!r.id.startsWith('hair-look')).forEach(r=>{lines.push('');lines.push(r.name+' ('+r.type+', '+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'no days')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push('  '+(i+1)+'. '+p.brand+' '+p.name+(s.wait?' [wait '+fmtWait(s.wait)+']':''));});});
  lines.push('','── LOOKS ──');
  (DB.hairLooks||[]).forEach(l=>{const r=routineById(l.id);lines.push(l.name+': '+(r?activeSteps(r.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name;}).join(' → '):'no steps'));});
  return lines.join('\n');
}
function claudePromptScent(){
  const lines=['MY SCENT WARDROBE — '+new Date().toLocaleDateString('en-AU'),'','PROFILE: Woods, musks, earth and resin. Quiet intensity over projection.',''];
  scents().forEach(s=>{lines.push(s.brand+' '+s.name);lines.push('Character: '+s.role);if(s.why)lines.push('Why: '+s.why);if(s.tags.length)lines.push('When: '+s.tags.join(', '));if(s.notes)lines.push('Notes: '+s.notes);lines.push('');});
  const inactive=Object.values(DB.products).filter(p=>p.cat==='scent'&&!p.active);if(inactive.length)lines.push('RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));
  return lines.join('\n');
}

/* ══ BACKUP ══ */
function exportData(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='thestack-backup.json';a.click();}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{DB=migrate(JSON.parse(r.result));save();render();alert('Imported.');}catch(e){alert('Invalid file.');}};r.readAsText(f);}

/* ══ BOOT ══ */
render();
autoPull();
</script>
</body>
</html>
