html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
#app{padding-bottom:150px;min-height:100vh;position:relative;z-index:1}
body::before{content:'';position:fixed;top:-90px;left:50%;transform:translateX(-50%);width:140%;max-width:600px;height:430px;background:radial-gradient(ellipse at 50% 0%,rgba(var(--cu-rgb),.05),transparent 68%);pointer-events:none;z-index:0}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;text-align:left}
input,textarea,select{font:inherit;color:var(--ink);background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:10px;padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--cu)}
textarea{resize:vertical;min-height:70px}
::placeholder{color:var(--ink-soft)}
a{color:inherit}
.top{padding:calc(env(safe-area-inset-top,0px) + 12px) 22px 8px;display:flex;justify-content:space-between;align-items:flex-end}
.wordmark{font-family:'Fraunces',serif;font-size:20px;font-weight:400;color:var(--ink)}
.wordmark em{font-style:italic;color:var(--cu)}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-gear{width:44px;height:44px;margin:-12px -12px -12px -10px;display:flex;align-items:center;justify-content:center;color:var(--ink-mid);background:none;border:none;padding:0;flex-shrink:0;cursor:pointer;transition:color .15s}
.hdr-gear svg{width:20px;height:20px;display:block}
.hdr-gear:active{color:var(--ink-soft)}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;padding:52px 22px 4px;color:var(--ink)}
.back-btn+.page-title{padding-top:14px}
.page-sub{font-size:13px;color:var(--ink-mid);padding:0 22px 14px}
.date{font-size:11px;color:var(--ink-soft);text-align:right;line-height:1.5}
.date strong{display:block;color:var(--ink-mid);font-weight:500;font-size:12px}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:22px 22px 10px}
.card{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 10px;overflow:hidden}
.pad{padding:16px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--cu-btn);color:#f5f0e0;font-size:13px;font-weight:500;padding:11px 18px;border-radius:100px}
.btn.ghost{background:var(--bg-raise);color:var(--ink-mid);border:1px solid var(--card-edge)}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn.warn{background:transparent;color:var(--cu);border:1px solid var(--cu)}
.btn.sm{padding:7px 13px;font-size:12px}
.btn.full{width:100%;justify-content:center}
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;white-space:nowrap}
.c-cu{background:rgba(var(--cu-rgb),.12);color:var(--cu)}
.c-mute{background:var(--bg-raise);color:var(--ink-soft);border:1px solid var(--card-edge)}
.c-danger{background:rgba(201,123,110,.12);color:var(--danger)}
.c-done{background:rgba(var(--cu-rgb),.15);color:var(--cu)}
/* streak */
.streak-card{margin:10px 22px;background:var(--card);border:1px solid var(--card-edge);border-radius:18px;padding:22px 20px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.streak-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(var(--cu-rgb),.1) 0%,transparent 70%);pointer-events:none}
.streak-num{font-family:'Fraunces',serif;font-size:48px;font-weight:400;color:var(--cu);line-height:1}
.streak-body{flex:1}
.streak-eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
.streak-sub{font-size:11px;color:var(--ink-mid);margin-top:3px}
.streak-dots{display:flex;gap:5px;margin-top:8px}
.sdot{width:9px;height:9px;border-radius:50%;transition:all .2s}
.sdot.on{background:var(--cu)}
.sdot.today{background:var(--cu);box-shadow:0 0 8px rgba(var(--cu-rgb),.5)}
.sdot.off{background:var(--hairline)}
@keyframes sdot-p{0%,100%{opacity:1}50%{opacity:.3}}
.sdot.pulse{animation:sdot-p 1.8s ease-in-out infinite}
@keyframes clist-out{to{max-height:0;opacity:0;padding:0}}
.prog-row{display:flex;gap:6px;margin:6px 22px 0}
.prog-item{flex:1;background:var(--card);border:1px solid var(--card-edge);border-radius:10px;padding:10px 10px 8px}
.prog-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:3px}
.prog-val{font-size:13px;font-weight:500;color:var(--ink)}
.prog-bar{height:3px;background:var(--hairline);border-radius:2px;margin-top:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--cu);transition:width .4s ease}
/* hero */
.hero{margin:10px 22px 0;background:linear-gradient(145deg,var(--card) 0%,var(--bg-raise) 100%);border:1px solid var(--card-edge);border-radius:20px;padding:20px 20px 18px;position:relative;overflow:hidden;display:block;width:calc(100% - 44px)}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(var(--cu-rgb),.08) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--cu);margin-bottom:7px}
.hero h2{font-family:'Fraunces',serif;font-weight:400;font-size:24px;line-height:1.18;margin-bottom:3px;color:var(--ink)}
.hero .sub{font-size:12px;color:var(--ink-mid);margin-bottom:16px}
/* rows */
.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px 15px;margin:0 22px 8px;width:calc(100% - 44px)}
.row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ri-skin{background:rgba(var(--cu-rgb),.1)}.ri-hair{background:rgba(160,139,192,.1)}.ri-scent{background:rgba(45,200,180,.07)}.ri-refresh{background:rgba(var(--cu-rgb),.08)}
.row-body{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:500;color:var(--ink)}
.row-sub{font-size:12px;color:var(--ink-mid);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert{margin:6px 22px 8px;display:flex;gap:11px;align-items:flex-start;background:rgba(var(--cu-rgb),.07);border:1px solid rgba(var(--cu-rgb),.2);border-radius:14px;padding:12px 14px;font-size:12.5px;color:var(--ink-mid);width:calc(100% - 44px)}
.alert b{color:var(--cu);font-weight:600}
.warn-banner{margin:0 22px 10px;display:flex;gap:11px;align-items:flex-start;background:rgba(201,123,110,.07);border:1px solid rgba(201,123,110,.2);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--ink-mid);width:calc(100% - 44px)}
/* stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:0 22px 10px}
.stat-item{background:var(--card);border:1px solid var(--card-edge);border-radius:12px;padding:12px 10px}
.stat-num{font-family:'Fraunces',serif;font-size:26px;font-weight:400;color:var(--cu);line-height:1}
.stat-label{font-size:10px;color:var(--ink-soft);margin-top:3px;font-weight:500}
/* today / checklist */
@keyframes page-up{from{transform:translateY(100vh)}to{transform:translateY(0)}}
.page-up{animation:page-up .52s cubic-bezier(.32,.72,0,1)}
@keyframes ddscrim{0%{opacity:0}12%{opacity:1}82%{opacity:1}100%{opacity:0}}
.dd-scrim{position:fixed;inset:0;z-index:59;background:rgba(8,8,10,.28);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);animation:ddscrim 2.5s ease forwards;pointer-events:none}
@keyframes rd{0%{opacity:0;transform:translate(-50%,-50%) scale(.88)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}78%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.97)}}
@keyframes rd-ring{from{stroke-dashoffset:94}to{stroke-dashoffset:0}}
.routine-done{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);z-index:59;background:var(--card);border:1px solid var(--card-edge);border-radius:100px;padding:11px 22px 11px 13px;display:flex;align-items:center;gap:11px;box-shadow:0 14px 40px rgba(0,0,0,.4);animation:rd 1.7s ease forwards;pointer-events:none}
.rd-ring{position:relative;width:34px;height:34px;flex-shrink:0}
.rd-ring svg{width:34px;height:34px;display:block}
.rd-track{stroke:var(--hairline);stroke-width:2.5;fill:none}
.rd-arc{stroke:var(--cu);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-dasharray:94;stroke-dashoffset:94;animation:rd-ring .45s cubic-bezier(.4,0,.2,1) .1s forwards;transform:rotate(-90deg);transform-origin:center}
.rd-tick{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--cu);opacity:0;animation:dd-tick .3s cubic-bezier(.3,1.4,.4,1) .45s forwards}
.rd-label{font-size:13.5px;font-weight:500;color:var(--ink);white-space:nowrap}
@keyframes dd{0%{opacity:0;transform:translate(-50%,-50%) scale(.85)}12%{opacity:1;transform:translate(-50%,-50%) scale(1)}82%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.97)}}
@keyframes dd-ring{from{stroke-dashoffset:151}to{stroke-dashoffset:0}}
@keyframes dd-tick{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
@keyframes dd-pulse{from{box-shadow:0 0 0 0 rgba(var(--cu-rgb),.3)}to{box-shadow:0 0 0 44px rgba(var(--cu-rgb),0)}}
.day-done{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);z-index:59;background:var(--card);border:1px solid var(--card-edge);border-radius:22px;padding:24px 34px 20px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:dd 2.5s ease forwards;pointer-events:none}
.dd-ring{position:relative;width:64px;height:64px;border-radius:50%;animation:dd-pulse .9s ease-out .5s 1;margin-bottom:6px}
.dd-ring svg{width:64px;height:64px;display:block}
.dd-track{stroke:var(--hairline);stroke-width:3;fill:none}
.dd-arc{stroke:var(--cu);stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:151;stroke-dashoffset:151;animation:dd-ring .75s cubic-bezier(.4,0,.2,1) .2s forwards;transform:rotate(-90deg);transform-origin:center}
.dd-tick{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--cu);opacity:0;animation:dd-tick .35s cubic-bezier(.3,1.4,.4,1) .65s forwards}
.dd-title{font-family:'Fraunces',serif;font-size:17px;color:var(--ink)}
.dd-sub{font-size:12px;color:var(--ink-mid)}
@keyframes ack-pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
.ack-pop{display:inline-block;animation:ack-pop .45s cubic-bezier(.3,1.4,.4,1)}
@keyframes tabfade{from{opacity:.35;transform:translateY(6px)}to{opacity:1;transform:none}}
#app.tab-fade{animation:tabfade .22s ease}
@keyframes page-down{from{transform:translateY(0)}to{transform:translateY(100vh)}}
.page-down{animation:page-down .42s cubic-bezier(.32,.72,0,1) forwards}
.page-down-ghost{animation:page-down .42s cubic-bezier(.32,.72,0,1) forwards}
.today-sheet{position:relative;background:var(--bg-raise);border:1px solid var(--card-edge);border-bottom:none;border-radius:24px 24px 0 0;margin-top:calc(env(safe-area-inset-top,0px) + 48px);margin-bottom:-150px;padding-bottom:170px;min-height:calc(100vh - env(safe-area-inset-top,0px) - 48px)}
.bg-ghost{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:var(--bg)}
.bg-ghost>div{filter:blur(11px) brightness(.72);will-change:filter}
.today-sheet::before{content:'';position:absolute;top:0;left:0;right:0;height:400px;border-radius:24px 24px 0 0;background:radial-gradient(ellipse at 50% 0%,rgba(var(--cu-rgb),.06),transparent 70%);pointer-events:none}
.sheet-close-tap{display:block;width:100%;padding:14px 0 8px;background:none;border:none;cursor:pointer}
.sheet-close-tap .sheet-handle{margin:0 auto}
.sheet-close-tap:active .sheet-handle{background:var(--ink-soft)}
.today-sheet .today-sticky{background:var(--bg-raise);top:0}
.today-sheet .today-header{padding-top:4px}
.statusbar-scrim{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top,0px);background:var(--bg);z-index:56;pointer-events:none}
.today-sticky{position:sticky;top:0;z-index:10;background:var(--bg);padding:0 0 2px}
.today-sticky::after{content:'';display:block;height:1px;background:linear-gradient(to bottom,var(--card-edge),transparent)}
.today-header{padding:calc(env(safe-area-inset-top,0px) + 12px) 22px 8px;display:flex;justify-content:space-between;align-items:flex-end}
.today-close{font-size:13px;color:var(--ink-mid);padding:4px 0}
.checklist{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 14px;overflow:hidden}
.citem{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--hairline);width:100%;background:none;text-align:left;transition:background .12s}
.citem:last-child{border-bottom:none}
.citem:active{background:rgba(var(--cu-rgb),.04)}
.ccheck{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--card-edge);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink);transition:all .2s cubic-bezier(.3,1.2,.4,1)}
.ccheck.done{background:var(--cu-btn);border-color:var(--cu-btn);color:#fff}
.ccheck.applied{background:rgba(var(--cu-rgb),.18);border-color:var(--cu);color:var(--cu)}
.cbody{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500;color:var(--ink);transition:all .2s}
.cname.done{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--card-edge)}
.cnote{font-size:11px;color:var(--ink-mid);margin-top:1px}
.cnote.done{color:var(--hairline)}
.citem-row{display:flex;align-items:stretch;border-bottom:1px solid var(--hairline)}
.citem-row:last-child{border-bottom:none}
.citem-tick{flex:1;display:flex;align-items:flex-start;gap:13px;padding:14px 12px 14px 16px;background:none;text-align:left;transition:background .12s;cursor:pointer}
.citem-tick:active{background:rgba(var(--cu-rgb),.04)}
.citem-info{width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);border-left:1px solid var(--hairline);background:none;flex-shrink:0;font-size:16px;cursor:pointer}
.citem-info:active{background:rgba(var(--cu-rgb),.04)}
.citem-peek{width:32px;min-height:44px;display:flex;align-items:center;justify-content:center;color:var(--cu);background:none;flex-shrink:0;font-size:12px;cursor:pointer;border-left:1px solid var(--hairline)}
.citem-peek:active{background:rgba(var(--cu-rgb),.04)}
.psteps{margin-top:5px}
.pstep{font-size:11.5px;display:flex;gap:6px;margin-bottom:3px;align-items:flex-start}
.pstep-num{color:var(--cu);font-size:10px;font-weight:700;min-width:14px;padding-top:1px}
.pstep-text{color:var(--ink-mid);line-height:1.4;flex:1}
.pstep-text.done{color:var(--hairline)}
.wleg{display:flex;align-items:center;gap:12px;padding:0 16px;height:24px}
.wleg.active{height:30px}
.wleg-line{width:24px;display:flex;justify-content:center;flex-shrink:0;height:100%}
.wleg-line i{display:block;width:2px;border-radius:2px;background:var(--hairline);height:100%}
.wleg.active .wleg-line i{background:linear-gradient(to bottom,var(--cu),rgba(var(--cu-rgb),.12))}
.wleg span{font-size:11px;font-weight:500;color:var(--ink-soft)}
.wleg.active span{font-size:12px;font-weight:600;color:var(--cu);font-variant-numeric:tabular-nums}
.srow{position:relative;overflow:hidden;border-bottom:1px solid var(--hairline)}
.srow:last-child{border-bottom:none}
.srow .citem-row{border-bottom:none;background:var(--card);position:relative;z-index:1}
.srow-under{position:absolute;inset:0;background:rgba(var(--cu-rgb),.16);display:flex;align-items:center;justify-content:flex-start;padding-left:22px;color:var(--cu);font-weight:700}
.srow:has(+ .wleg){border-bottom:none}
.complete-btns{margin:0 22px 14px;display:flex;gap:8px}
.scent-today{background:var(--card);border:1px solid var(--card-edge);border-radius:14px;margin:0 22px 10px;padding:15px 16px;width:calc(100% - 44px)}
.scent-today .nm{font-family:'Fraunces',serif;font-size:17px;color:var(--ink)}
.scent-today .br{font-size:11px;color:var(--ink-mid);margin-bottom:3px}
.scent-today .ds{font-size:12px;color:var(--ink-mid)}

/* global timer FAB — visible across all screens when timer running */
.fab-global{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);height:38px;border-radius:100px;background:var(--card);color:var(--cu);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:1px solid var(--card-edge);box-shadow:0 6px 20px rgba(0,0,0,.35);z-index:58;padding:0 16px;gap:7px;cursor:pointer}
.fab-global-t{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}

/* steps (read-only) */
.steps{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 14px;overflow:hidden}
.step{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--hairline);width:100%}
.step:last-child{border-bottom:none}
.step-num{font-size:10px;font-weight:600;color:var(--ink-soft);min-width:16px;padding-top:3px}
.step-body{flex:1;min-width:0}
.step-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.step-note{font-size:11.5px;color:var(--ink-mid);margin-top:2px}
.step-arrow{color:var(--ink-soft);font-size:13px;padding-top:3px}
.wait{display:flex;align-items:center;gap:8px;padding:0 16px;font-size:10.5px;color:var(--ink-soft);background:var(--bg-raise)}
.wait::before,.wait::after{content:'';flex:1;border-top:1px dashed var(--card-edge)}
.wait span{padding:5px 0}
.swap-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:20px;padding:2px 8px;margin-top:5px;font-size:10.5px;color:var(--cu);font-weight:500}
.seg{display:flex;background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:12px;padding:3px;margin:0 22px 14px;width:calc(100% - 44px)}
.seg button{flex:1;text-align:center;font-size:12px;font-weight:500;padding:9px 4px;border-radius:9px;color:var(--ink-mid)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* settings */
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--hairline);width:100%}
.menu-item:last-child{border-bottom:none}
.menu-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.menu-body{flex:1;min-width:0}
.menu-title{font-size:14px;font-weight:500;color:var(--ink)}
.menu-sub{font-size:12px;color:var(--ink-mid);margin-top:1px}
.menu-arrow{color:var(--ink-soft);font-size:16px}
.sched-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--hairline);gap:10px}
.sched-row:last-child{border-bottom:none}
.sched-day-label{font-size:13px;font-weight:600;min-width:36px;color:var(--ink)}
.sched-slots{flex:1;display:flex;flex-direction:column;gap:6px}
.sched-slot{display:flex;align-items:center;gap:8px}
.sched-slot-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);min-width:32px}
.sched-slot select{flex:1;font-size:12px;padding:6px 10px}
.day-pills{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.day-pill{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--bg-raise);border:1.5px solid var(--card-edge);color:var(--ink-soft)}
.day-pill.on{background:rgba(var(--cu-rgb),.15);border-color:var(--cu);color:var(--cu)}
/* ── onboarding + assistant ── */
.ob-top{padding:52px 22px 0}
.back-btn+.ob-top{padding-top:14px}
.ob-step{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
.ob-leave-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ob-leave{background:transparent;border:0;color:var(--ink-soft);font-size:12.5px;font-weight:500;padding:4px 0;cursor:pointer}
.ob-leave:active{color:var(--ink-mid)}
.ob-prog{height:4px;background:var(--card-edge);border-radius:2px;overflow:hidden;margin-bottom:4px}
.ob-prog i{display:block;height:100%;background:var(--cu);border-radius:2px;transition:width .3s}
.ob-q{font-family:'Fraunces',serif;font-size:23px;font-weight:400;line-height:1.3;color:var(--ink);padding:20px 22px 4px}
.ob-hint{font-size:13px;color:var(--ink-mid);padding:0 22px 18px}
.ob-body{padding:0 22px 130px}
.oc{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px}
.oc-chip{padding:11px 15px;border-radius:100px;border:1.5px solid var(--card-edge);background:var(--bg-raise);color:var(--ink);font-size:14px;cursor:pointer;transition:.12s}
.oc-chip.on{background:rgba(var(--cu-rgb),.16);border-color:var(--cu);color:var(--cu);font-weight:500}
.ob-free{width:100%;min-height:64px;font-size:14px;margin-top:2px}
.ob-known{background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.ob-known .k-h{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:9px}
.ob-known .k-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;font-size:13.5px}
.ob-known .k-row+.k-row{border-top:1px solid var(--hairline)}
.ob-known .k-name{color:var(--ink);flex:1;min-width:0}
.ob-sat{display:flex;gap:5px;flex:0 0 auto}
.ob-sat span{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--bg-raise);border:1px solid var(--card-edge);color:var(--ink-soft);cursor:pointer}
.ob-sat span.on{background:rgba(var(--cu-rgb),.16);border-color:var(--cu);color:var(--cu)}

function weeklyUses(pid){let n=0;DB.routines.forEach(r=>{if((r.steps||[]).some(st=>st.p===pid))n+=(r.days||[]).length;});return n;}
function usesSince(pid,since){let n=0;for(const k in DB.completions){const c=DB.completions[k];if(!c||!c.steps)continue;const ds=k.slice(k.lastIndexOf('_')+1);const t=Date.parse(ds);if(isNaN(t)||t<since-86400000)continue;if(c.steps.some(st=>st.p===pid&&st.done))n++;}return n;}
function daysLeft(p,pid){
  if(!p.durationDays)return null;
  const cal=Math.round(p.durationDays-(Date.now()-p.restockedAt)/86400000);
  if(!pid)return cal;
  const f=weeklyUses(pid)/7;
  if(!f||f>=0.99)return cal;
  const used=usesSince(pid,p.restockedAt);
  const elapsedSched=((Date.now()-p.restockedAt)/86400000)*f;
  const consumed=used>0?used:elapsedSched;
  return Math.round((p.durationDays-consumed)/f);
}
function lowStock(){return Object.entries(DB.products).filter(([id,p])=>{if(!p.active)return false;const d=daysLeft(p,id);return d!==null&&d<=14;});}
function pName(id){const p=DB.products[id];return p?p.name:'?';}
function routineById(id){return DB.routines.find(r=>r.id===id);}
function routineForDay(day,type,cat){return DB.routines.find(r=>r.cat===cat&&r.type===type&&r.days.includes(day))||null;}
function routinesOf(cat,type){return DB.routines.filter(r=>r.cat===cat&&r.type===type);}
function queuedIds(){return new Set(Object.values(DB.products).filter(p=>p.next&&p.next.productId).map(p=>p.next.productId));}
function activeSteps(steps){const q=queuedIds();return(steps||[]).filter(s=>{const p=DB.products[s.p];return p&&p.active&&!q.has(s.p);});}
function scents(){return Object.entries(DB.products).filter(([id,p])=>p.cat==='scent'&&p.active).map(([id,p])=>({id,...p}));}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function suggestScent(goingOut){
  const day=new Date().getDay(),h=new Date().getHours(),sc=scents();
  const tags=goingOut?['occasion','evening']:h>=17?['evening']:(day===0||day===6)?['weekend','casual']:['weekday','office','daily'];
  for(const t of tags){const m=sc.find(s=>s.tags.includes(t));if(m)return m;}
  return sc[0]||null;
}

function haptic(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

function celebrateDay(){
  const streak=calcStreak()+1;
  const scrim=document.createElement('div');
  scrim.className='dd-scrim';
  document.body.appendChild(scrim);
  setTimeout(()=>scrim.remove(),2600);
  const el=document.createElement('div');

  el.innerHTML=`<div class="dd-ring"><svg viewBox="0 0 64 64"><circle class="dd-track" cx="32" cy="32" r="24"/><circle class="dd-arc" cx="32" cy="32" r="24"/></svg><span class="dd-tick">✓</span></div>
  <div class="dd-title">Day complete</div>
  <div class="dd-sub">${streak} day streak</div>`;
  document.body.appendChild(el);

}
function compKey(rid,date){return rid+'_'+(date||todayStr());}
function getComp(rid,date){return DB.completions[compKey(rid,date)]||null;}
function isRoutineComplete(rid,date){const c=getComp(rid,date);return!!(c&&c.completedAt);}
function scheduledForDay(day){
  const scope=DB.settings?.streakScope||{skin:true};
  const slots=[];
  if(scope.skin!==false){slots.push(['morning','skin'],['evening','skin']);}
  if(scope.hair){slots.push(['morning','hair'],['evening','hair']);}
  return slots.map(([type,cat])=>routineForDay(day,type,cat)).filter(Boolean);
}
function allScheduledForDay(day){
  const slots=[['morning','skin'],['evening','skin'],['morning','hair'],['evening','hair']];
  const rs=slots.map(([type,cat])=>routineForDay(day,type,cat)).filter(Boolean);
  DB.routines.filter(r=>r.cat==='supplements'&&r.days.includes(day)).forEach(r=>rs.push(r));
  const tR={morning:0,evening:1};const cR={skin:0,hair:1,supplements:2,scent:3};
  rs.sort((a,b)=>(tR[a.type]??2)-(tR[b.type]??2)||(cR[a.cat]??4)-(cR[b.cat]??4));
  return rs;
}
function dayComplete(day,ds){const rs=scheduledForDay(day);return rs.length>0&&rs.every(r=>isRoutineComplete(r.id,ds));}
function calcStreak(){
  const now=new Date();let streak=0;
  const allow=DB.settings?.graceDaysPerMonth??1;const used={};
  for(let i=1;i<=365;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const rs=scheduledForDay(d.getDay());
    if(!rs.length)continue;
    if(rs.every(r=>isRoutineComplete(r.id,ds))){streak++;continue;}
    const mk=ds.slice(0,7);
    if((used[mk]||0)<allow){used[mk]=(used[mk]||0)+1;continue;}
    break;
  }
  return streak;
}
function todayDoneCount(){return scheduledForDay(new Date().getDay()).filter(r=>isRoutineComplete(r.id,todayStr())).length;}
function todayTotalCount(){return scheduledForDay(new Date().getDay()).length;}
function weekStats(){
  const now=new Date();let done=0,total=0;
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const rs=scheduledForDay(d.getDay());total+=rs.length;rs.forEach(r=>{if(isRoutineComplete(r.id,ds))done++;});
  }
  return{done,total};
}
function bestStreak(){
  const now=new Date();let best=0,cur=0;
  const allow=DB.settings?.graceDaysPerMonth??1;const used={};
  for(let i=0;i<90;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const rs=scheduledForDay(d.getDay());
    if(!rs.length)continue;
    if(rs.every(r=>isRoutineComplete(r.id,ds))){cur++;best=Math.max(best,cur);continue;}
    const mk=ds.slice(0,7);
    if((used[mk]||0)<allow){used[mk]=(used[mk]||0)+1;continue;}
    cur=0;
  }
  return best;
}
function checklistState(rid,date){
  const r=routineById(rid);if(!r)return[];
  const steps=activeSteps(r.steps);
  const c=getComp(rid,date);
  const si={};
  (c&&c.steps||[]).forEach(s=>{si[s.p]={done:s.done,state:s.state||(s.done?'done':null),appliedAt:s.appliedAt||null};});
  return steps.map(s=>({...s,...(si[s.p]||{done:false,state:null,appliedAt:null})}));
}
function tickStep(rid,productId,dateStr){
  const date=dateStr||UI.todayDate||todayStr();
  const r=routineById(rid);if(!r)return;
  const steps=activeSteps(r.steps);
  const c=getComp(rid,date)||{completedAt:null,steps:[]};
  const wasComplete=!!c.completedAt;
  const rStep=steps.find(s=>s.p===productId);
  const hasWait=rStep&&(rStep.wait||0)>0;
  const sm={};
  (c.steps||[]).forEach(s=>{sm[s.p]={state:s.state||(s.done?'done':null),appliedAt:s.appliedAt||null};});
  const cur=(sm[productId]||{}).state||null;
  if(cur===null){
    sm[productId]={state:hasWait?'applied':'done',appliedAt:hasWait?Date.now():null};
    const idx=steps.findIndex(s=>s.p===productId);
    steps.slice(0,idx).forEach(s=>{if((sm[s.p]||{}).state==='applied')sm[s.p]={state:'done',appliedAt:(sm[s.p]||{}).appliedAt||null};});
  } else {
    sm[productId]={state:null,appliedAt:null};
  }
  c.steps=steps.map(s=>{const st=sm[s.p]||{state:null,appliedAt:null};return{p:s.p,done:st.state==='applied'||st.state==='done',state:st.state,appliedAt:st.appliedAt};});
  const allDone=steps.every(s=>{const st=(sm[s.p]||{}).state;return st==='applied'||st==='done';});
  if(allDone&&!wasComplete)c.completedAt=Date.now();
  if(!allDone)c.completedAt=null;
  DB.completions[compKey(rid,date)]=c;
  save();UI.todayScrollTo=null;
  if(allDone&&!wasComplete){
    UI._justCompleted=rid;
    const dp=date.split('-');const ddow=new Date(+dp[0],+dp[1]-1,+dp[2]).getDay();
    const isDayDone=dayComplete(ddow,date);
    haptic(isDayDone?[20,40,20,40,40]:[15,30,15]);
    if(date===todayStr()){if(isDayDone)celebrateDay();else celebrateRoutine(r.name);}
  } else if(cur===null){haptic(10);}
  if(allDone&&!wasComplete){
    const el=document.getElementById('clist-'+rid);
    if(el){
      const h=el.offsetHeight;el.style.overflow='hidden';el.style.maxHeight=h+'px';el.style.transition='max-height 250ms ease-out,opacity 250ms ease-out';
      if(!UI.todayExpanded)UI.todayExpanded={};delete UI.todayExpanded[rid];
      requestAnimationFrame(()=>{el.style.maxHeight='0';el.style.opacity='0';});
      setTimeout(()=>renderTodayPage(),270);return;
    }
  }
  renderTodayPage();
}
function completeAll(rid){completeAllDate(rid,todayStr());}
function uncompleteRoutine(rid){uncompleteRoutineDate(rid,todayStr());}
function completeAllDate(rid,dateStr){
  const r=routineById(rid);if(!r)return;
  DB.completions[compKey(rid,dateStr)]={completedAt:Date.now(),steps:activeSteps(r.steps).map(s=>({p:s.p,done:true,state:'done',appliedAt:null}))};
  UI._justCompleted=rid;
  const dp=dateStr.split('-');const ddow=new Date(+dp[0],+dp[1]-1,+dp[2]).getDay();
  const isDayDone=dayComplete(ddow,dateStr);
  haptic(isDayDone?[20,40,20,40,40]:[15,30,15]);
  if(dateStr===todayStr()){if(isDayDone)celebrateDay();else celebrateRoutine(r.name);}
  UI.todayScrollTo=null;save();renderTodayPage();
}
function uncompleteRoutineDate(rid,dateStr){
  delete DB.completions[compKey(rid,dateStr)];
  UI.todayScrollTo=null;save();renderTodayPage();
}

let syncTimer=null;
function schedSync(){if(!DB.settings.syncUrl)return;clearTimeout(syncTimer);syncTimer=setTimeout(syncPushSilent,2500);}
async function syncPushSilent(){if(!DB.settings.syncUrl)return;try{await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});}catch(e){}}
async function syncPush(){if(!DB.settings.syncUrl)return false;try{const r=await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});return r.ok?true:'HTTP '+r.status;}catch(e){return 'network error';}}
async function syncPull(force=false){
  if(!DB.settings.syncUrl){alert('Set a sync URL in Setup first.');return;}
  let r;try{r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin},cache:'no-store'});}catch(e){alert('Pull failed — network error: '+(e.message||e));return;}
  if(!r.ok){alert('Pull failed — HTTP '+r.status+(r.status===401?' (PIN mismatch)':''));return;}
  let remote;try{remote=await r.json();}catch(e){alert('Pull failed — bad JSON');return;}
  if(!remote){alert('Nothing on server yet.');return;}
  if(force||remote.updatedAt>=(DB.updatedAt||0)){
    DB=migrate(remote);localStorage.setItem('stack_v1',JSON.stringify(DB));render();
    alert('Pulled — data is up to date.');
  } else {
    alert('Server copy is older than this device — kept local data. Use Push to update the server.');
  }
}
async function autoPull(){
  if(!DB.settings.syncUrl)return;
  try{const r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin},cache:'no-store'});if(!r.ok)return;const remote=await r.json();if(remote&&remote.updatedAt>=(DB.updatedAt||0)&&!UI.modal&&UI.tab!=='today'&&UI.tab!=='runner'){DB=migrate(remote);localStorage.setItem('stack_v1',JSON.stringify(DB));render();}}catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){autoPull();}
  else{clearTimeout(syncTimer);syncTimer=null;if(DB.settings.syncUrl){try{fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB),keepalive:true});}catch(e){}}}
});

function render(){
  // Save current scroll before re-rendering (skipped when we intend to restore an exact position)
  if(!UI._scrollPositions)UI._scrollPositions={};
  const curKey=UI.tab+(UI.setupPage||'');
  if(!UI._scrollRestoring&&UI._keepScroll==null)UI._scrollPositions[curKey]=window.scrollY;
  const app=document.getElementById('app');
  if(UI.tab==='home')app.innerHTML=vHome();
  else if(UI.tab==='today')app.innerHTML=vToday();
  else if(UI.tab==='runner')app.innerHTML=vRunner();
  else if(UI.tab==='routines')app.innerHTML=vRoutines();
  else if(UI.tab==='setup')app.innerHTML=vSetupRouter();
  else if(UI.tab==='scent')app.innerHTML=vScent();
  else if(UI.tab==='history')app.innerHTML=vHistory();
  else if(UI.tab==='assistant')app.innerHTML=vAssistant();
  else app.innerHTML=vHome();
  app.classList.remove('tab-fade');
  if(UI._tabFade){void app.offsetWidth;app.classList.add('tab-fade');UI._tabFade=false;}
  renderTabs();renderModal();
  if(UI.tab==='today'||UI.tab==='runner'||UI.tab==='scent'||UI.tab==='history')attachSheetSwipe();
  // Wake lock follows the checklist views
  if(UI.tab==='today'||UI.tab==='runner')acquireWakeLock();else releaseWakeLock();
  // Scroll handling: exact-restore (mid-checklist re-render) > evening auto-scroll > per-tab restore > top
  const scrollKey=UI.tab+(UI.setupPage||'');
  if(UI._keepScroll!=null){
    const y=UI._keepScroll;UI._keepScroll=null;UI._scrollRestoring=false;
    requestAnimationFrame(()=>window.scrollTo(0,y));
  } else if(UI._scrollPositions&&UI._scrollPositions[scrollKey]!==undefined&&UI._scrollRestoring){
    requestAnimationFrame(()=>window.scrollTo(0,UI._scrollPositions[scrollKey]));
    UI._scrollRestoring=false;
  } else if(!UI._scrollRestoring){
    window.scrollTo(0,0);
  } else {UI._scrollRestoring=false;}
  updateWaitDisplay();
}
function renderTabs(){
  const ts=[['home',HOME_SVG,'Home'],['today',TODAY_SVG,'Today'],['routines',LIST_SVG,'Routines'],['assistant',FACET_SVG,'Assistant']];
  document.getElementById('tabs').style.display=(UI.tab==='setup'||(UI.tab==='assistant'&&(!profileComplete()||UI._view==='chat')))?'none':'';
  document.getElementById('tabs').innerHTML=ts.map(([k,ic,l])=>{
    const active=UI.tab===k;
    return`<button class="tab ${active?'active':''}" data-call="navTab" data-args="${k}"><span class="ic">${ic}</span><span class="tab-label">${l}</span></button>`;
  }).join('');
}

function leaveToday(fn){
  const sheet=document.querySelector('.today-sheet');
  if((UI.tab==='today'||UI.tab==='runner'||UI.tab==='scent'||UI.tab==='history')&&sheet&&!UI._exitingToday){
    UI._exitingToday=true;
    removeBgGhost();
    const r=sheet.getBoundingClientRect();
    const ghost=document.createElement('div');
    ghost.style.cssText=`position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;height:${r.height}px;z-index:40;pointer-events:none;overflow:hidden`;
    const clone=sheet.cloneNode(true);
    clone.classList.remove('page-up');
    clone.style.margin='0';
    clone.style.transform='none';
    clone.style.transition='none';
    ghost.appendChild(clone);
    document.body.appendChild(ghost);
    fn();
    requestAnimationFrame(()=>{ghost.classList.add('page-down-ghost');});
    setTimeout(()=>{ghost.remove();UI._exitingToday=false;},440);
  } else {removeBgGhost();fn();}
}

function attachSheetSwipe(){
  const sheet=document.querySelector('.today-sheet');
  if(!sheet||sheet._swipeBound)return;
  sheet._swipeBound=true;
  let sx=0,sy=0,armed=false,dragging=false,dead=false,dy=0,lastY=0,lastT=0,vel=0;
  sheet.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    lastY=sy;lastT=e.timeStamp;vel=0;dy=0;dragging=false;dead=false;
    armed=window.scrollY<=2&&!UI._exitingToday;
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!armed||dead)return;
    const y=e.touches[0].clientY;
    const dx=e.touches[0].clientX-sx;
    dy=y-sy;
    vel=(y-lastY)/Math.max(1,e.timeStamp-lastT);
    lastY=y;lastT=e.timeStamp;
    if(!dragging){
      if(dy<-6||Math.abs(dx)>Math.abs(dy)+6){dead=true;return;}
      if(dy>6){dragging=true;sheet.style.transition='none';}
      else return;
    }
    e.preventDefault();
    sheet.style.transform=`translateY(${Math.max(0,dy)}px)`;
  },{passive:false});
  sheet.addEventListener('touchend',()=>{
    if(!dragging){armed=false;return;}
    dragging=false;armed=false;
    const shouldDismiss=dy>140||(dy>60&&vel>0.5);
    if(shouldDismiss){
      dismissSheet();
    }else{
      sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
      sheet.style.transform='translateY(0)';
      setTimeout(()=>{sheet.style.transition='';sheet.style.transform='';},320);
    }
  },{passive:true});
}
function dismissSheet(){
  const ret=UI._sheetReturn;
  if(ret&&(ret.tab==='setup'||ret.tab==='history')){
    saveScroll();
    leaveToday(()=>{UI.tab=ret.tab;UI.setupPage=ret.tab==='setup'?(ret.setupPage||null):null;UI.runnerId=null;UI._scrollRestoring=true;UI._tabFade=true;render();});
  } else {
    navTab(ret&&(ret.tab==='home'||ret.tab==='routines')?ret.tab:'home');
  }
}

let _wakeLock=null;
async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator&&!_wakeLock){
      _wakeLock=await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
    }
  }catch(e){}
}
function releaseWakeLock(){

function vToday(){
  const enter=UI._todayEnter;UI._todayEnter=false;
  const justC=UI._justCompleted;UI._justCompleted=null;
  const dateStr=UI.todayDate||todayStr();
  const now=new Date();

  // Parse the selected date to get day-of-week
  const parts=dateStr.split('-');
  const selDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const day=selDate.getDay();

  // Date nav helpers
  function offsetDate(ds,delta){
    const p=ds.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    d.setDate(d.getDate()+delta);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function fmtDate(ds){
    const p=ds.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    if(ds===todayDate)return'Today';
    const yesterday=offsetDate(todayDate,-1);
    if(ds===yesterday)return'Yesterday';
    return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  }
  const prevDate=offsetDate(dateStr,-1);
  const nextDate=offsetDate(dateStr,1);
  const canGoForward=nextDate<=todayDate; // don't allow future dates beyond today

  const skinMR=routineForDay(day,'morning','skin');
  const hairMR=routineForDay(day,'morning','hair');
  const skinER=routineForDay(day,'evening','skin');
  const hairER=routineForDay(day,'evening','hair');

  const done=scheduledForDay(day).filter(r=>isRoutineComplete(r.id,dateStr)).length;
  const total=scheduledForDay(day).length;

  function routineSection(r,label,sectionId){
    if(!r)return'';
    const isDone=isRoutineComplete(r.id,dateStr);
    const isExpanded=!isDone||(UI.todayExpanded&&UI.todayExpanded[r.id]);
    if(isDone&&!isExpanded){
      return`<button class="day-section today-section" style="width:calc(100% - 44px);background:none;border:none;cursor:pointer;padding:0;text-align:left" data-call="todayExpand" data-args="${r.id}|1">

        <span class="${justC===r.id?'ack-pop':''}" style="font-size:11px;font-weight:600;color:var(--cu);white-space:nowrap;flex-shrink:0">✓</span>

    }

      </button>`;
    }
    return`<div class="day-section today-section" id="${sectionId}">

  } else if(hairER){

  }
  suppER.forEach(r=>{out+=routineSection(r,`Supplements — ${r.name} · Evening`,'');});
  if(!skinER&&!hairER&&!suppER.length){
    out+=`<div class="empty" style="margin:20px 22px;font-size:13px;color:var(--ink-soft)">Nothing scheduled this evening</div>`;
  }

  out+=`<div class="sec-label" style="margin:22px 22px 8px">Journal</div>

  </div>`;

  // Scent lives on Home screen only

/* ══ TIMER — wait countdown ══ */
function fmtCountdown(ms){const s=Math.max(0,Math.ceil(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
let _waitInt=null;
function startWaitInterval(){if(_waitInt)return;_waitInt=setInterval(updateWaitDisplay,1000);}
function stopWaitInterval(){if(_waitInt){clearInterval(_waitInt);_waitInt=null;}}
function updateWaitDisplay(){
  const date=UI.todayDate||todayStr();
  let minRem=Infinity,anyActive=false;
  DB.routines.forEach(r=>{
    const c=getComp(r.id,date);if(!c||!c.steps)return;
    c.steps.forEach(step=>{
      if(step.state!=='applied'||!step.appliedAt)return;
      const def=(r.steps||[]).find(x=>x.p===step.p);
      const w=def?(def.wait||0):0;
      if(!w)return;
      const rem=w*1000-(Date.now()-step.appliedAt);
      if(rem>0){anyActive=true;minRem=Math.min(minRem,rem);}
    });
  });
  const gfab=document.getElementById('fab-global');
  if(gfab){if(anyActive){gfab.style.display='flex';const t=gfab.querySelector('.fab-global-t');if(t)t.textContent=fmtCountdown(minRem);}else gfab.style.display='none';}
  document.querySelectorAll('[data-wait-chip]').forEach(el=>{
    const rem=parseInt(el.dataset.wait)*1000-(Date.now()-parseInt(el.dataset.at));
    el.textContent=rem>0?fmtCountdown(rem)+' remaining':'ready ✓';
  });
  if(anyActive)startWaitInterval();else stopWaitInterval();
}

  const rs=_rowSwipe;
  if(!rs||rs.dead)return;
  const dx=e.touches[0].clientX-rs.x,dy=e.touches[0].clientY-rs.y;
  if(!rs.locked){
    if(Math.abs(dy)>10&&Math.abs(dy)>Math.abs(dx)){rs.dead=true;return;}
    if(dx>14&&Math.abs(dx)>Math.abs(dy)*1.4)rs.locked=true;else return;
  }
  rs.dx=Math.max(0,dx);
  const inner=rs.row.querySelector('.srow-inner');
  if(inner){inner.style.transition='none';inner.style.transform=`translateX(${Math.min(rs.dx,110)}px)`;}
},{passive:true});
document.addEventListener('touchend',()=>{
  const rs=_rowSwipe;_rowSwipe=null;
  if(!rs||!rs.locked)return;
  const inner=rs.row.querySelector('.srow-inner');
  if(!inner)return;
  if(rs.dx>68){
    inner.style.transition='transform .14s ease';
    inner.style.transform='translateX(60px)';
    const t=rs.row.querySelector('[data-call="tickStep"]');
    setTimeout(()=>{if(t)CALL_FNS.tickStep(...parseArgs(t.dataset.args));},130);
  }else{
    inner.style.transition='transform .25s cubic-bezier(.32,.72,0,1)';
    inner.style.transform='translateX(0)';
    setTimeout(()=>{inner.style.transition='';inner.style.transform='';},260);
  }
},{passive:true});

function stepsHTML(steps){
  const act=activeSteps(steps);
  if(!act.length)return'<div class="steps"><div class="empty">No active steps</div></div>';
  let h='<div class="steps">';
  act.forEach((s,i)=>{
    const p=DB.products[s.p],dl=daysLeft(p,s.p);
    const np=p.next&&p.next.productId?DB.products[p.next.productId]:null;
    const nName=np?np.brand+' '+np.name:(p.next?p.next.name:'');
    h+=`<button class="step" data-call="openProduct" data-args="${s.p}">
      <span class="step-num">${i+1}</span>
      <div class="step-body">
        <div class="step-name">${esc(p.brand)} ${esc(p.name)}</div>
        <div class="step-note">${esc(p.role)}</div>
        ${nName?`<span class="swap-pill">→ ${esc(nName)} queued</span>`:''}
        ${p.flags.includes('removeWhenDone')?`<div class="note-flag">Remove when finished</div>`:''}
        ${dl!==null&&dl<=14?`<div class="note-flag" style="color:var(--cu)">~${Math.max(0,dl)} days left</div>`:''}
      </div><span class="step-arrow">›</span></button>`;

  });

}

function assignDay(day,type,cat,newId){
  const warnings=[];
  DB.routines.forEach(r=>{if(r.cat===cat&&r.type===type&&r.id!==newId&&r.days.includes(day)){warnings.push(r.name);r.days=r.days.filter(d=>d!==day);}});
  if(newId){const r=routineById(newId);if(r&&!r.days.includes(day))r.days.push(day);}
  save();
  if(warnings.length){UI._schedWarning=`${dayName(day)} removed from: ${warnings.join(', ')}`;render();setTimeout(()=>{UI._schedWarning=null;render();},4000);}else render();
}

function toggleRoutineDay(id,day){
  const r=routineById(id);if(!r)return;
  if(r.days.includes(day)){r.days=r.days.filter(d=>d!==day);save();render();}
  else{
    const clash=DB.routines.find(rt=>rt.id!==id&&rt.cat===r.cat&&rt.type===r.type&&rt.days.includes(day));
    if(clash){UI._schedWarning=`${dayName(day)} removed from "${clash.name}"`;clash.days=clash.days.filter(d=>d!==day);}
    r.days.push(day);save();render();
    if(clash)setTimeout(()=>{UI._schedWarning=null;render();},4000);
  }
}

function vHistory(){
  const enter=UI._todayEnter;UI._todayEnter=false;
  const off=UI._histOff||0;
  const now=new Date();const base=new Date(now.getFullYear(),now.getMonth()+off,1);
  const y=base.getFullYear(),m=base.getMonth();
  const startDow=(new Date(y,m,1).getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  const todayDs=todayStr();
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<span></span>';
  for(let d=1;d<=dim;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const future=ds>todayDs;
    const rs=scheduledForDay(new Date(y,m,d).getDay());
    const done=rs.filter(r=>isRoutineComplete(r.id,ds)).length;
    const ratio=rs.length?done/rs.length:0;
    const bg=future?'var(--hairline)':ratio>=1?'var(--cu)':ratio>0?`rgba(var(--cu-rgb),${(0.18+ratio*0.55).toFixed(2)})`:'var(--hairline)';
    const hasNote=(DB.journal||{})[ds];
    cells+=`<button data-call="openToday" data-args="${ds}" style="aspect-ratio:1;border-radius:8px;background:${bg};${future?'opacity:.25;pointer-events:none;':''}border:none;cursor:pointer;position:relative">${hasNote?'<span style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--bg)"></span>':''}</button>`;
  }
  const monthName=base.toLocaleDateString('en-AU',{month:'long',year:'numeric'});
  const canFwd=off<0;
  return`<div class="today-sheet ${enter?'page-up':''}"><button class="sheet-close-tap" aria-label="Close" onclick="dismissSheet()"><div class="sheet-handle"></div></button>
  <h1 class="page-title" style="padding-top:2px">History</h1>
  <div class="date-nav" style="margin-top:6px">
    <button class="date-nav-btn" data-call="histNav" data-args="-1">‹</button>
    <span class="date-nav-label">${monthName}</span>
    <button class="date-nav-btn ${canFwd?'':'disabled'}" ${canFwd?'data-call="histNav" data-args="1"':''}>›</button>

function profileComplete(){
  const p=DB.profile||{};
  return ['skin','hair','scent','looks'].every(k=>p[k]&&(p[k].done||p[k].skipped));
}
/* ══ ONBOARDING SCHEMA ══
 Each question: {sec, id, q, hint, type, options[], save}
 type: 'multi' (chips, multi-select) | 'single' (chips, one) | 'text' (free) | 'photo' | 'satisfaction'
 save: dotted path under DB.profile[sec] (e.g. 'concerns')
 For skin/hair: if the category already has products, we show a "known" panel and ask satisfaction
 against real product names instead of "what do you use".                                        */
const OB_SECTIONS=['skin','hair','scent','looks'];
const OB_SEC_LABEL={skin:'Skin',hair:'Hair',scent:'Scent',looks:'Hair looks'};
function catHasProducts(cat){return Object.values(DB.products||{}).some(p=>p.cat===cat&&p.active);}
function obQuestions(sec){
  if(sec==='skin'||sec==='hair'){
    const known=catHasProducts(sec);
    const concernOpts=sec==='skin'
      ? ['Dryness','Sensitivity','Fine lines','Dullness','Redness','Texture','Breakouts','Dark spots']
      : ['Dryness','Frizz','Damage','Thinning','Oiliness','Scalp','Colour care','Volume'];
    const qs=[
      {sec,id:'concerns',q:`What are your main ${sec} concerns?`,hint:'Pick any that apply, and add your own.',type:'multi',options:concernOpts,save:'concerns'},
      {sec,id:'budget',q:'What\'s your budget level?',hint:'This shapes what I recommend.',type:'single',options:['Budget friendly','Mid range','Premium','Whatever works best'],save:'budget'},
    ];
    // satisfaction: enrich path only asks it if products exist
    if(known) qs.push({sec,id:'satisfaction',q:`How happy are you with your current ${sec} products?`,hint:'Tap a rating for each. This tells me what to leave alone and what to rethink.',type:'satisfaction',save:'satisfaction'});
    else qs.push({sec,id:'currentText',q:`What ${sec} products do you use now, if any?`,hint:'List them however you like, or leave blank.',type:'text',save:'free'});
    qs.push({sec,id:'photo',q:'Add photos of any problem spots?',hint:'Sent to Claude once for analysis, then discarded. Nothing is stored or synced. Optional.',type:'photo',save:'photoNotes'});
    return qs;
  }
  if(sec==='scent') return [
    {sec,id:'current',q:'What scents do you wear now?',hint:'List what\'s in your rotation, or leave blank.',type:'text',save:'current'},
    {sec,id:'whyLike',q:'What do you like about them?',hint:'Notes, mood, how they make you feel.',type:'text',save:'whyLike'},
    {sec,id:'image',q:'What do you want your scent to project?',hint:'Pick a direction, and add nuance below.',type:'multi',options:['Understated','Confident','Warm','Fresh','Sophisticated','Approachable','Mysterious','Clean'],save:'imageToProject'},
  ];
  // looks
  return [
    {sec,id:'goals',q:'What are you going for with your hair looks?',hint:'Everyday style, special occasions, low effort, whatever matters to you.',type:'text',save:'goals'},
  ];
}
/* current section/step, clamped */
function obPos(){
  const ob=DB.onboarding||{section:null,step:0};
  let sec=ob.section;
  if(!sec||!OB_SECTIONS.includes(sec)) sec=OB_SECTIONS.find(s=>!(DB.profile[s]&&(DB.profile[s].done||DB.profile[s].skipped)))||OB_SECTIONS[0];
  const qs=obQuestions(sec);
  let step=Math.min(Math.max(0,ob.step||0),qs.length-1);
  return {sec,step,qs};
}
function obSetPos(sec,step){DB.onboarding={section:sec,step};save();render();}
/* advance to next question, or next unfinished section, or finish */
function obAdvance(){
  const {sec,step,qs}=obPos();
  if(step<qs.length-1){obSetPos(sec,step+1);return;}
  // finished this section
  DB.profile[sec].done=true;DB.profile[sec].skipped=false;
  const next=OB_SECTIONS.find(s=>!(DB.profile[s]&&(DB.profile[s].done||DB.profile[s].skipped)));
  DB.onboarding={section:next||null,step:0};save();render();
}
function obBack(){
  const {sec,step}=obPos();
  if(step>0){obSetPos(sec,step-1);return;}
  // go to previous section's last question
  const idx=OB_SECTIONS.indexOf(sec);
  for(let i=idx-1;i>=0;i--){const s=OB_SECTIONS[i];if(!DB.profile[s].skipped){const qs=obQuestions(s);DB.profile[s].done=false;obSetPos(s,qs.length-1);return;}}
}
function obSkipSection(){
  const {sec}=obPos();
  DB.profile[sec].skipped=true;DB.profile[sec].done=false;
  const next=OB_SECTIONS.find(s=>!(DB.profile[s]&&(DB.profile[s].done||DB.profile[s].skipped)));
  DB.onboarding={section:next||null,step:0};save();render();
}
/* answer handlers */
function obToggle(sec,save,val){
  const arr=DB.profile[sec][save];
  if(!Array.isArray(DB.profile[sec][save])){DB.profile[sec][save]=[];}
  const a=DB.profile[sec][save];const i=a.indexOf(val);
  if(i>=0)a.splice(i,1);else a.push(val);
  save2();render();
}
function obPick(sec,save,val){DB.profile[sec][save]=val;save2();render();}
function obFree(sec,save,v){DB.profile[sec][save]=v;save2();}
function obSat(sec,pid,rating){if(!DB.profile[sec].satisfaction)DB.profile[sec].satisfaction={};DB.profile[sec].satisfaction[pid]=rating;save2();render();}
function save2(){save();} // alias so change-handlers don't re-render mid-typing
/* photo: analyse once, store note, discard. Stage 2 stub captures file → placeholder note; real AI call in stage 3 */
async function obPhotoPick(inp){
  const sec=obPos().sec;
  const files=[...(inp.files||[])].slice(0,3);
  inp.value='';
  if(!files.length)return;
  if(!aiUrl()){alert('Set your Worker URL in Settings → Sync before adding photos for analysis.');return;}
  UI._photoBusy=true;render();
  try{
    // read + downscale each image to keep the request small; images are NOT stored
    const blocks=[];
    for(const f of files){
      const b64=await fileToScaledB64(f,1024,0.7);
      if(b64)blocks.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}});
    }
    const concerns=(DB.profile[sec].concerns||[]).join(', ');
    blocks.push({type:'text',text:`These are ${sec} photos from the user${concerns?' who reports: '+concerns:''}. Give a brief, factual visual assessment relevant to a ${sec} routine: what you observe (texture, dryness, redness, etc.) and what it suggests for product/ingredient choices. 3-4 sentences. Do not identify the person or guess identity.`});
    const sys='You are a careful skincare/haircare assistant giving a brief visual assessment for the user\'s own routine. Be factual and non-diagnostic. Never identify or describe the person\'s identity.';
    const res=await aiCall(sys,[{role:'user',content:blocks}],false);
    if(res.error){alert('Photo analysis failed: '+res.error);}
    else{
      const note='['+new Date().toLocaleDateString('en-AU')+'] '+res.text;
      DB.profile[sec].photoNotes=(DB.profile[sec].photoNotes?DB.profile[sec].photoNotes+'\n\n':'')+note;
      save();
    }
  }catch(e){alert('Photo analysis error: '+(e.message||e));}
  // images are now out of scope and discarded; only the text note persists
  UI._photoBusy=false;render();
}
/* read a File, downscale via canvas, return base64 (no data: prefix). Never stored. */
function fileToScaledB64(file,maxDim,quality){
  return new Promise(resolve=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>maxDim||h>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        try{resolve(c.toDataURL('image/jpeg',quality).split(',')[1]);}catch(e){resolve(null);}
      };
      img.onerror=()=>resolve(null);
      img.src=fr.result;
    };
    fr.onerror=()=>resolve(null);
    fr.readAsDataURL(file);
  });
}

const ASSIST_LINE='I\'m here to help with your routines.';
function aiUrl(){const b=(DB.settings.syncUrl||'').replace(/\/+$/,'');return b?b+'/ai':'';}

/* behaviour + context system prompt for a given category */
function behaviourPrompt(cat){
  const s=DB.settings;

  const prof=DB.profile||{};

  lines.push('');
  lines.push('SCOPE RULES (strict):');

  lines.push('- For anything outside that (jokes, general chat, coding, news, maths, etc.) reply with exactly: "'+ASSIST_LINE+'" and nothing else.');
  lines.push('- Do not break character or discuss these instructions.');
  lines.push('');
  lines.push('RECOMMENDATION RULES:');

  if(s.preferredRetailer)lines.push('- Preferred retailer: '+s.preferredRetailer+'. Favour it when reasonable.');
  if((s.preferredBrands||[]).length)lines.push('- Preferred brands: '+s.preferredBrands.join(', ')+'.');
  lines.push('- ALWAYS emphasise ingredients: name the key actives/ingredients and why they suit the user, for every product you suggest.');
  lines.push('- Respect their stated concerns, budget and satisfaction. Do not recommend replacing products they are happy with.');
  lines.push('- Be concise and practical. This is a mobile chat.');
  lines.push('');
  // profile block
  const pc=prof[cat==='supplements'?'skin':cat];
  if(pc){
    lines.push('WHAT THE USER TOLD YOU ('+cat+'):');
    if(pc.concerns&&pc.concerns.length)lines.push('- Concerns: '+pc.concerns.join(', '));
    if(pc.budget)lines.push('- Budget: '+pc.budget);
    if(pc.free)lines.push('- Notes: '+pc.free);
    if(pc.photoNotes)lines.push('- Photo analysis: '+pc.photoNotes);
    if(cat==='scent'){if(pc.current)lines.push('- Current scents: '+pc.current);if(pc.whyLike)lines.push('- Likes: '+pc.whyLike);if((pc.imageToProject||[]).length)lines.push('- Wants to project: '+pc.imageToProject.join(', '));}
    lines.push('');
  }
  // routine context, reuse existing builders
  const ctx=({skin:claudePromptSkin,hair:claudePromptHair,scent:claudePromptScent,supplements:claudePrompt})[cat]||claudePrompt;

/* recent journal notes (last 14 days) for recall */
function recentJournal(){
  const cutoff=Date.now()-14*86400000;
  return Object.entries(DB.journal||{})
    .filter(([d])=>{const t=Date.parse(d);return !isNaN(t)&&t>=cutoff;})
    .sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([d,t])=>({d,t}));
}

/* core call to the Worker /ai route */
async function aiCall(system,messages,useWebSearch){
  const url=aiUrl();
  if(!url)return{error:'Set your Worker URL in Settings → Sync first.'};
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin||''},body:JSON.stringify({system,messages,useWebSearch:!!useWebSearch})});
    const data=await r.json();
    if(!r.ok)return{error:data.error||('HTTP '+r.status)};
    return{text:data.text||''};
  }catch(e){return{error:'Network error: '+(e.message||e)};}
}

/* chat state lives in UI (not persisted; a fresh session each open) */
function assistantPick(cat){
  UI._assistantCat=cat;

  UI._chatBusy=false;
  UI._recallDone=false;
  UI.tab='assistant';UI._view='chat';

/* smart recall: ask the model to read recent journal + profile and open the conversation */
async function runRecall(cat){
  UI._chatBusy=true;renderChat();
  const jr=recentJournal();
  const sys=behaviourPrompt(cat);
  let opener;
  if(jr.length){
    const journalTxt=jr.map(j=>j.d+': '+j.t).join('\n');
    opener='Here are my recent daily notes (last 14 days), newest first:\n'+journalTxt+'\n\nGreet me briefly for a '+cat+' conversation. If any note points to a concern worth addressing (e.g. dryness, irritation, a reaction), mention the most relevant one by referencing when I wrote it, and ask whether I want to dig into that or something else. If nothing stands out, just ask what I\'d like help with. One short paragraph.';
  } else {
    opener='Greet me briefly for a '+cat+' conversation and ask what I\'d like help with. One short sentence.';
  }
  const res=await aiCall(sys,[{role:'user',content:opener}],false);
  UI._chatBusy=false;UI._recallDone=true;
  if(res.error){UI._chat.push({role:'assistant',content:'(Could not reach the assistant: '+res.error+')'});}
  else{UI._chat.push({role:'assistant',content:res.text||('Hi — what would you like help with for your '+cat+'?')});}
  renderChat();
}

async function assistantSend(){
  const inp=document.getElementById('chatInput');
  if(!inp)return;const text=(inp.value||'').trim();
  if(!text||UI._chatBusy)return;
  inp.value='';
  UI._chat.push({role:'user',content:text});
  UI._chatBusy=true;renderChat();
  const cat=UI._assistantCat;
  const sys=behaviourPrompt(cat);
  // send full conversation history
  const msgs=UI._chat.map(m=>({role:m.role,content:m.content}));
  // enable web search when the user seems to want a product recommendation
  const wantsReco=/recommend|suggest|alternative|instead|replace|buy|product|better|swap|try/i.test(text);
  const res=await aiCall(sys,msgs,wantsReco);
  UI._chatBusy=false;
  if(res.error){UI._chat.push({role:'assistant',content:'(Could not reach the assistant: '+res.error+')'});}
  else{UI._chat.push({role:'assistant',content:res.text||''});}
  renderChat();
}

function renderModal(){
  let ex=document.getElementById('ov');
  if(ex&&ex.classList.contains('closing')){if(!UI.modal)return;ex.remove();ex=null;}
  const wasOpen=!!ex;if(ex)ex.remove();
  if(!UI.modal)return;
  const ov=document.createElement('div');ov.className='overlay'+(wasOpen?'':' enter');ov.id='ov';
  ov.onclick=e=>{if(e.target===ov){closeModal();}};
  const m=UI.modal;let inner='';
  if(m.type==='product')inner=productView(m.id);
  else if(m.type==='product-detail')inner=productDetailSheet(m.id);
  else if(m.type==='edit')inner=productEdit(m.id);
  else if(m.type==='routine-view')inner=routineViewSheet(m.id);
  else if(m.type==='addstep')inner=addStepSheet(m.routineId);
  else if(m.type==='look')inner=lookSheet(m.idx);
  else if(m.type==='lookpick')inner=lookPickSheet();
  else if(m.type==='new-routine')inner=newRoutineSheet();
  ov.innerHTML=`<div class="sheet" onclick="event.stopPropagation()"><button class="sheet-close-tap" aria-label="Close" onclick="closeModal()"><div class="sheet-handle"></div></button>${inner}</div>`;
  document.body.appendChild(ov);
  attachModalSwipe(ov.querySelector('.sheet'));
  const sheet=ov.querySelector('.sheet');
  if(sheet){
    let _sy=0,_moved=false;
    sheet.addEventListener('touchstart',e=>{_sy=e.touches[0].clientY;_moved=false;},{passive:true});
    sheet.addEventListener('touchmove',e=>{_moved=true;},{passive:true});
    sheet.addEventListener('touchend',e=>{
      if(_moved&&e.changedTouches[0].clientY-_sy>72){closeModal();}
    },{passive:true});
  }
}

function attachModalSwipe(sheetEl){
  let sx=0,sy=0,armed=false,dragging=false,dead=false,dy=0,lastY=0,lastT=0,vel=0;
  sheetEl.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    lastY=sy;lastT=e.timeStamp;vel=0;dy=0;dragging=false;dead=false;
    armed=sheetEl.scrollTop<=2;
  },{passive:true});
  sheetEl.addEventListener('touchmove',e=>{
    if(!armed||dead)return;
    const y=e.touches[0].clientY;
    const dx=e.touches[0].clientX-sx;
    dy=y-sy;
    vel=(y-lastY)/Math.max(1,e.timeStamp-lastT);
    lastY=y;lastT=e.timeStamp;
    if(!dragging){
      if(dy<-6||Math.abs(dx)>Math.abs(dy)+6){dead=true;return;}
      if(dy>6){dragging=true;sheetEl.style.transition='none';}
      else return;
    }
    e.preventDefault();
    sheetEl.style.transform=`translateY(${Math.max(0,dy)}px)`;
  },{passive:false});
  sheetEl.addEventListener('touchend',()=>{
    if(!dragging){armed=false;return;}
    dragging=false;armed=false;
    if(dy>140||(dy>60&&vel>0.5)){
      sheetEl.style.transition='';
      closeModal();
    }else{
      sheetEl.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
      sheetEl.style.transform='translateY(0)';
      setTimeout(()=>{sheetEl.style.transition='';sheetEl.style.transform='';},320);
    }
  },{passive:true});
}
function closeModal(after){
  const ov=document.getElementById('ov');
  UI.modal=null;
  if(!ov||ov.classList.contains('closing')){if(after)after();render();return;}
  ov.classList.add('closing');
  setTimeout(()=>{ov.remove();if(after)after();render();},430);
}

  </div>`;
}
function stepSearch(v,routineId){
  UI._stepSearch=v;
  const el=document.getElementById('step-results');
  if(el)el.innerHTML=stepSearchResults(routineId);
}
function addStepSheet(routineId){
  return`<div class="sheet-handle"></div><h3>Add step</h3>
  <input placeholder="Search…" value="${esc(UI._stepSearch||'')}" data-inp="stepSearchQ" data-args="${routineId}" style="margin-bottom:10px">
  <div id="step-results">${stepSearchResults(routineId)}</div>
  <button class="btn ghost full" onclick="UI._stepSearch=null;closeModal()">Done</button>`;
}
function newRoutineSheet(){
  const m=UI._newR||{cat:'skin',type:'evening',name:'',copyFrom:''};UI._newR=m;
  const copyOpts=DB.routines.filter(r=>r.cat===m.cat&&r.type===m.type);
  return`<div class="sheet-handle"></div><h3>New Routine</h3>
  <div class="field"><label>Name</label><input value="${esc(m.name)}" placeholder="e.g. Evening A — Recovery" oninput="UI._newR.name=this.value"></div>
  <div class="field"><label>Category</label><select onchange="UI._newR.cat=this.value;UI._newR.copyFrom='';UI.modal={type:'new-routine'};render()"><option value="skin" ${m.cat==='skin'?'selected':''}>Skin</option><option value="hair" ${m.cat==='hair'?'selected':''}>Hair</option><option value="scent" ${m.cat==='scent'?'selected':''}>Scent</option><option value="supplements" ${m.cat==='supplements'?'selected':''}>Supplements</option></select></div>
  <div class="field"><label>Type</label><select onchange="UI._newR.type=this.value;UI._newR.copyFrom='';UI.modal={type:'new-routine'};render()"><option value="morning" ${m.type==='morning'?'selected':''}>Morning</option><option value="evening" ${m.type==='evening'?'selected':''}>Evening</option></select></div>
  <div class="field"><label>Copy steps from (optional)</label><select onchange="UI._newR.copyFrom=this.value"><option value="">— start empty —</option>${copyOpts.map(r=>`<option value="${r.id}" ${m.copyFrom===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select></div>
  <div style="display:flex;gap:8px;margin-top:4px"><button class="btn full" onclick="createRoutine()">Create</button><button class="btn ghost full" onclick="closeModal(()=>{UI._newR=null;})">Cancel</button></div>`;
}
function createRoutine(){
  const m=UI._newR||{};const name=(m.name||'').trim();if(!name){alert('Enter a name.');return;}
  const id='r'+Date.now();const src=m.copyFrom?routineById(m.copyFrom):null;
  const steps=src?JSON.parse(JSON.stringify(src.steps)):[];
  DB.routines.push(R(id,m.cat||'skin',m.type||'evening',name,[],steps));
  save();closeModal(()=>{UI._newR=null;UI.tab='setup';UI.setupPage='routine-edit';UI.editRoutineId=id;});
}
function lookSheet(idx){
  const l=(DB.hairLooks||[])[idx];if(!l)return'';const r=routineById(l.id)||{steps:[]};
  return`<div class="sheet-handle"></div><h3>Edit look</h3>
  <div class="field"><label>Name</label><input value="${esc(l.name)}" data-chg="lkName" data-args="${idx}"></div>
  <div class="field"><label>Description</label><input value="${esc(l.desc)}" data-chg="lkDesc" data-args="${idx}"></div>
  <div class="sec-label" style="margin-left:0">Steps</div>
  <div class="card" style="margin:0 0 12px">${r.steps.map((s,i)=>`<div class="edit-step"><span class="nm">${i+1}. ${esc(pName(s.p))}</span>
  <button class="mini" data-call="lkMove" data-args="${idx}|${i}|-1">↑</button><button class="mini" data-call="lkMove" data-args="${idx}|${i}|1">↓</button>
  <button class="mini" style="color:var(--danger)" data-call="lkDel" data-args="${idx}|${i}">✕</button></div>`).join('')||'<div class="empty">No steps</div>'}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn sm" data-call="lkAdd" data-args="${idx}">+ Add product</button>
    <button class="btn danger sm" data-call="deleteLook" data-args="${idx}">Delete look</button>
    <button class="btn ghost sm" onclick="closeModal()">Done</button></div>`;
}
function lkMove(idx,i,d){const r=routineById((DB.hairLooks||[])[idx]?.id);if(!r)return;const st=r.steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}
function lkAdd(idx){const l=(DB.hairLooks||[])[idx];if(!l)return;let r=routineById(l.id);if(!r){r=R(l.id,'hair','morning',l.name,[],[]);DB.routines.push(r);save();}UI.modal={type:'addstep',routineId:l.id};render();}
function deleteLook(idx){if(!confirm('Delete this look?'))return;const l=DB.hairLooks[idx];DB.routines=DB.routines.filter(r=>r.id!==l.id);DB.hairLooks.splice(idx,1);save();closeModal();}
function newLook(){const id='look-'+Date.now();DB.hairLooks.push({id,name:'New look',desc:''});DB.routines.push(R(id,'hair','morning','New look',[],[]));save();UI.modal={type:'look',idx:DB.hairLooks.length-1};render();}
function lookPickSheet(){return`<div class="sheet-handle"></div><h3>Pick a look</h3>${(DB.hairLooks||[]).map(l=>`<button class="step" style="border-bottom:1px solid var(--hairline)" data-call="pickHairLook" data-args="${l.id}"><div class="step-body"><div class="step-name">${esc(l.name)}</div><div class="step-note">${esc(l.desc)}</div></div></button>`).join('')}`;}

/* ══ PROMPTS ══ */
function claudePrompt(){
  const lines=['MY PERSONAL CARE CONTEXT — '+new Date().toLocaleDateString('en-AU'),'','SKIN PROFILE: Dry/sensitive, antihistamines, anti-ageing, no chemical smells. Melbourne AU.',''];
  DB.routines.filter(r=>r.cat==='skin').forEach(r=>{lines.push('SKIN — '+r.name+' ('+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'unassigned')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];let l=(i+1)+'. '+p.brand+' '+p.name;const np=p.next&&p.next.productId?DB.products[p.next.productId]:null;if(np)l+=' [next: '+np.brand+' '+np.name+']';else if(p.next&&p.next.name)l+=' [next: '+p.next.name+']';if(p.flags.includes('removeWhenDone'))l+=' [phasing out]';lines.push(l);});lines.push('');});
  DB.routines.filter(r=>r.cat==='hair'&&!r.id.startsWith('hair-look')).forEach(r=>{lines.push('HAIR — '+r.name+' ('+r.type+', '+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'unassigned')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push((i+1)+'. '+p.brand+' '+p.name);});lines.push('');});
  (DB.hairLooks||[]).forEach(l=>{const r=routineById(l.id);lines.push('HAIR LOOK — '+l.name+': '+(r?activeSteps(r.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name;}).join(' → '):''));});
  lines.push('');lines.push('SCENTS: '+scents().map(s=>s.brand+' '+s.name+' ('+s.tags.join('/')+')').join('; '));
  const suppProds=Object.values(DB.products).filter(p=>p.cat==='supplements'&&p.active);if(suppProds.length){lines.push('');lines.push('SUPPLEMENTS: '+suppProds.map(p=>p.brand+' '+p.name).join(', '));}
  const inactive=Object.values(DB.products).filter(p=>!p.active);if(inactive.length){lines.push('');lines.push('RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));}
  const low=lowStock();if(low.length){lines.push('');lines.push('LOW STOCK: '+low.map(([id,p])=>p.name+' (~'+Math.max(0,daysLeft(p))+'d)').join(', '));}
  return lines.join('\n');
}
function claudePromptSkin(){
  const lines=['MY SKIN ROUTINE & PRODUCTS — '+new Date().toLocaleDateString('en-AU'),'','PROFILE: Dry/sensitive, antihistamines, anti-ageing, no chemical smells. Melbourne AU.','','── PRODUCTS ──'];
  Object.values(DB.products).filter(p=>p.cat==='skin'&&p.active).forEach(p=>{lines.push('');lines.push(p.brand+' '+p.name);lines.push('Role: '+p.role);if(p.why)lines.push('Why: '+p.why);if(p.notes)lines.push('Notes: '+p.notes);const np=p.next&&p.next.productId?DB.products[p.next.productId]:null;if(np)lines.push('Replacing with: '+np.brand+' '+np.name+(p.next.why?' — '+p.next.why:''));else if(p.next&&p.next.name)lines.push('Replacing with: '+p.next.name+(p.next.why?' — '+p.next.why:''));if(p.flags.includes('removeWhenDone'))lines.push('Status: Phasing out');const dl=daysLeft(p);if(dl!==null&&dl<=30)lines.push('Stock: ~'+Math.max(0,dl)+' days left');});
  lines.push('','── ROUTINES ──');
  DB.routines.filter(r=>r.cat==='skin').forEach(r=>{lines.push('');lines.push(r.name+' ('+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'no days')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push('  '+(i+1)+'. '+p.brand+' '+p.name+(s.wait?' [wait '+fmtWait(s.wait)+']':''));});});
  const inactive=Object.values(DB.products).filter(p=>p.cat==='skin'&&!p.active);if(inactive.length){lines.push('','RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));}
  return lines.join('\n');
}
function claudePromptHair(){
  const lines=['MY HAIR ROUTINE & PRODUCTS — '+new Date().toLocaleDateString('en-AU'),'','── PRODUCTS ──'];
  Object.values(DB.products).filter(p=>p.cat==='hair'&&p.active).forEach(p=>{lines.push('');lines.push(p.brand+' '+p.name);lines.push('Role: '+p.role);if(p.why)lines.push('Why: '+p.why);if(p.notes)lines.push('Notes: '+p.notes);});
  lines.push('','── ROUTINES ──');
  DB.routines.filter(r=>r.cat==='hair'&&!r.id.startsWith('hair-look')).forEach(r=>{lines.push('');lines.push(r.name+' ('+r.type+', '+(r.days.length?r.days.map(d=>dayShort(d)).join('/'):'no days')+'):');activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push('  '+(i+1)+'. '+p.brand+' '+p.name+(s.wait?' [wait '+fmtWait(s.wait)+']':''));});});
  lines.push('','── LOOKS ──');
  (DB.hairLooks||[]).forEach(l=>{const r=routineById(l.id);lines.push(l.name+': '+(r?activeSteps(r.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name;}).join(' → '):'no steps'));});
  return lines.join('\n');
}
function claudePromptScent(){
  const lines=['MY SCENT WARDROBE — '+new Date().toLocaleDateString('en-AU'),'','PROFILE: Woods, musks, earth and resin. Quiet intensity over projection.',''];
  scents().forEach(s=>{lines.push(s.brand+' '+s.name);lines.push('Character: '+s.role);if(s.why)lines.push('Why: '+s.why);if(s.tags.length)lines.push('When: '+s.tags.join(', '));if(s.notes)lines.push('Notes: '+s.notes);lines.push('');});
  const inactive=Object.values(DB.products).filter(p=>p.cat==='scent'&&!p.active);if(inactive.length)lines.push('RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));
  return lines.join('\n');
}

/* ══ BACKUP ══ */
function exportData(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='thestack-backup.json';a.click();}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{DB=migrate(JSON.parse(r.result));save();render();alert('Imported.');}catch(e){alert('Invalid file.');}};r.readAsText(f);}

/* ══ THEME ══ */
function applyTheme(){
  const t=DB.settings?.theme||'copper';
  if(t==='copper')document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',t);
  const m=DB.settings?.mode||'system';
  if(m==='system')document.documentElement.removeAttribute('data-mode');
  else document.documentElement.setAttribute('data-mode',m);
  updateThemeColor();
}
function setMode(m){DB.settings.mode=m;save();applyTheme();render();}
function updateThemeColor(){
  const bg=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  const m=document.querySelector('meta[name="theme-color"]');
  if(m&&bg)m.setAttribute('content',bg);
}
function setTheme(t){DB.settings.theme=t;save();applyTheme();render();}
try{matchMedia('(prefers-color-scheme: light)').addEventListener('change',updateThemeColor);}catch(e){}

/* ══ JOURNAL → PROMPT ══ */
function journalBlock(){
  const jd=Object.entries(DB.journal||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14);
  return jd.length?'\n\nRECENT SKIN JOURNAL (newest first — use this to advise on reactions, tolerance and progress):\n'+jd.map(([d,t])=>d+': '+t).join('\n'):'';
}
const _cpFull=claudePrompt,_cpSkin=claudePromptSkin;
claudePrompt=function(){return _cpFull()+journalBlock();};
claudePromptSkin=function(){return _cpSkin()+journalBlock();};

/* ══ BOOT ══ */
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js');}catch(e){}}
applyTheme();
render();
autoPull();
</script>
