<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141815">
<title>The Stack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#141815; --bg-raise:#1c211d; --card:#21271f; --card-edge:#2c332a;
  --ink:#ece9e2; --ink-mid:#a8a89e; --ink-soft:#6e7268;
  --moss:#8fa885; --moss-deep:#5d7355;
  --amber:#d9a05b; --plum:#a08bc0; --danger:#c97b6e;
  --hairline:rgba(236,233,226,0.08);
  --glass:rgba(24,28,25,0.6);
  --glass-hi:rgba(236,233,226,0.09);
  --glass-edge:rgba(236,233,226,0.14);
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#f4f2ec; --bg-raise:#fbfaf6; --card:#ffffff; --card-edge:#e6e2d8;
    --ink:#20241f; --ink-mid:#5d6157; --ink-soft:#989c91;
    --moss:#5d7355; --moss-deep:#46593f;
    --amber:#b97f37; --plum:#7b639e; --danger:#b3604f;
    --hairline:rgba(32,36,31,0.08);
    --glass:rgba(251,250,246,0.55);
    --glass-hi:rgba(255,255,255,0.65);
    --glass-edge:rgba(32,36,31,0.1);
  }
}

html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; font-size:15px;
  max-width:430px; margin:0 auto;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
#app{padding-bottom:128px; min-height:100vh}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;text-align:left}
input,textarea,select{font:inherit;color:var(--ink);background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:10px;padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus{border-color:var(--moss)}
textarea{resize:vertical;min-height:70px}
::placeholder{color:var(--ink-soft)}
a{color:inherit}

.top{padding:52px 22px 8px;display:flex;justify-content:space-between;align-items:flex-end}
.wordmark{font-family:'Fraunces',serif;font-size:24px;font-weight:400}
.wordmark em{font-style:italic;color:var(--moss)}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;padding:52px 22px 4px}
.page-sub{font-size:13px;color:var(--ink-soft);padding:0 22px 14px}
.date{font-size:11px;color:var(--ink-soft);text-align:right;line-height:1.5}
.date strong{display:block;color:var(--ink-mid);font-weight:500;font-size:12px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:24px 22px 12px}
.card{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 10px;overflow:hidden}
.pad{padding:16px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--moss-deep);color:#f2f1ea;font-size:13px;font-weight:500;padding:11px 18px;border-radius:100px}
.btn.ghost{background:var(--bg-raise);color:var(--ink-mid);border:1px solid var(--card-edge)}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn.warn{background:transparent;color:var(--amber);border:1px solid var(--amber)}
.btn.sm{padding:7px 13px;font-size:12px}
.btn.full{width:100%;justify-content:center}
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;white-space:nowrap}
.c-moss{background:rgba(143,168,133,.14);color:var(--moss)}
.c-plum{background:rgba(160,139,192,.16);color:var(--plum)}
.c-amber{background:rgba(217,160,91,.14);color:var(--amber)}
.c-mute{background:var(--bg-raise);color:var(--ink-soft);border:1px solid var(--card-edge)}
.c-danger{background:rgba(201,123,110,.14);color:var(--danger)}

.strip{display:flex;gap:5px;padding:14px 22px 4px}
.strip .d{flex:1;text-align:center;padding:7px 0 8px;border-radius:10px;font-size:10px;color:var(--ink-soft);border:1px solid transparent}
.strip .d span{display:block;font-size:11px;font-weight:600;margin-top:3px}
.strip .d.a span{color:var(--moss)} .strip .d.b span{color:var(--plum)} .strip .d.c span{color:var(--amber)}
.strip .d.today{background:var(--card);border-color:var(--card-edge);color:var(--ink-mid)}

.hero{margin:14px 22px 0;background:linear-gradient(160deg,var(--card) 0%,var(--bg-raise) 100%);border:1px solid var(--card-edge);border-radius:22px;padding:24px 22px 20px;position:relative;overflow:hidden;display:block;width:calc(100% - 44px)}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(143,168,133,.13) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--moss);margin-bottom:8px}
.hero h2{font-family:'Fraunces',serif;font-weight:400;font-size:26px;line-height:1.18;margin-bottom:4px;color:var(--ink)}
.hero .sub{font-size:13px;color:var(--ink-mid);margin-bottom:18px}

.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:15px 16px;margin:0 22px 10px;width:calc(100% - 44px)}
.row-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ri-skin{background:rgba(160,139,192,.14)} .ri-hair{background:rgba(143,168,133,.14)} .ri-scent{background:rgba(217,160,91,.13)}
.row-body{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:500;color:var(--ink)}
.row-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.alert{margin:6px 22px 10px;display:flex;gap:11px;align-items:flex-start;background:rgba(217,160,91,.08);border:1px solid rgba(217,160,91,.22);border-radius:14px;padding:12px 14px;font-size:12.5px;color:var(--ink-mid);width:calc(100% - 44px)}
.alert b{color:var(--amber);font-weight:600}

.steps{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 14px;overflow:hidden}
.step{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--hairline);width:100%}
.step:last-child{border-bottom:none}
.step-num{font-size:10px;font-weight:600;color:var(--ink-soft);min-width:16px;padding-top:3px}
.step-body{flex:1;min-width:0}
.step-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.step-note{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.step-arrow{color:var(--ink-soft);font-size:13px;padding-top:3px}
.wait{display:flex;align-items:center;gap:8px;padding:0 16px;font-size:10.5px;color:var(--ink-soft);background:var(--bg-raise)}
.wait::before,.wait::after{content:'';flex:1;border-top:1px dashed var(--card-edge)}
.wait span{padding:5px 0}
.swap-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:20px;padding:2px 8px;margin-top:5px;font-size:10.5px;color:var(--amber);font-weight:500}

.seg{display:flex;background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:12px;padding:3px;margin:0 22px 14px;width:calc(100% - 44px)}
.seg button{flex:1;text-align:center;font-size:12px;font-weight:500;padding:9px 4px;border-radius:9px;color:var(--ink-soft)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.18)}

/* liquid glass tab bar */
.tabs{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--glass);backdrop-filter:blur(34px) saturate(190%);-webkit-backdrop-filter:blur(34px) saturate(190%);border:1px solid var(--glass-edge);border-radius:30px;display:flex;padding:7px;box-shadow:0 12px 40px rgba(0,0,0,.32), inset 0 1px 0 var(--glass-hi);z-index:50}
.tab{flex:1;text-align:center;font-size:10px;color:var(--ink-soft);padding:8px 0 6px;border-radius:23px;position:relative;transition:all .25s cubic-bezier(.3,1.2,.4,1)}
.tab .ic{font-size:18px;display:block;margin-bottom:2px;opacity:.7;transition:opacity .2s}
.tab.active{color:var(--ink);background:var(--glass-hi);border:1px solid var(--glass-edge);box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 2px 8px rgba(0,0,0,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.tab.active .ic{opacity:1;color:var(--moss)}

.fab{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));right:max(20px,calc(50% - 195px));min-width:54px;height:54px;border-radius:28px;background:var(--moss-deep);color:#f2f1ea;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 6px 24px rgba(0,0,0,.35);z-index:49;padding:0 16px;gap:8px}
.fab .t{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}

.overlay{position:fixed;inset:0;background:rgba(10,12,10,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg-raise);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;padding:10px 22px calc(28px + env(safe-area-inset-bottom));border:1px solid var(--card-edge);border-bottom:none}
.sheet-handle{width:38px;height:4px;border-radius:4px;background:var(--card-edge);margin:8px auto 18px}
.sheet h3{font-family:'Fraunces',serif;font-size:21px;font-weight:400;margin-bottom:2px}
.sheet .brand{font-size:12px;color:var(--ink-soft);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--hairline);gap:12px}
.kv:last-child{border-bottom:none}
.kv .k{font-size:13px;color:var(--ink-mid)}
.kv .v{font-size:13px;font-weight:500;text-align:right}
.desc-block{background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px;font-size:13px;line-height:1.6;color:var(--ink-mid);margin-bottom:14px}
.desc-block b{color:var(--ink);font-weight:600;display:block;margin-bottom:4px;font-size:12px;letter-spacing:.08em;text-transform:uppercase}

.edit-step{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--hairline)}
.edit-step:last-child{border-bottom:none}
.edit-step .nm{flex:1;font-size:13px;font-weight:500}
.mini{width:30px;height:30px;border-radius:9px;background:var(--bg-raise);border:1px solid var(--card-edge);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-mid);flex-shrink:0}
.sched-day{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--hairline)}
.sched-day:last-child{border-bottom:none}
.ab-toggle{display:flex;gap:6px}
.ab-toggle button{width:38px;height:32px;border-radius:9px;font-size:12px;font-weight:600;background:var(--bg-raise);border:1px solid var(--card-edge);color:var(--ink-soft);text-align:center}
.ab-toggle button.on-a{background:rgba(143,168,133,.18);border-color:var(--moss);color:var(--moss)}
.ab-toggle button.on-b{background:rgba(160,139,192,.18);border-color:var(--plum);color:var(--plum)}
.ab-toggle button.on-c{background:rgba(217,160,91,.18);border-color:var(--amber);color:var(--amber)}

.scent-card{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:16px;margin:0 22px 10px;width:calc(100% - 44px);display:block;text-align:left}
.scent-card .nm{font-family:'Fraunces',serif;font-size:17px}
.scent-card .br{font-size:11px;color:var(--ink-soft);margin-bottom:6px}
.scent-card .ds{font-size:12.5px;color:var(--ink-mid);margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:5px}

.copybox{background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px;font-family:ui-monospace,monospace;font-size:11px;line-height:1.55;color:var(--ink-mid);white-space:pre-wrap;max-height:300px;overflow-y:auto;margin:0 22px 12px;width:calc(100% - 44px)}
.note-flag{font-size:10.5px;color:var(--danger);margin-top:4px;font-weight:500}
.empty{padding:30px 22px;text-align:center;color:var(--ink-soft);font-size:13px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-mid);padding:52px 22px 0}
.manage-link{padding:4px 22px 16px}
.ro-notes{background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:12px;padding:12px;font-size:13px;color:var(--ink-mid);line-height:1.55}
</style>
</head>
<body>
<div id="app"></div>
<button class="fab" id="fab" onclick="toggleTimer()">⏱</button>
<nav class="tabs" id="tabs"></nav>

<script>
/* ════════════════════ SEED ════════════════════ */
function P(cat,name,brand,role,why,opts={}){return Object.assign({cat,name,brand,role,why,link:'',notes:'',durationDays:90,restockedAt:Date.now(),flags:[],active:true,tags:[],next:null},opts);}
const SEED={
  v:3, updatedAt:0,
  settings:{syncUrl:'',pin:'',schedule:{0:'A',1:'C',2:'B',3:'B',4:'A',5:'B',6:'B'}},
  products:{
    sekkisei:P('skin','Sekkisei Lotion','Kosé','Hydrating toner — preps and rehydrates after cleansing','Herbal extracts and glycerin restore moisture balance and prep skin so everything layered after absorbs better. The foundation step of both AM and PM.',{durationDays:120}),
    dg:P('skin','Fill+Repair Serum','Dr. Dennis Gross','Hydration + peptide workhorse','Four molecular weights of hyaluronic acid plump at multiple depths; niacinamide and ectoin strengthen the barrier; four peptides support firmness; ceramides NP/AP/EOP repair lipids. The single hardest-working product in the stack.',{durationDays:75}),
    vitc:P('skin','C-Firma Vitamin C','Drunk Elephant','AM antioxidant — environmental defence','15% L-ascorbic acid with vitamin E and ferulic acid neutralises free radicals from UV and pollution, brightens, and supports collagen. Applied AM so it works alongside SPF all day.',{next:{name:'CE Ferulic',brand:'SkinCeuticals',role:'AM antioxidant — environmental defence',why:'The benchmark vitamin C serum: 15% L-ascorbic acid, 1% vitamin E, 0.5% ferulic acid at optimal pH. Deepest clinical evidence of any vitamin C; protection lasts 72h per application. Note: metallic scent that dissipates quickly.',link:'https://www.skinceuticals.com.au/skincare/facial-serums/c-e-ferulic-vitamin-c-serum/SKC_0001.html'}}),
    serumveil:P('skin','Serum Veil Deep Repair','One by Kosé','Moisture retention booster','Rice Power No.11 is clinically shown in Japan to improve the skin\u2019s own ability to produce ceramides and store moisture — improving your skin\u2019s baseline hydration capacity, not just today\u2019s surface moisture.'),
    emulsion:P('skin','Kosé Emulsion','Kosé','Moisture seal — as needed','Light emulsion layer that locks in hydration from previous steps on days when skin feels tighter or drier than usual. Skip when skin feels balanced.',{durationDays:120,flags:['optional']}),
    spf:P('skin','No.3 SPF 50','Rationale','Daily UV protection — permanent','Zinc oxide plus Tinosorb S — one of the best hybrid broad-spectrum filter combinations available. UV is the single largest driver of visible ageing; this is the most important anti-ageing step in the entire routine. Always last in AM.',{durationDays:60,flags:['permanent'],link:'https://rationale.com'}),
    oil:P('skin','Cleansing Oil','Kosé','First cleanse — dissolves SPF, sebum and the day','Oil cleansing dissolves sunscreen and oil-based debris that water-based cleansers leave behind. Step one of the double cleanse.'),
    no4:P('skin','No.4 Cleanser','Rationale','Second cleanse — clean slate','Water-based cleanse removes oil residue and prepares skin for actives. Gentle enough not to strip a dry/sensitive barrier.',{link:'https://rationale.com'}),
    no5:P('skin','No.5 Milk Concentrate','Rationale','Barrier support milk — phasing out','Ceramide NP, cholesterol and zinc PCA support the barrier. Being phased out — the Dennis Gross serum and incoming Ceramidin cream cover this territory more completely.',{durationDays:60,flags:['removeWhenDone']}),
    exfoliant:P('skin','6% Mandelic + 2% Lactic','Paula\u2019s Choice','Gentle exfoliant — C nights only, 1–2×/week','The gentlest effective AHA combination. Mandelic\u2019s large molecule penetrates slowly (minimal irritation); time-released lactic acid hydrates while it exfoliates. Applied straight after toner on clean skin — before serums — so it gets direct contact. Never on retinol nights.',{durationDays:180,link:'https://www.paulaschoice.com.au/skin-perfecting-6pct-mandelic-acid-and-2pct-lactic-acid-liquid-exfoliant/1470.html'}),
    retinol:P('skin','Retinol 0.3%','SkinCeuticals','Cell turnover + collagen — the anti-ageing engine','Pure encapsulated retinol with slow-release delivery and soothing bisabolol. The most evidence-backed anti-ageing ingredient without prescription: drives cell turnover, collagen synthesis, improves fine lines and tone. 4 nights/week.',{link:'https://www.skinceuticals.com.au',next:{name:'Retinol 0.5%',brand:'SkinCeuticals',role:'Cell turnover + collagen — strength upgrade',why:'Same encapsulated delivery system, higher concentration. The official step up once 0.3% is tolerated at 4 nights/week. Start at 2 nights/week and rebuild to 4.',link:'https://www.adorebeauty.com.au/p/skinceuticals/skinceuticals-pure-retinol-0-5.html'}}),
    night:P('skin','No.6 Night Crème','Rationale','Night moisturiser — seals everything in','Occlusive night layer. Locks in all prior steps and prevents overnight moisture loss.',{durationDays:75,next:{name:'Ceramidin Skin Barrier Moisturising Cream',brand:'Dr. Jart+',role:'Night moisturiser — barrier-first upgrade',why:'Five ceramide types (NP, NG, NS, AS, AP) plus cholesterol — the most complete ceramide profile in the routine. Purpose-built for dry skin barrier repair, and a better partner for retinol nights than No.6.',link:'https://www.mecca.com/en-au/'}}),
    excellent:P('skin','Crème Excellent','Kosé','Rich night treatment — A nights, when restocked','Rich finishing cream for non-retinol nights when extra overnight nourishment is wanted. Apply after night crème.',{flags:['optional']}),
    eye:P('skin','Eye Crème','Rationale','Periorbital care — every night','The eye area is the thinnest skin on the face and the first to show ageing. A dedicated eye product delivers actives at a viscosity and concentration the orbital area tolerates.',{next:{name:'Peptides & Omegas Firming Eye Cream',brand:'Allies of Skin',role:'Periorbital care — active-dense upgrade',why:'Four peptide types, 1% bakuchiol (retinoid-like effects safe for the eye area), ceramide NP, squalane, CoQ10 and two forms of hyaluronic acid. Firms, brightens and de-puffs in one product.',link:'https://www.mecca.com/en-au/allies-of-skin/peptides-omegas-firming-eye-cream-I-059513/'}}),
    olaplex:P('hair','No.6 Bond Smoother','Olaplex','Daily leave-in — bond repair + smoothing','Repairs broken disulphide bonds while smoothing and reducing frizz. Daily leave-in base before styling.'),
    oribecreme:P('hair','Style Crème','Oribe','Daily styling crème','Light conditioning style layer — control and polish without hold or stiffness. The daily finish.'),
    kerastase:P('hair','Elixir Ultime L\u2019Huile Légère','Kérastase','Post-wash oil — smooth + protect','Lightweight oil for frizz control, smoothness and heat protection. Spray lightly onto damp hair, mid-lengths to ends, after every wash.',{durationDays:120}),
    colorwow:P('hair','Cocktail Bionic Tonic','Color Wow','Strengthener — optional, if hair feels dry/damaged','Strengthening treatment for damp hair, applied before oil when hair feels dry or damaged. Optional step.',{durationDays:120,flags:['optional']}),
    curlsmith:P('hair','Bond Curl Rehab Salve','Curlsmith','Weekly pre-wash treatment','Apply to damp hair 15–30 min before washing; distribute with a wide-tooth comb. Bond repair before the weekly cleanse.',{durationDays:180}),
    davroe:P('hair','Smooth Senses Anti-Frizz Shampoo','Davroe','Weekly cleanse','Gentle cleanse to remove buildup while smoothing. Once weekly.',{durationDays:150}),
    oribecond:P('hair','Gold Lust Repair & Restore Conditioner','Oribe','Weekly condition','Work through mid-lengths to ends, comb through and rinse. Repair-focused weekly conditioner.',{durationDays:150}),
    robin:P('hair','Regenerating Mask','Christophe Robin','Deep nourishment — every 2–3 weeks','Swap in place of conditioner every 2–3 weeks when hair feels dry or unruly. Adds softness and strength.',{durationDays:240,flags:['optional']}),
    morris:P('hair','Matte Balm','Morris Motley','Weekday finish — clean sculpted look','Pea-sized amount warmed thoroughly between palms, applied back to front on dry hair, shaped with the Kent KFM3 brush. Controlled, professional, soft matte finish.',{durationDays:120}),
    quicksand:P('hair','Quicksand','Hanz de Fuko','Pre-styler — structured volume','Emulsify and apply to roots and top on damp or dry hair. Matte grip, bold lift, dry texture.',{durationDays:120}),
    blumaan:P('hair','Cavalier Clay','Blumaan','Weekend finish — strong sculpted hold','Apply to dry hair after Quicksand pre-style. Fingertips for separation, Kent brush for structure. High volume, durable matte hold.',{durationDays:120}),
    seasalt:P('hair','Sea Salt Spray','—','Pre-styler — casual texture','Mist lightly on damp hair, focusing on top. Soft, airy volume with flexible hold. Pair with Morris Motley or go product-free for beachy days.',{durationDays:150,flags:['optional']}),
    a13:P('scent','Another 13','Le Labo','Clean ambroxan musk — quiet intensity','Daily office default. Skin-like musk that reads clean and modern without projecting loudly — the weekday signature.',{durationDays:365,tags:['weekday','office','daily']}),
    e20:P('scent','Eucalyptus 20','Le Labo','Smoky cedar and frankincense','Evening and winter nights. Resinous, smoky depth suited to cooler weather and after-dark wear.',{durationDays:365,tags:['evening','winter']}),
    b19:P('scent','Baie 19','Le Labo','Petrichor, juniper, patchouli','Warm casual days and weekends. Rain-on-earth freshness grounded in patchouli.',{durationDays:365,tags:['weekend','casual']}),
    aventus:P('scent','Aventus','Creed','Fruity-smoky chypre','Masculine occasions and going out. Confident projection with smoky birch under the fruit.',{durationDays:365,tags:['occasion','evening']}),
    s33:P('scent','Santal 33','Le Labo','Signature sandalwood','Home and bedroom signature. The scent of your own space.',{durationDays:365,tags:['home','signature']})

/* ════════════════════ STATE + MIGRATION ════════════════════ */
let DB;
try{ const s=localStorage.getItem('stack_v1'); DB = s? migrate(JSON.parse(s)) : structuredClone(SEED);}catch(e){ DB = structuredClone(SEED); }
function migrate(d){
  if(!d.v||d.v<2){
    Object.values(d.products||{}).forEach(p=>{if(!p.cat)p.cat=guessCat(p);if(p.active===undefined)p.active=true;if(!p.tags)p.tags=[];});
    (d.scents||[]).forEach(s=>{d.products[s.id]=P('scent',s.name,s.brand,s.desc||'',s.notes||'',{tags:s.tags||[],link:s.link||'',durationDays:365});});
    delete d.scents; d.v=2;
  }
  if(d.v<3){
    if(!d.skin.c){
      d.skin.c=structuredClone(SEED.skin.c);
      if(d.skin.a){
        d.skin.a.steps=d.skin.a.steps.filter(s=>s.p!=='exfoliant');
        if((d.skin.a.name||'').includes('No retinol'))d.skin.a.name='Evening A — Recovery';
      }
      if(d.settings.schedule[1]==='A')d.settings.schedule[1]='C';
    }
    if(d.products.exfoliant){d.products.exfoliant.role='Gentle exfoliant — C nights only, 1–2×/week';}
    d.v=3;
  }
  if(d.settings&&d.settings.syncUrl)d.settings.syncUrl=normUrl(d.settings.syncUrl);
  return d;
}
function guessCat(p){const hairBrands=['Olaplex','Oribe','Kérastase','Color Wow','Curlsmith','Davroe','Christophe Robin','Morris Motley','Hanz de Fuko','Blumaan'];return hairBrands.includes(p.brand)?'hair':'skin';}

let UI={tab:'today',page:null,skinView:null,hairLook:null,modal:null,invCat:'skin'};
let timerStart=null,timerInt=null;

function save(){DB.updatedAt=Date.now();localStorage.setItem('stack_v1',JSON.stringify(DB));schedSync();}
function autoSkinView(){const h=new Date().getHours();if(h<12)return 'am';return todayPM();}
function todayPM(){if(!DB)return 'a';const v=DB.settings.schedule[new Date().getDay()];return v==='A'?'a':v==='B'?'b':'c';}
function dayName(i){return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][i]}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtWait(s){if(!s)return null;if(s>=60)return (s/60)+' min';return s+' sec';}
function daysLeft(p){if(!p.durationDays)return null;return Math.round(p.durationDays-(Date.now()-p.restockedAt)/86400000);}
function lowStock(){return Object.entries(DB.products).filter(([id,p])=>{if(!p.active)return false;const d=daysLeft(p);return d!==null&&d<=14;});}
function pName(id){const p=DB.products[id];return p?p.name:'?';}
function activeSteps(steps){return steps.filter(s=>{const p=DB.products[s.p];return p&&p.active;});}
function scents(){return Object.entries(DB.products).filter(([id,p])=>p.cat==='scent'&&p.active).map(([id,p])=>({id,...p}));}
function pmTitle(k){return k==='a'?'Recovery night':k==='b'?'Retinol night':'Exfoliation night';}
function pmChip(k){return k==='b'?'c-plum':k==='c'?'c-amber':'c-moss';}
UI.skinView=autoSkinView();

/* ════════════════════ SYNC ════════════════════ */
function normUrl(u){u=(u||'').trim().replace(/\/+$/,'');if(u&&!/^https?:\/\//i.test(u))u='https://'+u;return u;}
let syncTimer=null;
function schedSync(){if(!DB.settings.syncUrl)return;clearTimeout(syncTimer);syncTimer=setTimeout(syncPush,2500);}
async function syncPush(){if(!DB.settings.syncUrl)return false;try{const r=await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});return r.ok?true:'HTTP '+r.status;}catch(e){return 'network error';}}
async function syncPull(){
  if(!DB.settings.syncUrl){alert('Set a sync URL in Setup first.');return;}
  let r;
  try{r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin}});}
  catch(e){alert('Pull failed — network/CORS error: '+(e.message||e));return;}
  if(!r.ok){alert('Pull failed — server returned HTTP '+r.status+(r.status===401?' (PIN mismatch)':''));return;}
  let remote;
  try{remote=await r.json();}
  catch(e){alert('Pull failed — server response was not valid JSON: '+(e.message||e));return;}
  try{
    if(remote&&remote.updatedAt>(DB.updatedAt||0)){
      DB=migrate(remote);
      localStorage.setItem('stack_v1',JSON.stringify(DB));
      render();
      alert('Synced — newer data loaded.');
    }else{
      alert('Local data is already current.');
    }
  }catch(e){alert('Pull fetched OK but applying data failed: '+(e.message||e));}
}

    ${p.active&&dl!==null&&dl<=14?'<span class="chip c-amber">Low</span>':''}<span class="step-arrow">›</span></button>`;}).join('')||'<div class="empty">Nothing here</div>'}</div>
  <div style="padding:0 22px 8px"><button class="btn ghost sm" onclick="newProduct(UI.invCat==='inactive'?'skin':UI.invCat)">+ Add product</button></div>

  <div class="sec-label">Sync (Cloudflare)</div>
  <div class="card pad">
    <div class="field"><label>Worker URL</label><input value="${esc(DB.settings.syncUrl)}" placeholder="https://thestack.you.workers.dev" onchange="DB.settings.syncUrl=normUrl(this.value);save();render()"></div>
    <div class="field"><label>PIN</label><input value="${esc(DB.settings.pin)}" placeholder="4–6 digits" onchange="DB.settings.pin=this.value.trim();save()"></div>
    <div style="display:flex;gap:8px"><button class="btn sm" onclick="syncPush().then(r=>alert(r===true?'Pushed.':'Push failed: '+r))">Push now</button><button class="btn ghost sm" onclick="syncPull()">Pull latest</button></div>
  </div>

  <div class="sec-label">Claude prompt</div>
  <div class="copybox">${esc(claudePrompt())}</div>
  <div style="padding:0 22px 8px"><button class="btn full" onclick="navigator.clipboard.writeText(claudePrompt()).then(()=>alert('Copied — paste into any Claude chat.'))">Copy Claude prompt</button></div>

  <div class="sec-label">Backup</div>
  <div style="padding:0 22px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn ghost sm" onclick="exportData()">Export data</button>
    <button class="btn ghost sm" onclick="document.getElementById('imp').click()">Import data</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">
    <button class="btn danger sm" onclick="if(confirm('Reset everything to defaults?')){localStorage.removeItem('stack_v1');location.reload();}">Reset all</button>
  </div>`;
}

/* ── MODALS ── */
function renderModal(){
  let ex=document.getElementById('ov');if(ex)ex.remove();
  if(!UI.modal)return;
  const ov=document.createElement('div');ov.className='overlay';ov.id='ov';
  ov.onclick=e=>{if(e.target===ov){UI.modal=null;render();}};
  const m=UI.modal;
  let inner='';
  if(m.type==='product')inner=productView(m.id);
  else if(m.type==='edit')inner=productEdit(m.id);
  else if(m.type==='routine')inner=routineSheet(m.key);
  else if(m.type==='look')inner=lookSheet(m.idx);
  else if(m.type==='lookpick')inner=`<div class="sheet-handle"></div><h3>Pick a look</h3><div class="brand">For Refresh & Go</div>
    ${DB.hair.looks.map(l=>`<button class="step" style="border-bottom:1px solid var(--hairline)" onclick="UI.hairLook='${l.id}';UI.modal=null;render()"><div class="step-body"><div class="step-name">${esc(l.name)}</div><div class="step-note">${esc(l.desc)}</div></div></button>`).join('')}`;
  else if(m.type==='addstep')inner=addStepSheet(m.key);
  ov.innerHTML=`<div class="sheet" onclick="event.stopPropagation()">${inner}</div>`;
  document.body.appendChild(ov);
}

function openProduct(id){UI.modal={type:'product',id};render();}
function openEdit(id){UI.modal={type:'edit',id};render();}
function productView(id){
  const p=DB.products[id];const dl=daysLeft(p);
  return `<div class="sheet-handle"></div>
  <h3>${esc(p.name)}</h3><div class="brand">${esc(p.brand)} · <span class="chip c-mute" style="text-transform:capitalize">${p.cat}</span>${!p.active?' <span class="chip c-danger">Inactive</span>':''}</div>
  <div class="desc-block"><b>${p.cat==='scent'?'About':'Why this step'}</b>${esc(p.why||p.role)}</div>
  ${p.cat==='scent'&&p.tags.length?`<div class="field"><label>When to wear</label><div class="tags">${p.tags.map(t=>`<span class="chip c-amber">${esc(t)}</span>`).join('')}</div></div>`:''}
  ${p.next?`<div class="desc-block" style="border-color:rgba(217,160,91,.35)"><b style="color:var(--amber)">Next up · ${esc(p.next.brand)} ${esc(p.next.name)}</b>${esc(p.next.why||'')}
  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn sm" onclick="swapProduct('${id}')">I've run out — swap now</button>${p.next.link?`<a class="btn ghost sm" href="${esc(p.next.link)}" target="_blank" style="text-decoration:none">Order next</a>`:''}</div></div>`:''}
  ${p.flags.includes('removeWhenDone')?`<div class="desc-block" style="border-color:rgba(201,123,110,.4)"><b style="color:var(--danger)">Phasing out</b>Use until finished, then remove. <div style="margin-top:10px"><button class="btn danger sm" onclick="deactivate('${id}')">Finished — deactivate now</button></div></div>`:''}
  <div class="card pad" style="margin:0 0 14px">
    <div class="kv"><span class="k">Stock estimate</span><span class="v">${dl!==null?(dl<=0?'Likely empty':'~'+Math.max(0,dl)+' days left'):'—'}</span></div>
    <div class="kv"><span class="k">Lasts about</span><span class="v">${p.durationDays||'—'} days</span></div>
    <div class="kv"><span class="k">Restocked</span><button class="btn ghost sm" onclick="DB.products['${id}'].restockedAt=Date.now();save();render()">Log restock today</button></div>
  </div>
  ${p.notes?`<div class="field"><label>Notes</label><div class="ro-notes">${esc(p.notes)}</div></div>`:''}
  ${p.link?`<div style="margin-bottom:14px"><a class="btn ghost sm" href="${esc(p.link)}" target="_blank" style="text-decoration:none">Open reorder link →</a></div>`:''}
  <div style="display:flex;gap:8px">
    <button class="btn full" onclick="openEdit('${id}')">Edit</button>
    <button class="btn ghost full" onclick="UI.modal=null;render()">Done</button>
  </div>`;
}

function productEdit(id){
  const p=DB.products[id];
  const allTags=['weekday','weekend','daily','office','casual','evening','occasion','winter','summer','home','signature'];
  return `<div class="sheet-handle"></div>
  <h3>Edit — ${esc(p.name)||'New product'}</h3><div class="brand">${esc(p.brand)}</div>
  <div class="field"><label>Name</label><input value="${esc(p.name)}" onchange="upd('${id}','name',this.value)"></div>
  <div class="field"><label>Brand</label><input value="${esc(p.brand)}" onchange="upd('${id}','brand',this.value)"></div>
  <div class="field"><label>Category</label><select onchange="upd('${id}','cat',this.value)">
    ${['skin','hair','scent'].map(c=>`<option value="${c}" ${p.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
  <div class="field"><label>${p.cat==='scent'?'Short description':'Step role (short)'}</label><input value="${esc(p.role)}" onchange="upd('${id}','role',this.value)"></div>
  <div class="field"><label>${p.cat==='scent'?'About / character':'Why it matters (long)'}</label><textarea onchange="upd('${id}','why',this.value)">${esc(p.why)}</textarea></div>
  <div class="field"><label>Notes (clears on swap)</label><textarea onchange="upd('${id}','notes',this.value)">${esc(p.notes)}</textarea></div>
  <div class="field"><label>Reorder link</label><input value="${esc(p.link)}" placeholder="https://…" onchange="upd('${id}','link',this.value)"></div>
  <div class="field"><label>Lasts about (days) — reorder frequency</label><input type="number" value="${p.durationDays||''}" onchange="upd('${id}','durationDays',parseInt(this.value)||0)"></div>
  ${p.cat==='scent'?`<div class="field"><label>Tags — when to wear</label><div class="tags">${allTags.map(t=>`<button class="chip ${p.tags.includes(t)?'c-amber':'c-mute'}" onclick="toggleTag('${id}','${t}')">${t}</button>`).join('')}</div></div>`:''}

  <div class="sec-label" style="margin-left:0">Replacement (next product)</div>
  ${p.next?`
    <div class="field"><label>Next name</label><input value="${esc(p.next.name)}" onchange="updNext('${id}','name',this.value)"></div>
    <div class="field"><label>Next brand</label><input value="${esc(p.next.brand)}" onchange="updNext('${id}','brand',this.value)"></div>
    <div class="field"><label>Why the swap</label><textarea onchange="updNext('${id}','why',this.value)">${esc(p.next.why||'')}</textarea></div>
    <div class="field"><label>Order link for next</label><input value="${esc(p.next.link||'')}" onchange="updNext('${id}','link',this.value)"></div>
    <div style="margin-bottom:14px"><button class="btn warn sm" onclick="upd('${id}','next',null);render()">Remove replacement</button></div>`
  :`<div style="margin-bottom:14px"><button class="btn ghost sm" onclick="upd('${id}','next',{name:'',brand:'',role:'',why:'',link:''});render()">+ Queue a replacement</button></div>`}

  <div class="sec-label" style="margin-left:0">Status</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    ${p.active?`<button class="btn warn sm" onclick="deactivate('${id}')">Deactivate — keep in inventory</button>`
    :`<button class="btn sm" onclick="upd('${id}','active',true);render()">Reactivate</button>`}
    <button class="btn danger sm" onclick="deleteProduct('${id}')">Delete permanently</button>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn full" onclick="UI.modal={type:'product',id:'${id}'};render()">Save & view</button>
    <button class="btn ghost full" onclick="UI.modal=null;render()">Close</button>
  </div>`;
}
function upd(id,k,v){DB.products[id][k]=v;save();}
function updNext(id,k,v){if(!DB.products[id].next)DB.products[id].next={};DB.products[id].next[k]=v;save();}
function toggleTag(id,t){const p=DB.products[id];const i=p.tags.indexOf(t);if(i>=0)p.tags.splice(i,1);else p.tags.push(t);save();render();}
function deactivate(id){DB.products[id].active=false;UI.modal=null;save();render();}
function deleteProduct(id){
  if(!confirm('Delete permanently? This removes it from all routines too.'))return;
  ['am','a','b','c','refresh'].forEach(k=>{if(DB.skin[k])DB.skin[k].steps=DB.skin[k].steps.filter(s=>s.p!==id);});
  ['daily','postwash','weekly'].forEach(k=>DB.hair[k].steps=DB.hair[k].steps.filter(s=>s.p!==id));
  DB.hair.looks.forEach(l=>l.steps=l.steps.filter(s=>s.p!==id));
  delete DB.products[id];
  UI.modal=null;save();render();
}
function swapProduct(id){
  const p=DB.products[id];if(!p.next)return;
  if(!confirm('Swap to '+p.next.name+'? Notes will clear.'))return;
  Object.assign(p,{name:p.next.name,brand:p.next.brand,role:p.next.role||p.role,why:p.next.why||p.why,link:p.next.link||'',notes:'',restockedAt:Date.now(),next:null});
  save();render();
}
function newProduct(cat){
  const id='p'+Date.now();
  DB.products[id]=P(cat||'skin','','','','');
  save();openEdit(id);
}

/* routine editor */
function getRoutine(key){const [a,b]=key.split('.');return a==='skin'?DB.skin[b]:DB.hair[b];}
function openRoutineEditor(key){UI.modal={type:'routine',key};render();}
function routineSheet(key){
  const r=getRoutine(key);
  return `<div class="sheet-handle"></div><h3>Edit routine</h3><div class="brand">Rename, reorder, remove, wait times</div>
  <div class="field"><label>Routine name</label><input value="${esc(r.name)}" onchange="getRoutine('${key}').name=this.value;save()"></div>
  <div class="card" style="margin:0 0 12px">${r.steps.map((s,i)=>{
    const p=DB.products[s.p];
    return `<div class="edit-step" style="${p&&!p.active?'opacity:.45':''}">
    <span class="nm">${i+1}. ${esc(pName(s.p))}${p&&!p.active?' (inactive)':''}</span>
    <input type="number" value="${s.wait||0}" title="wait (sec)" style="width:62px;padding:6px 8px;text-align:right" onchange="getRoutine('${key}').steps[${i}].wait=parseInt(this.value)||0;save()">
    <button class="mini" onclick="moveStep('${key}',${i},-1)">↑</button>
    <button class="mini" onclick="moveStep('${key}',${i},1)">↓</button>
    <button class="mini" style="color:var(--danger)" onclick="getRoutine('${key}').steps.splice(${i},1);save();render()">✕</button>
  </div>`;}).join('')||'<div class="empty">No steps yet</div>'}</div>
  <p class="page-sub" style="padding:0 0 10px">Wait = seconds before the next step · inactive products are hidden from routine views</p>
  <div style="display:flex;gap:8px"><button class="btn sm" onclick="UI.modal={type:'addstep',key:'${key}'};render()">+ Add step</button>
  <button class="btn ghost sm" onclick="UI.modal=null;render()">Done</button></div>`;
}
function moveStep(key,i,d){const st=getRoutine(key).steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}
function addStepSheet(key){
  return `<div class="sheet-handle"></div><h3>Add step</h3><div class="brand">Pick an existing product or create new</div>
  <div class="card" style="margin:0 0 12px;max-height:320px;overflow-y:auto">${Object.entries(DB.products).filter(([id,p])=>p.active).map(([id,p])=>`<button class="step" onclick="getRoutine('${key}').steps.push({p:'${id}',wait:0});save();UI.modal={type:'routine',key:'${key}'};render()"><div class="step-body"><div class="step-name">${esc(p.brand)} ${esc(p.name)}</div><div class="step-note">${p.cat}</div></div></button>`).join('')}</div>
  <button class="btn ghost full" onclick="newProductInto('${key}')">+ Create new product</button>
  <div style="height:8px"></div>
  <button class="btn ghost full" onclick="UI.modal={type:'routine',key:'${key}'};render()">Back</button>`;
}
function newProductInto(key){
  const nm=prompt('Product name?');if(!nm)return;
  const br=prompt('Brand?')||'';
  const id='p'+Date.now();
  const cat=key.startsWith('hair')?'hair':'skin';
  DB.products[id]=P(cat,nm,br,'','');
  getRoutine(key).steps.push({p:id,wait:0});
  save();UI.modal={type:'routine',key};render();
}

/* look editor */
function openLookEditor(idx){UI.modal={type:'look',idx};render();}
function lookSheet(idx){
  const l=DB.hair.looks[idx];if(!l)return '';
  return `<div class="sheet-handle"></div><h3>Edit look</h3>
  <div class="field"><label>Name</label><input value="${esc(l.name)}" onchange="DB.hair.looks[${idx}].name=this.value;save()"></div>
  <div class="field"><label>Description</label><input value="${esc(l.desc)}" onchange="DB.hair.looks[${idx}].desc=this.value;save()"></div>
  <div class="sec-label" style="margin-left:0">Steps</div>
  <div class="card" style="margin:0 0 12px">${l.steps.map((s,i)=>`<div class="edit-step"><span class="nm">${i+1}. ${esc(pName(s.p))}</span>
  <button class="mini" onclick="lkMove(${idx},${i},-1)">↑</button><button class="mini" onclick="lkMove(${idx},${i},1)">↓</button>
  <button class="mini" style="color:var(--danger)" onclick="DB.hair.looks[${idx}].steps.splice(${i},1);save();render()">✕</button></div>`).join('')||'<div class="empty">No steps</div>'}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
  <button class="btn sm" onclick="lkAdd(${idx})">+ Add product</button>
  <button class="btn danger sm" onclick="if(confirm('Delete this look?')){DB.hair.looks.splice(${idx},1);UI.modal=null;save();render();}">Delete look</button>
  <button class="btn ghost sm" onclick="UI.modal=null;render()">Done</button></div>`;
}
function lkMove(idx,i,d){const st=DB.hair.looks[idx].steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}
function lkAdd(idx){
  const hairP=Object.entries(DB.products).filter(([id,p])=>p.cat==='hair'&&p.active);
  const opts=hairP.map(([id,p],n)=>`${n+1}: ${p.brand} ${p.name}`).join('\n');
  const pick=prompt('Add which product? Enter number:\n'+opts);
  const n=parseInt(pick)-1;
  if(n>=0&&n<hairP.length){DB.hair.looks[idx].steps.push({p:hairP[n][0],wait:0});save();render();}
}
function newLook(){DB.hair.looks.push({id:'l'+Date.now(),name:'New look',desc:'',steps:[]});save();openLookEditor(DB.hair.looks.length-1);}

/* ── CLAUDE PROMPT ── */
function claudePrompt(){
  const lines=[];
  lines.push('MY PERSONAL CARE CONTEXT — generated by The Stack app, '+new Date().toLocaleDateString('en-AU'));
  lines.push('');
  lines.push('SKIN PROFILE: Dry/sensitive, on antihistamines, anti-ageing goal, no chemical smells. Melbourne, Australia. Shops at MECCA and brand sites. Prefers efficacy over price.');
  lines.push('');
  const rname={am:DB.skin.am.name+' (daily)',a:DB.skin.a.name+' ('+(schedDaysFor('A')||'unassigned')+')',b:DB.skin.b.name+' ('+(schedDaysFor('B')||'unassigned')+')',c:DB.skin.c.name+' ('+(schedDaysFor('C')||'unassigned')+')',refresh:DB.skin.refresh.name+' (post-shower, going out)'};
  for(const k of ['am','a','b','c','refresh']){
    lines.push('SKIN — '+rname[k]+':');
    activeSteps(DB.skin[k].steps).forEach((s,i)=>{const p=DB.products[s.p];
      let l=(i+1)+'. '+p.brand+' '+p.name;
      if(p.next)l+=' [next: '+p.next.brand+' '+p.next.name+']';
      if(p.flags.includes('removeWhenDone'))l+=' [phasing out]';
      if(p.notes)l+=' — NOTE: '+p.notes;
      lines.push(l);});
    lines.push('');
  }
  lines.push('HAIR — daily: '+activeSteps(DB.hair.daily.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name}).join(', '));
  lines.push('HAIR — post-wash ('+dayName(DB.hair.washDay)+'s): '+activeSteps(DB.hair.postwash.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name}).join(', '));
  lines.push('HAIR — weekly ritual: '+activeSteps(DB.hair.weekly.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name}).join(', '));
  DB.hair.looks.forEach(l=>lines.push('HAIR LOOK — '+l.name+': '+activeSteps(l.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name}).join(' + ')));
  lines.push('');
  lines.push('SCENTS: '+scents().map(s=>s.brand+' '+s.name+' ('+s.tags.join('/')+')').join('; '));
  const inactive=Object.values(DB.products).filter(p=>!p.active);
  if(inactive.length){lines.push('');lines.push('RETIRED PRODUCTS: '+inactive.map(p=>p.brand+' '+p.name).join(', '));}
  const low=lowStock();
  if(low.length){lines.push('');lines.push('RUNNING LOW: '+low.map(([id,p])=>p.name+' (~'+Math.max(0,daysLeft(p))+'d)').join(', '));}
  const notes=Object.values(DB.products).filter(p=>p.active&&p.notes).map(p=>p.name+': '+p.notes);
  if(notes.length){lines.push('');lines.push('PRODUCT NOTES: '+notes.join(' | '));}
  return lines.join('\n');
}

/* ── BACKUP ── */
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='thestack-backup.json';a.click();
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{DB=migrate(JSON.parse(r.result));save();render();alert('Imported.');}catch(e){alert('Invalid file.');}};
  r.readAsText(f);
}

/* ── AUTO SYNC LIFECYCLE ── */
async function autoPull(){
  if(!DB.settings.syncUrl)return;
  try{
    const r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin}});
    if(!r.ok)return;
    const remote=await r.json();
    if(remote&&remote.updatedAt>(DB.updatedAt||0)&&!UI.modal){
      DB=migrate(remote);
      localStorage.setItem('stack_v1',JSON.stringify(DB));
      render();
    }
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    autoPull();
  }else{
    // flush any pending debounced push before the app suspends
    if(syncTimer){clearTimeout(syncTimer);syncTimer=null;}
    if(DB.settings.syncUrl){
      try{fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB),keepalive:true});}catch(e){}
    }
  }
});

render();
autoPull();
</script>
</body>
