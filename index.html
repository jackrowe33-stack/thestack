<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141815">
<title>The Stack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#141815;--bg-raise:#1c211d;--card:#21271f;--card-edge:#2c332a;
  --ink:#ece9e2;--ink-mid:#a8a89e;--ink-soft:#6e7268;
  --moss:#8fa885;--moss-deep:#5d7355;--amber:#d9a05b;--plum:#a08bc0;--danger:#c97b6e;
  --hairline:rgba(236,233,226,0.08);--glass:rgba(24,28,25,0.6);
  --glass-hi:rgba(236,233,226,0.09);--glass-edge:rgba(236,233,226,0.14);
}
@media(prefers-color-scheme:light){:root{
  --bg:#f4f2ec;--bg-raise:#fbfaf6;--card:#ffffff;--card-edge:#e6e2d8;
  --ink:#20241f;--ink-mid:#5d6157;--ink-soft:#989c91;
  --moss:#5d7355;--moss-deep:#46593f;--amber:#b97f37;--plum:#7b639e;--danger:#b3604f;
  --hairline:rgba(32,36,31,0.08);--glass:rgba(251,250,246,0.55);
  --glass-hi:rgba(255,255,255,0.65);--glass-edge:rgba(32,36,31,0.1);
}}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
#app{padding-bottom:128px;min-height:100vh}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;text-align:left}
input,textarea,select{font:inherit;color:var(--ink);background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:10px;padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--moss)}
textarea{resize:vertical;min-height:70px}
::placeholder{color:var(--ink-soft)}
a{color:inherit}
.top{padding:52px 22px 8px;display:flex;justify-content:space-between;align-items:flex-end}
.wordmark{font-family:'Fraunces',serif;font-size:24px;font-weight:400}
.wordmark em{font-style:italic;color:var(--moss)}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;padding:52px 22px 4px}
.page-sub{font-size:13px;color:var(--ink-soft);padding:0 22px 14px}
.date{font-size:11px;color:var(--ink-soft);text-align:right;line-height:1.5}
.date strong{display:block;color:var(--ink-mid);font-weight:500;font-size:12px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:24px 22px 12px}
.card{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 10px;overflow:hidden}
.pad{padding:16px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--moss-deep);color:#f2f1ea;font-size:13px;font-weight:500;padding:11px 18px;border-radius:100px}
.btn.ghost{background:var(--bg-raise);color:var(--ink-mid);border:1px solid var(--card-edge)}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn.warn{background:transparent;color:var(--amber);border:1px solid var(--amber)}
.btn.sm{padding:7px 13px;font-size:12px}
.btn.full{width:100%;justify-content:center}
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;white-space:nowrap}
.c-moss{background:rgba(143,168,133,.14);color:var(--moss)}
.c-plum{background:rgba(160,139,192,.16);color:var(--plum)}
.c-amber{background:rgba(217,160,91,.14);color:var(--amber)}
.c-mute{background:var(--bg-raise);color:var(--ink-soft);border:1px solid var(--card-edge)}
.c-danger{background:rgba(201,123,110,.14);color:var(--danger)}
.strip{display:flex;gap:5px;padding:14px 22px 4px}
.strip .d{flex:1;text-align:center;padding:7px 0 8px;border-radius:10px;font-size:10px;color:var(--ink-soft);border:1px solid transparent}
.strip .d span{display:block;font-size:9px;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.strip .d.today{background:var(--card);border-color:var(--card-edge);color:var(--ink-mid)}
.hero{margin:14px 22px 0;background:linear-gradient(160deg,var(--card) 0%,var(--bg-raise) 100%);border:1px solid var(--card-edge);border-radius:22px;padding:24px 22px 20px;position:relative;overflow:hidden;display:block;width:calc(100% - 44px)}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(143,168,133,.13) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--moss);margin-bottom:8px}
.hero h2{font-family:'Fraunces',serif;font-weight:400;font-size:26px;line-height:1.18;margin-bottom:4px;color:var(--ink)}
.hero .sub{font-size:13px;color:var(--ink-mid);margin-bottom:18px}
.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:15px 16px;margin:0 22px 10px;width:calc(100% - 44px)}
.row-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ri-skin{background:rgba(160,139,192,.14)}.ri-hair{background:rgba(143,168,133,.14)}.ri-scent{background:rgba(217,160,91,.13)}
.row-body{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:500;color:var(--ink)}
.row-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert{margin:6px 22px 10px;display:flex;gap:11px;align-items:flex-start;background:rgba(217,160,91,.08);border:1px solid rgba(217,160,91,.22);border-radius:14px;padding:12px 14px;font-size:12.5px;color:var(--ink-mid);width:calc(100% - 44px)}
.alert b{color:var(--amber);font-weight:600}
.warn-banner{margin:0 22px 10px;display:flex;gap:11px;align-items:flex-start;background:rgba(201,123,110,.08);border:1px solid rgba(201,123,110,.25);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--ink-mid);width:calc(100% - 44px)}
.steps{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;margin:0 22px 14px;overflow:hidden}
.step{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--hairline);width:100%}
.step:last-child{border-bottom:none}
.step-num{font-size:10px;font-weight:600;color:var(--ink-soft);min-width:16px;padding-top:3px}
.step-body{flex:1;min-width:0}
.step-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.step-note{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.step-arrow{color:var(--ink-soft);font-size:13px;padding-top:3px}
.wait{display:flex;align-items:center;gap:8px;padding:0 16px;font-size:10.5px;color:var(--ink-soft);background:var(--bg-raise)}
.wait::before,.wait::after{content:'';flex:1;border-top:1px dashed var(--card-edge)}
.wait span{padding:5px 0}
.swap-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:20px;padding:2px 8px;margin-top:5px;font-size:10.5px;color:var(--amber);font-weight:500}
.seg{display:flex;background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:12px;padding:3px;margin:0 22px 14px;width:calc(100% - 44px)}
.seg button{flex:1;text-align:center;font-size:12px;font-weight:500;padding:9px 4px;border-radius:9px;color:var(--ink-soft)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.18)}
/* settings menu */
.menu-item{display:flex;align-items:center;gap:14px;padding:15px 16px;border-bottom:1px solid var(--hairline);width:100%}
.menu-item:last-child{border-bottom:none}
.menu-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.menu-body{flex:1;min-width:0}
.menu-title{font-size:14px;font-weight:500}
.menu-sub{font-size:12px;color:var(--ink-soft);margin-top:1px}
.menu-arrow{color:var(--ink-soft);font-size:16px}
/* schedule grid */
.sched-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--hairline);gap:10px}
.sched-row:last-child{border-bottom:none}
.sched-day-label{font-size:13px;font-weight:600;min-width:36px}
.sched-slots{flex:1;display:flex;flex-direction:column;gap:6px}
.sched-slot{display:flex;align-items:center;gap:8px}
.sched-slot-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);min-width:32px}
.sched-slot select{flex:1;font-size:12px;padding:6px 10px}
/* day pill selector */
.day-pills{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.day-pill{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--bg-raise);border:1.5px solid var(--card-edge);color:var(--ink-soft)}
.day-pill.on{background:rgba(143,168,133,.18);border-color:var(--moss);color:var(--moss)}
/* tabs */
.tabs{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--glass);backdrop-filter:blur(34px) saturate(190%);-webkit-backdrop-filter:blur(34px) saturate(190%);border:1px solid var(--glass-edge);border-radius:30px;display:flex;padding:7px;box-shadow:0 12px 40px rgba(0,0,0,.32),inset 0 1px 0 var(--glass-hi);z-index:50}
.tab{flex:1;text-align:center;font-size:10px;color:var(--ink-soft);padding:8px 0 6px;border-radius:23px;transition:all .25s cubic-bezier(.3,1.2,.4,1)}
.tab .ic{font-size:18px;display:block;margin-bottom:2px;opacity:.7;transition:opacity .2s}
.tab.active{color:var(--ink);background:var(--glass-hi);border:1px solid var(--glass-edge);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 8px rgba(0,0,0,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.tab.active .ic{opacity:1;color:var(--moss)}
.fab{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));right:max(20px,calc(50% - 195px));min-width:54px;height:54px;border-radius:28px;background:var(--moss-deep);color:#f2f1ea;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 6px 24px rgba(0,0,0,.35);z-index:49;padding:0 16px;gap:8px}
.fab .t{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
/* overlay/sheet */
.overlay{position:fixed;inset:0;background:rgba(10,12,10,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg-raise);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;padding:10px 22px calc(28px + env(safe-area-inset-bottom));border:1px solid var(--card-edge);border-bottom:none}
.sheet-handle{width:38px;height:4px;border-radius:4px;background:var(--card-edge);margin:8px auto 18px}
.sheet h3{font-family:'Fraunces',serif;font-size:21px;font-weight:400;margin-bottom:2px}
.sheet .brand{font-size:12px;color:var(--ink-soft);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--hairline);gap:12px}
.kv:last-child{border-bottom:none}
.kv .k{font-size:13px;color:var(--ink-mid)}
.kv .v{font-size:13px;font-weight:500;text-align:right}
.desc-block{background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px;font-size:13px;line-height:1.6;color:var(--ink-mid);margin-bottom:14px}
.desc-block b{color:var(--ink);font-weight:600;display:block;margin-bottom:4px;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.edit-step{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--hairline)}
.edit-step:last-child{border-bottom:none}
.edit-step .nm{flex:1;font-size:13px;font-weight:500}
.mini{width:30px;height:30px;border-radius:9px;background:var(--bg-raise);border:1px solid var(--card-edge);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-mid);flex-shrink:0}
.scent-card{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:16px;margin:0 22px 10px;width:calc(100% - 44px);display:block;text-align:left}
.scent-card .nm{font-family:'Fraunces',serif;font-size:17px}
.scent-card .br{font-size:11px;color:var(--ink-soft);margin-bottom:6px}
.scent-card .ds{font-size:12.5px;color:var(--ink-mid);margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.copybox{background:var(--card);border:1px solid var(--card-edge);border-radius:14px;padding:14px;font-family:ui-monospace,monospace;font-size:11px;line-height:1.55;color:var(--ink-mid);white-space:pre-wrap;max-height:300px;overflow-y:auto;margin:0 22px 12px;width:calc(100% - 44px)}
.note-flag{font-size:10.5px;color:var(--danger);margin-top:4px;font-weight:500}
.empty{padding:30px 22px;text-align:center;color:var(--ink-soft);font-size:13px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-mid);padding:52px 22px 0;cursor:pointer}
.manage-link{padding:4px 22px 16px}
.ro-notes{background:var(--bg-raise);border:1px solid var(--card-edge);border-radius:12px;padding:12px;font-size:13px;color:var(--ink-mid);line-height:1.55}
</style>
</head>

/* ══════════════════════════════════════════════
   MIGRATION
══════════════════════════════════════════════ */
function migrate(d){
  // v1/v2/v3 → v4
  if(!d.v||d.v<4){
    // Rebuild routines array from old skin/hair objects
    d.routines=structuredClone(SEED.routines);
    // Try to preserve old routine names
    if(d.skin){
      if(d.skin.am)d.routines.find(r=>r.id==='skin-am').name=d.skin.am.name||'Morning';
      if(d.skin.a)d.routines.find(r=>r.id==='skin-a').name=d.skin.a.name||'Evening A — Recovery';
      if(d.skin.b)d.routines.find(r=>r.id==='skin-b').name=d.skin.b.name||'Evening B — Retinol';
      if(d.skin.c)d.routines.find(r=>r.id==='skin-c').name=d.skin.c.name||'Evening C — Exfoliation';
    }
    delete d.skin; delete d.hair;
    d.hairLooks=structuredClone(SEED.hairLooks);
    d.settings={syncUrl:d.settings?.syncUrl||'',pin:d.settings?.pin||''};
    Object.values(d.products||{}).forEach(p=>{
      if(!p.cat)p.cat='skin';if(p.active===undefined)p.active=true;if(!p.tags)p.tags=[];
    });
    d.v=4;
  }
  if(d.settings?.syncUrl)d.settings.syncUrl=normUrl(d.settings.syncUrl);
  return d;
}
function guessCat(p){const h=['Olaplex','Oribe','Kérastase','Color Wow','Curlsmith','Davroe','Christophe Robin','Morris Motley','Hanz de Fuko','Blumaan'];return h.includes(p.brand)?'hair':'skin';}

   HELPERS

function save(){DB.updatedAt=Date.now();localStorage.setItem('stack_v1',JSON.stringify(DB));schedSync();}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dayName(i){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][i];}
function dayShort(i){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i];}
function fmtWait(s){if(!s)return null;return s>=60?(s/60)+' min':s+' sec';}
function daysLeft(p){if(!p.durationDays)return null;return Math.round(p.durationDays-(Date.now()-p.restockedAt)/86400000);}
function lowStock(){return Object.entries(DB.products).filter(([id,p])=>{if(!p.active)return false;const d=daysLeft(p);return d!==null&&d<=14;});}
function pName(id){const p=DB.products[id];return p?p.name:'?';}
function activeSteps(steps){return(steps||[]).filter(s=>{const p=DB.products[s.p];return p&&p.active;});}
function scents(){return Object.entries(DB.products).filter(([id,p])=>p.cat==='scent'&&p.active).map(([id,p])=>({id,...p}));}
function routineById(id){return DB.routines.find(r=>r.id===id);}

// Get the routine assigned to a given day/type/cat (first match wins)
function routineForDay(day,type,cat){
  return DB.routines.find(r=>r.cat===cat&&r.type===type&&r.days.includes(day))||null;
}
function routinesOf(cat,type){return DB.routines.filter(r=>r.cat===cat&&r.type===type);}

/* ══════════════════════════════════════════════
   SYNC
══════════════════════════════════════════════ */
function normUrl(u){u=(u||'').trim().replace(/\/+$/,'');if(u&&!/^https?:\/\//i.test(u))u='https://'+u;return u;}
let syncTimer=null;
function schedSync(){if(!DB.settings.syncUrl)return;clearTimeout(syncTimer);syncTimer=setTimeout(syncPushSilent,2500);}
async function syncPushSilent(){if(!DB.settings.syncUrl)return;try{await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});}catch(e){}}
async function syncPush(){if(!DB.settings.syncUrl)return false;try{const r=await fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB)});return r.ok?true:'HTTP '+r.status;}catch(e){return 'network error';}}
async function syncPull(force=false){
  if(!DB.settings.syncUrl){alert('Set a sync URL in Setup first.');return;}
  let r;
  try{r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin},cache:'no-store'});}
  catch(e){alert('Pull failed — network error: '+(e.message||e));return;}
  if(!r.ok){alert('Pull failed — HTTP '+r.status+(r.status===401?' (PIN mismatch)':''));return;}
  let remote;
  try{remote=await r.json();}catch(e){alert('Pull failed — bad JSON');return;}
  if(!remote){alert('Nothing on server yet.');return;}
  if(force||remote.updatedAt>(DB.updatedAt||0)){
    DB=migrate(remote);localStorage.setItem('stack_v1',JSON.stringify(DB));render();
  }
}
async function autoPull(){
  if(!DB.settings.syncUrl)return;
  try{
    const r=await fetch(DB.settings.syncUrl,{headers:{'X-Pin':DB.settings.pin},cache:'no-store'});
    if(!r.ok)return;
    const remote=await r.json();
    if(remote&&remote.updatedAt>=(DB.updatedAt||0)&&!UI.modal){
      DB=migrate(remote);localStorage.setItem('stack_v1',JSON.stringify(DB));render();
    }
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){autoPull();}
  else{
    clearTimeout(syncTimer);syncTimer=null;
    if(DB.settings.syncUrl){try{fetch(DB.settings.syncUrl,{method:'PUT',headers:{'Content-Type':'application/json','X-Pin':DB.settings.pin},body:JSON.stringify(DB),keepalive:true});}catch(e){}}
  }
});

      <span class="step-num">${i+1}</span>
      <div class="step-body">

        <div class="step-note">${esc(p.role)}</div>
        ${p.next?`<span class="swap-pill">→ ${esc(p.next.brand)} ${esc(p.next.name)} next</span>`:''}
        ${p.flags.includes('removeWhenDone')?`<div class="note-flag">Remove when finished</div>`:''}
        ${dl!==null&&dl<=14?`<div class="note-flag" style="color:var(--amber)">~${Math.max(0,dl)} days left</div>`:''}

  return h+'</div>';
}

          </select>
        </div>

            <option value="">— none —</option>

          </select>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;

function assignDay(day,type,cat,newId){
  const warnings=[];
  // Remove this day from any other routine of same cat+type
  DB.routines.forEach(r=>{
    if(r.cat===cat&&r.type===type&&r.id!==newId&&r.days.includes(day)){
      warnings.push(r.name);
      r.days=r.days.filter(d=>d!==day);
    }
  });
  if(newId){
    const r=routineById(newId);
    if(r&&!r.days.includes(day))r.days.push(day);
  }
  save();
  if(warnings.length){
    // show warning banner briefly
    UI._schedWarning=`${dayName(day)} removed from: ${warnings.join(', ')}`;
    render();
    setTimeout(()=>{UI._schedWarning=null;render();},4000);
  }else render();
}

function toggleRoutineDay(id,day){
  const r=routineById(id);if(!r)return;
  if(r.days.includes(day)){
    r.days=r.days.filter(d=>d!==day);save();render();
  }else{
    // check for clash
    const clash=DB.routines.find(rt=>rt.id!==id&&rt.cat===r.cat&&rt.type===r.type&&rt.days.includes(day));
    if(clash){
      UI._schedWarning=`${dayName(day)} removed from "${clash.name}"`;
      clash.days=clash.days.filter(d=>d!==day);
    }
    r.days.push(day);
    save();render();
    if(clash)setTimeout(()=>{UI._schedWarning=null;render();},4000);
  }
}
function moveRStep(id,i,d){const st=routineById(id).steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}
function deleteRoutine(id){
  if(!confirm('Delete this routine? It will be removed from all days.'))return;
  DB.routines=DB.routines.filter(r=>r.id!==id);
  save();UI.setupPage='routines';render();
}

function renderModal(){
  let ex=document.getElementById('ov');if(ex)ex.remove();
  if(!UI.modal)return;
  const ov=document.createElement('div');ov.className='overlay';ov.id='ov';
  ov.onclick=e=>{if(e.target===ov){UI.modal=null;render();}};
  const m=UI.modal;
  let inner='';
  if(m.type==='product')inner=productView(m.id);
  else if(m.type==='edit')inner=productEdit(m.id);
  else if(m.type==='routine-view')inner=routineViewSheet(m.id);
  else if(m.type==='addstep')inner=addStepSheet(m.routineId);
  else if(m.type==='look')inner=lookSheet(m.idx);
  else if(m.type==='lookpick')inner=lookPickSheet();
  else if(m.type==='new-routine')inner=newRoutineSheet();
  ov.innerHTML=`<div class="sheet" onclick="event.stopPropagation()">${inner}</div>`;
  document.body.appendChild(ov);
}

  :`<div style="margin-bottom:14px"><button class="btn ghost sm" onclick="upd('${id}','next',{name:'',brand:'',role:'',why:'',link:''});render()">+ Queue a replacement</button></div>`}
  <div class="sec-label" style="margin-left:0">Status</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    ${p.active?`<button class="btn warn sm" onclick="deactivate('${id}')">Deactivate</button>`:`<button class="btn sm" onclick="upd('${id}','active',true);render()">Reactivate</button>`}
    <button class="btn danger sm" onclick="deleteProduct('${id}')">Delete permanently</button>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn full" onclick="UI.modal={type:'product',id:'${id}'};render()">Save & view</button>
    <button class="btn ghost full" onclick="UI.modal=null;render()">Close</button>
  </div>`;
}
function upd(id,k,v){DB.products[id][k]=v;save();}
function updNext(id,k,v){if(!DB.products[id].next)DB.products[id].next={};DB.products[id].next[k]=v;save();}
function toggleTag(id,t){const p=DB.products[id];const i=p.tags.indexOf(t);if(i>=0)p.tags.splice(i,1);else p.tags.push(t);save();render();}
function deactivate(id){DB.products[id].active=false;UI.modal=null;save();render();}
function deleteProduct(id){
  if(!confirm('Delete permanently?'))return;
  DB.routines.forEach(r=>{r.steps=r.steps.filter(s=>s.p!==id);});
  delete DB.products[id];UI.modal=null;save();render();
}
function swapProduct(id){
  const p=DB.products[id];if(!p.next)return;
  if(!confirm('Swap to '+p.next.name+'? Notes will clear.'))return;
  Object.assign(p,{name:p.next.name,brand:p.next.brand,role:p.next.role||p.role,why:p.next.why||p.why,link:p.next.link||'',notes:'',restockedAt:Date.now(),next:null});
  save();render();
}
function newProduct(cat){const id='p'+Date.now();DB.products[id]=P(cat||'skin','','','','');save();openEdit(id);}

/* add step sheet */
function addStepSheet(routineId){
  return`<div class="sheet-handle"></div><h3>Add step</h3><div class="brand">Pick a product</div>
  <div class="card" style="margin:0 0 12px;max-height:320px;overflow-y:auto">
    ${Object.entries(DB.products).filter(([id,p])=>p.active).map(([id,p])=>`<button class="step" onclick="routineById('${routineId}').steps.push({p:'${id}',wait:0});save();UI.modal={type:'addstep',routineId:'${routineId}'};render()">
      <div class="step-body"><div class="step-name">${esc(p.brand)} ${esc(p.name)}</div><div class="step-note">${p.cat}</div></div></button>`).join('')}
  </div>
  <button class="btn ghost full" onclick="UI.modal=null;render()">Done</button>`;
}

/* new routine sheet */
function newRoutineSheet(){
  const m=UI._newR||{cat:'skin',type:'evening',name:'',copyFrom:''};
  UI._newR=m;
  const copyOpts=DB.routines.filter(r=>r.cat===m.cat&&r.type===m.type);
  return`<div class="sheet-handle"></div><h3>New Routine</h3>
  <div class="field"><label>Name</label><input value="${esc(m.name)}" placeholder="e.g. Evening A — Recovery" oninput="UI._newR.name=this.value"></div>
  <div class="field"><label>Category</label><select onchange="UI._newR.cat=this.value;UI._newR.copyFrom='';UI.modal={type:'new-routine'};render()">
    <option value="skin" ${m.cat==='skin'?'selected':''}>Skin</option>
    <option value="hair" ${m.cat==='hair'?'selected':''}>Hair</option>
  </select></div>
  <div class="field"><label>Type</label><select onchange="UI._newR.type=this.value;UI._newR.copyFrom='';UI.modal={type:'new-routine'};render()">
    <option value="morning" ${m.type==='morning'?'selected':''}>Morning</option>
    <option value="evening" ${m.type==='evening'?'selected':''}>Evening</option>
  </select></div>
  <div class="field"><label>Copy steps from (optional)</label><select onchange="UI._newR.copyFrom=this.value">
    <option value="">— start empty —</option>
    ${copyOpts.map(r=>`<option value="${r.id}" ${m.copyFrom===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}
  </select></div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn full" onclick="createRoutine()">Create</button>
    <button class="btn ghost full" onclick="UI.modal=null;UI._newR=null;render()">Cancel</button>
  </div>`;
}
function createRoutine(){
  const m=UI._newR||{};
  const name=(m.name||'').trim();
  if(!name){alert('Enter a routine name.');return;}
  const id='r'+Date.now();
  const src=m.copyFrom?routineById(m.copyFrom):null;
  const steps=src?JSON.parse(JSON.stringify(src.steps)):[];
  DB.routines.push(R(id,m.cat||'skin',m.type||'evening',name,[],steps));
  save();UI.modal=null;UI._newR=null;
  UI.setupPage='routine-edit';UI.editRoutineId=id;render();
}

/* look sheet */
function lookSheet(idx){
  const l=(DB.hairLooks||[])[idx];if(!l)return'';
  const r=routineById(l.id)||{steps:[]};
  return`<div class="sheet-handle"></div><h3>Edit look</h3>
  <div class="field"><label>Name</label><input value="${esc(l.name)}" onchange="DB.hairLooks[${idx}].name=this.value;save()"></div>
  <div class="field"><label>Description</label><input value="${esc(l.desc)}" onchange="DB.hairLooks[${idx}].desc=this.value;save()"></div>
  <div class="sec-label" style="margin-left:0">Steps</div>
  <div class="card" style="margin:0 0 12px">${r.steps.map((s,i)=>`<div class="edit-step"><span class="nm">${i+1}. ${esc(pName(s.p))}</span>
    <button class="mini" onclick="lkMove(${idx},${i},-1)">↑</button>
    <button class="mini" onclick="lkMove(${idx},${i},1)">↓</button>
    <button class="mini" style="color:var(--danger)" onclick="routineById(DB.hairLooks[${idx}].id).steps.splice(${i},1);save();render()">✕</button>
  </div>`).join('')||'<div class="empty">No steps</div>'}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn sm" onclick="lkAdd(${idx})">+ Add product</button>
    <button class="btn danger sm" onclick="deleteLook(${idx})">Delete look</button>
    <button class="btn ghost sm" onclick="UI.modal=null;render()">Done</button>
  </div>`;
}
function lkMove(idx,i,d){const r=routineById((DB.hairLooks||[])[idx]?.id);if(!r)return;const st=r.steps;const j=i+d;if(j<0||j>=st.length)return;[st[i],st[j]]=[st[j],st[i]];save();render();}
function lkAdd(idx){
  const l=(DB.hairLooks||[])[idx];if(!l)return;
  const hairP=Object.entries(DB.products).filter(([id,p])=>p.cat==='hair'&&p.active);
  const opts=hairP.map(([id,p],n)=>`${n+1}: ${p.brand} ${p.name}`).join('\n');
  const pick=prompt('Add which product?\n'+opts);
  const n=parseInt(pick)-1;
  if(n>=0&&n<hairP.length){
    let r=routineById(l.id);
    if(!r){r=R(l.id,'hair','morning',l.name,[],[]);DB.routines.push(r);}
    r.steps.push({p:hairP[n][0],wait:0});save();render();
  }
}
function deleteLook(idx){
  if(!confirm('Delete this look?'))return;
  const l=DB.hairLooks[idx];
  DB.routines=DB.routines.filter(r=>r.id!==l.id);
  DB.hairLooks.splice(idx,1);
  UI.modal=null;save();render();
}
function newLook(){
  const id='look-'+Date.now();
  DB.hairLooks.push({id,name:'New look',desc:''});
  DB.routines.push(R(id,'hair','morning','New look',[],[]));
  save();UI.modal={type:'look',idx:DB.hairLooks.length-1};render();
}
function lookPickSheet(){
  return`<div class="sheet-handle"></div><h3>Pick a look</h3>
  ${(DB.hairLooks||[]).map(l=>`<button class="step" style="border-bottom:1px solid var(--hairline)" onclick="UI.hairLook='${l.id}';UI.modal=null;render()">
    <div class="step-body"><div class="step-name">${esc(l.name)}</div><div class="step-note">${esc(l.desc)}</div></div></button>`).join('')}`;
}

/* ══════════════════════════════════════════════
   CLAUDE PROMPT
══════════════════════════════════════════════ */
function claudePrompt(){
  const lines=['MY PERSONAL CARE CONTEXT — generated by The Stack, '+new Date().toLocaleDateString('en-AU'),''];
  lines.push('SKIN PROFILE: Dry/sensitive, antihistamines, anti-ageing, no chemical smells. Melbourne AU. MECCA/brand sites.');
  lines.push('');
  DB.routines.filter(r=>r.cat==='skin').forEach(r=>{
    lines.push('SKIN — '+r.name+' ('+( r.days.length?r.days.map(d=>dayShort(d)).join('/'):('no days assigned'))+'):');
    activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];let l=(i+1)+'. '+p.brand+' '+p.name;if(p.next)l+=' [next: '+p.next.brand+' '+p.next.name+']';if(p.flags.includes('removeWhenDone'))l+=' [phasing out]';lines.push(l);});
    lines.push('');
  });
  DB.routines.filter(r=>r.cat==='hair'&&!r.id.startsWith('hair-look')).forEach(r=>{
    lines.push('HAIR — '+r.name+' ('+( r.days.length?r.days.map(d=>dayShort(d)).join('/'):('no days'))+'):');
    activeSteps(r.steps).forEach((s,i)=>{const p=DB.products[s.p];lines.push((i+1)+'. '+p.brand+' '+p.name);});
    lines.push('');
  });
  (DB.hairLooks||[]).forEach(l=>{const r=routineById(l.id);lines.push('HAIR LOOK — '+l.name+': '+(r?activeSteps(r.steps).map(s=>{const p=DB.products[s.p];return p.brand+' '+p.name;}).join(' + '):''));});
  lines.push('');
  lines.push('SCENTS: '+scents().map(s=>s.brand+' '+s.name+' ('+s.tags.join('/')+')').join('; '));
  const inactive=Object.values(DB.products).filter(p=>!p.active);
  if(inactive.length){lines.push('');lines.push('RETIRED: '+inactive.map(p=>p.brand+' '+p.name).join(', '));}
  const low=lowStock();
  if(low.length){lines.push('');lines.push('LOW STOCK: '+low.map(([id,p])=>p.name+' (~'+Math.max(0,daysLeft(p))+'d)').join(', '));}
  return lines.join('\n');
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
render();
autoPull();
</script>
